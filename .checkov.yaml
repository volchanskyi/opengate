# Checkov configuration — built-in policy scanning across four IaC surfaces.
# Reference: https://www.checkov.io/2.Basics/CLI%20Command%20Reference.html
#
# Framework choices (S2 of iac-security-testing-pyramid plan):
#   - terraform        — *.tf files (deploy/terraform/**)
#   - dockerfile       — repo-root Dockerfile (matches CI build image)
#   - github_actions   — .github/workflows/*.yml
#
# `docker_compose` is *not* a Checkov framework in 3.x; that surface is
# covered by `policy/docker_compose/images.rego` (Conftest, S3 of the plan).
#
# `secrets` framework is intentionally omitted: gitleaks owns L2
# (see .gitleaks.toml and Security-and-Dependencies.md).
#
# `--framework` is restrictive in Checkov 3.x: any framework listed runs;
# anything not listed is skipped entirely.

framework:
  - terraform
  - dockerfile
  - github_actions
  - helm            # renders deploy/helm/** charts and scans the output

# Accepted-by-design Kubernetes findings (Phase 13b PR-B). Checkov's helm
# framework renders to ephemeral temp dirs, so path-based .checkov.baseline is
# unstable for these — skip-check (with justification) is the right mechanism,
# consistent with ADR-015's documented-suppression model. The conftest gate
# (policy/k8s/security.rego) is the primary k8s policy; these are residuals it
# does not cover.
skip-check:
  - CKV_K8S_43    # image digest pin — deferred repo-wide (see policy/docker_compose/images.rego); we pin concrete tags
  - CKV_K8S_15    # imagePullPolicy: Always — intentionally IfNotPresent on pinned/sha tags
  - CKV_K8S_26    # hostPort — deliberate single-node L4 path for QUIC/MPS (server.hostPortL4); preserves client source IP
  - CKV_K8S_40    # high UID — server runs 65532; postgres must run uid 70 (official image)
  - CKV_K8S_35    # secrets as env — the server consumes JWT_SECRET/DATABASE_URL via env, mirroring docker-compose
  - CKV_K8S_22    # read-only rootfs — server + backup comply; the official postgres image writes runtime files
  - CKV_K8S_21    # default namespace — false positive of static render; deployed with --namespace opengate/staging
  - CKV_K8S_153   # ingress snippet annotation (CVE-2021-25742) — chart-controlled headers, single-tenant cluster, gated by allowSnippetAnnotations
  - CKV2_K8S_6    # default-deny NetworkPolicy — CD Phase E (network policies), deprioritized
  - CKV_K8S_17    # hostPID — node-exporter requires the host PID namespace to read per-process node metrics
  - CKV_K8S_38    # SA token mount — promtail needs the token for kubernetes_sd log discovery; app pods set automountServiceAccountToken:false explicitly

# Output: compact terminal table, exits non-zero on any failed check.
compact: true
quiet: true
output: cli

# Directories Checkov should never descend into. Don't include `policy/`
# (that's Rego, not IaC) or `agent/`/`server/`/`web/` (application code, not
# infrastructure-as-code).
skip-path:
  - '\.terraform/.*'
  - 'node_modules/.*'
  - 'agent/target/.*'
  - 'server/coverage.*'
  - 'web/coverage/.*'
  - 'web/reports/.*'
  - 'deploy/tests/fixtures/.*'   # gitleaks canary lives here; not real IaC

# Baseline pins the *currently-accepted* set of findings; future runs fail
# only on *new* findings. Each entry is reviewed before being added; see the
# ADR for the triage convention.
baseline: .checkov.baseline
