name: Docker Hub pull-through mirror
description: >-
  Route docker.io image pulls through Google's public pull-through cache
  (mirror.gcr.io) before any docker/compose step. Hosted runners intermittently
  fail to reach registry-1.docker.io (connection timeouts / anonymous rate
  limits); the mirror is reached over GitHub→Google connectivity and caches the
  common base images (postgres, redis, golang, node), so a Docker Hub blip no
  longer fails the job. Falls back to Docker Hub for any image the mirror lacks,
  using optional credentials to avoid anonymous limits. Additional caches can
  be appended to the daemon's mirror list.

inputs:
  dockerhub-username:
    description: Docker Hub username for authenticated fallback pulls. Optional.
    required: false
    default: ""
  dockerhub-token:
    description: Docker Hub read-only access token. Optional.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Configure registry mirror + restart Docker
      shell: bash
      run: $GITHUB_ACTION_PATH/docker-hub-mirror.sh configure
    - name: Authenticated Docker Hub login
      if: inputs.dockerhub-token != ''
      shell: bash
      env:
        DH_USER: ${{ inputs.dockerhub-username }}
        DH_TOKEN: ${{ inputs.dockerhub-token }}
      run: $GITHUB_ACTION_PATH/docker-hub-mirror.sh login
