name: OCI + kubeconfig Setup
description: Configure OCI credentials and fetch an OKE kubeconfig so kubectl and Helm can reach the cluster.

inputs:
  oci-tenancy:
    required: true
  oci-user:
    required: true
  oci-fingerprint:
    required: true
  oci-private-key:
    required: true
  oci-region:
    required: true
  cluster-id:
    description: OKE cluster OCID (from the oke terraform module's cluster_id output).
    required: true
  helm-version:
    required: false
    default: "3.16.3"

runs:
  using: composite
  steps:
    - name: Install OCI CLI
      shell: bash
      run: pip install oci-cli --quiet

    - name: Configure OCI credentials
      shell: bash
      env:
        OCI_TENANCY: ${{ inputs.oci-tenancy }}
        OCI_USER: ${{ inputs.oci-user }}
        OCI_FINGERPRINT: ${{ inputs.oci-fingerprint }}
        OCI_KEY: ${{ inputs.oci-private-key }}
        OCI_REGION: ${{ inputs.oci-region }}
      run: $GITHUB_ACTION_PATH/oci-kube-setup.sh configure-oci

    - name: Install kubectl + helm
      shell: bash
      env:
        HELM_VERSION: ${{ inputs.helm-version }}
      run: $GITHUB_ACTION_PATH/oci-kube-setup.sh install-kube-tools

    - name: Fetch kubeconfig
      shell: bash
      env:
        CLUSTER_ID: ${{ inputs.cluster-id }}
        OCI_REGION: ${{ inputs.oci-region }}
        OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      run: $GITHUB_ACTION_PATH/oci-kube-setup.sh fetch-kubeconfig
