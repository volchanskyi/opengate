name: OCI + SSH Setup
description: Configure OCI credentials, open NSG firewall for runner, and set up SSH to deploy target.

inputs:
  oci-tenancy:
    required: true
  oci-user:
    required: true
  oci-fingerprint:
    required: true
  oci-private-key:
    required: true
  oci-region:
    required: true
  nsg-id:
    required: true
  ssh-private-key:
    required: true
  deploy-host:
    required: true
  run-id:
    description: GitHub run ID for NSG rule description
    required: true

outputs:
  rule-id:
    description: NSG security rule ID (needed for teardown)
    value: ${{ steps.firewall.outputs.rule_id }}

runs:
  using: composite
  steps:
    - name: Install OCI CLI
      shell: bash
      run: pip install oci-cli --quiet

    - name: Configure OCI credentials
      shell: bash
      env:
        OCI_TENANCY: ${{ inputs.oci-tenancy }}
        OCI_USER: ${{ inputs.oci-user }}
        OCI_FINGERPRINT: ${{ inputs.oci-fingerprint }}
        OCI_KEY: ${{ inputs.oci-private-key }}
        OCI_REGION: ${{ inputs.oci-region }}
      run: |
        mkdir -p ~/.oci
        printf '%s\n' "$OCI_KEY" > ~/.oci/key.pem
        chmod 600 ~/.oci/key.pem
        cat > ~/.oci/config <<EOF
        [DEFAULT]
        tenancy=$OCI_TENANCY
        user=$OCI_USER
        fingerprint=$OCI_FINGERPRINT
        key_file=$HOME/.oci/key.pem
        region=$OCI_REGION
        EOF
        chmod 600 ~/.oci/config

    - name: Cleanup stale firewall rules
      shell: bash
      env:
        NSG_ID: ${{ inputs.nsg-id }}
        OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
      run: |
        # shellcheck disable=SC2016
        STALE_RULES=$(oci network nsg rules list \
          --nsg-id "$NSG_ID" \
          --query 'data[?"description" != null] | [?starts_with(description, `CD:`)].id' \
          --output json 2>/dev/null || echo '[]')

        if [[ "$STALE_RULES" != "[]" && -n "$STALE_RULES" ]]; then
          echo "::warning::Found stale NSG rules from previous runs — cleaning up: $STALE_RULES"
          oci network nsg rules remove \
            --nsg-id "$NSG_ID" \
            --security-rule-ids "$STALE_RULES" || true
        else
          echo "No stale NSG rules found"
        fi

    - name: Open SSH firewall for runner
      id: firewall
      shell: bash
      env:
        NSG_ID: ${{ inputs.nsg-id }}
        OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        RUN_ID: ${{ inputs.run-id }}
      run: |
        RUNNER_IP=$(curl -sf https://ifconfig.me)
        echo "Adding SSH rule for runner IP: $RUNNER_IP"

        RULE_ID=$(oci network nsg rules add \
          --nsg-id "$NSG_ID" \
          --security-rules "[{
            \"direction\": \"INGRESS\",
            \"protocol\": \"6\",
            \"source\": \"${RUNNER_IP}/32\",
            \"sourceType\": \"CIDR_BLOCK\",
            \"isStateless\": false,
            \"tcpOptions\": {
              \"destinationPortRange\": {\"min\": 22, \"max\": 22}
            },
            \"description\": \"CD: GHA runner ${RUNNER_IP} run ${RUN_ID}\"
          }]" \
          --query 'data."security-rules"[0].id' \
          --raw-output)
        echo "rule_id=$RULE_ID" >> "$GITHUB_OUTPUT"
        echo "NSG rule added: $RULE_ID"

        sleep 5

    - name: Configure SSH
      shell: bash
      env:
        SSH_KEY: ${{ inputs.ssh-private-key }}
        DEPLOY_HOST: ${{ inputs.deploy-host }}
      run: |
        if [[ -z "$DEPLOY_HOST" ]]; then
          echo "::error::DEPLOY_HOST secret is empty"
          exit 1
        fi
        if [[ -z "$SSH_KEY" ]]; then
          echo "::error::SSH_KEY secret is empty"
          exit 1
        fi

        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key

        cat >> ~/.ssh/config <<EOF
        Host deploy-target
          HostName $DEPLOY_HOST
          User ubuntu
          IdentityFile ~/.ssh/deploy_key
          StrictHostKeyChecking yes
        EOF

        for attempt in 1 2 3; do
          if ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
            echo "ssh-keyscan succeeded (attempt $attempt)"
            break
          fi
          echo "::warning::ssh-keyscan attempt $attempt failed"
          if [[ $attempt -lt 3 ]]; then sleep 2; else
            echo "::error::ssh-keyscan failed after 3 attempts"
            exit 1
          fi
        done
