version: 2
# All ecosystems target `dev` directly. Dependabot opens PRs against `dev`;
# `.github/workflows/dependabot-auto-merge.yml` auto-merges patch + minor
# updates once CI is green; the existing `merge-to-main` job in
# `.github/workflows/ci.yml` then forwards `dev` → `main`. Major updates
# stay open for human review.
updates:
  - package-ecosystem: gomod
    directory: /server
    target-branch: dev
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: /agent
    target-branch: dev
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      cargo-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /web
    target-branch: dev
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      npm-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      actions-deps:
        patterns: ["*"]
