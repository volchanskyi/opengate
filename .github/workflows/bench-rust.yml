name: Rust Benchmarks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev]

permissions:
  contents: write

jobs:
  bench-rust:
    name: Rust Benchmarks
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: Run benchmarks
        run: cargo bench --package mesh-protocol --bench codec_bench
      - name: Convert criterion JSON to benchmark format
        run: |
          # Read criterion's estimates.json files and produce the JSON format
          # expected by github-action-benchmark's customSmallerIsBetter tool
          jq -n '[inputs | {
            name: input_filename | split("/")[-3],
            unit: "ns/iter",
            value: .mean.point_estimate
          }]' target/criterion/*/new/estimates.json \
            > "$GITHUB_WORKSPACE/bench-rust.json"
          cat "$GITHUB_WORKSPACE/bench-rust.json"
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-rust.json
          benchmark-data-dir-path: dev/bench/rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '120%'
          fail-on-alert: true
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'
