name: Benchmarks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  benchmarks:
    name: Benchmarks
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # --- Toolchains ---
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent

      # --- Go benchmarks ---
      - name: Run Go benchmarks
        working-directory: server
        run: go test -bench=. -benchmem -count=1 -run='^$' ./internal/... | tee "$GITHUB_WORKSPACE/bench-go.txt"
      - name: Store Go benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench-go.txt
          benchmark-data-dir-path: dev/bench/go
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'
          fail-on-alert: true
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'

      # --- Rust benchmarks ---
      - name: Run Rust benchmarks
        working-directory: agent
        run: cargo bench --package mesh-protocol --bench codec_bench
      - name: Convert criterion JSON to benchmark format
        working-directory: agent
        run: |
          # Read criterion's estimates.json files and produce the JSON format
          # expected by github-action-benchmark's customSmallerIsBetter tool
          jq -n '[inputs | {
            name: input_filename | split("/")[-3],
            unit: "ns/iter",
            value: .mean.point_estimate
          }]' target/criterion/*/new/estimates.json \
            > "$GITHUB_WORKSPACE/bench-rust.json"
          cat "$GITHUB_WORKSPACE/bench-rust.json"
      - name: Store Rust benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-rust.json
          benchmark-data-dir-path: dev/bench/rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '120%'
          fail-on-alert: true
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'

      # --- Single push for both results ---
      - name: Push benchmark results
        run: git push origin gh-pages
