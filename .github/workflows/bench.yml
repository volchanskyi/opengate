name: Benchmarks

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  benchmarks:
    name: Benchmarks
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # --- Download benchmark artifacts from CI ---
      - name: Download Go benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-go
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Rust benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-rust
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # --- Store Go benchmark result ---
      - name: Store Go benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench-go.txt
          benchmark-data-dir-path: dev/bench/go
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'

      # --- Store Rust benchmark result ---
      - name: Store Rust benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-rust.json
          benchmark-data-dir-path: dev/bench/rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'

      # --- Single push for both results ---
      - name: Push benchmark results
        run: git push origin gh-pages
