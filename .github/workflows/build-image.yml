name: Build & Push Container Image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [dev, dependabot-dev]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/opengate-server

jobs:
  # --------------------------------------------------------------------------
  # Path-gate: decide whether the diff vs the SHA that produced :latest
  # actually changes any image input. Skipping the multi-arch build saves
  # 1-3 min per run on the ~80% of main-branch commits that only touch
  # docs/agent/deploy/CI. See scripts/build-image-gate.sh.
  # --------------------------------------------------------------------------
  check-image-changed:
    name: Check image inputs changed since :latest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_changed: ${{ steps.gate.outputs.image_changed }}
      prev_sha: ${{ steps.gate.outputs.prev_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Diff image inputs vs :latest
        id: gate
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          HEAD_SHA: ${{ github.sha }}
        run: ./scripts/build-image-gate.sh >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & Push
    needs: check-image-changed
    if: needs.check-image-changed.outputs.image_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image with Cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Generate SBOM attestation
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --type spdxjson \
            --predicate sbom.spdx.json \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 20

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # --------------------------------------------------------------------------
  # Tag-forward path: no image input changed, so reuse the existing :latest
  # digest under the new sha- tag. CD requires sha-<7char> to exist for
  # `docker compose pull` and has no fallback. crane copy stamps the
  # destination tag with the same manifest digest, so cosign signatures,
  # SBOM, and Trivy attestations are inherited via the digest.
  # --------------------------------------------------------------------------
  tag-forward:
    name: Tag-forward :latest → sha-<newsha>
    needs: check-image-changed
    if: needs.check-image-changed.outputs.image_changed != 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Copy :latest → sha-<newsha>
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${HEAD_SHA:0:7}"
          crane copy "${IMAGE}:latest" "${IMAGE}:sha-${SHORT_SHA}"
          echo "::notice::tag-forwarded :latest → sha-${SHORT_SHA} (no image inputs changed)"
