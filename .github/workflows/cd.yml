name: CD

on:
  workflow_run:
    workflows: ["Build & Push Container Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234)"
        required: true

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: volchanskyi/opengate-server

permissions:
  contents: read
  packages: read
  issues: write
  actions: read

jobs:
  # Determine the image tag, verify it exists, and decide whether staging needs
  # to run at all (ADR-025 pre-flight check).
  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      target_digest: ${{ steps.preflight.outputs.target_digest }}
      should_skip_staging: ${{ steps.preflight.outputs.should_skip_staging }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="sha-${SHA:0:7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists in GHCR
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Checking ghcr.io/${{ env.IMAGE_NAME }}:${TAG}..."
          docker manifest inspect "ghcr.io/${{ env.IMAGE_NAME }}:${TAG}" \
            || { echo "::error::Image tag '${TAG}' not found in GHCR"; exit 1; }

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository_owner }}/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "ghcr.io/${{ env.IMAGE_NAME }}:${TAG}"

      - uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7

      - name: Restore prior staging deploy state
        id: restore-state
        uses: actions/cache/restore@v6
        with:
          path: staging-deploy-state.json
          key: cd-deploy-state-staging-v1-${{ github.run_id }}
          restore-keys: |
            cd-deploy-state-staging-v1-

      - name: Pre-flight digest check
        id: preflight
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          TARGET_DIGEST="$(crane digest "${IMAGE}:${TAG}" 2>/dev/null || true)"
          echo "target_digest=${TARGET_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Target digest: ${TARGET_DIGEST:-<unresolved>}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: workflow_dispatch → full deploy"
            exit 0
          fi

          if [[ -z "$TARGET_DIGEST" ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: target digest unresolved → full deploy (fail-open)"
            exit 0
          fi

          if [[ ! -f staging-deploy-state.json ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: no prior state cached → full deploy"
            exit 0
          fi

          PRIOR_DIGEST="$(jq -r '.image_digest // ""' staging-deploy-state.json)"
          PRIOR_SHA="$(jq -r '.git_sha // ""' staging-deploy-state.json)"
          echo "Prior digest: ${PRIOR_DIGEST:-<empty>}"
          echo "Prior sha:    ${PRIOR_SHA:-<empty>}"

          if [[ -z "$PRIOR_DIGEST" ]] || [[ "$TARGET_DIGEST" != "$PRIOR_DIGEST" ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: digest changed → full deploy"
            exit 0
          fi

          if [[ -z "$PRIOR_SHA" ]] \
             || ! git cat-file -e "${PRIOR_SHA}^{commit}" 2>/dev/null \
             || ! git diff --quiet "$PRIOR_SHA" "$GIT_SHA" -- deploy/; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: deploy/** changed since prior deploy → full deploy"
            exit 0
          fi

          echo "should_skip_staging=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Pre-flight: digest and deploy configuration unchanged → skip staging"

  deploy-staging-k8s:
    name: Deploy staging
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_skip_staging != 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
      TARGET_DIGEST: ${{ needs.resolve-tag.outputs.target_digest }}
      NAMESPACE: opengate-staging
      RELEASE: opengate-staging
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright dependencies
        working-directory: web
        run: npm ci && npx playwright install --with-deps chromium

      - name: OCI + kubeconfig setup
        uses: ./.github/actions/oci-kube-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          cluster-id: ${{ secrets.OKE_CLUSTER_ID }}

      - name: Sync namespace + secret
        env:
          JWT_SECRET: ${{ secrets.DEPLOY_STAGING_JWT_SECRET }}
          AMT_PASS: ${{ secrets.DEPLOY_STAGING_AMT_PASS }}
          VAPID_CONTACT: ${{ secrets.DEPLOY_STAGING_VAPID_CONTACT }}
          POSTGRES_PASSWORD: ${{ secrets.DEPLOY_STAGING_POSTGRES_PASSWORD }}
          POSTGRES_APP_PASSWORD: ${{ secrets.DEPLOY_STAGING_POSTGRES_APP_PASSWORD || secrets.DEPLOY_STAGING_POSTGRES_PASSWORD }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          if ! kubectl -n "$NAMESPACE" get secret opengate-secrets >/dev/null 2>&1; then
            kubectl -n "$NAMESPACE" create secret generic opengate-secrets \
              --from-literal=JWT_SECRET="$JWT_SECRET" \
              --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              --from-literal=POSTGRES_APP_PASSWORD="$POSTGRES_APP_PASSWORD" \
              --from-literal=AMT_PASS="$AMT_PASS" \
              --from-literal=VAPID_CONTACT="$VAPID_CONTACT"
          else
            APP_PASSWORD_B64="$(printf '%s' "$POSTGRES_APP_PASSWORD" | base64 | tr -d '\n')"
            kubectl -n "$NAMESPACE" patch secret opengate-secrets --type merge \
              -p "{\"data\":{\"POSTGRES_APP_PASSWORD\":\"${APP_PASSWORD_B64}\"}}"
          fi

      - name: Ensure database role honors RLS
        env:
          POSTGRES_APP_PASSWORD: ${{ secrets.DEPLOY_STAGING_POSTGRES_APP_PASSWORD || secrets.DEPLOY_STAGING_POSTGRES_PASSWORD }}
        run: |
          if ! kubectl -n "$NAMESPACE" get statefulset "${RELEASE}-postgres" >/dev/null 2>&1; then
            echo "Postgres StatefulSet not present yet; zz-app-role.sh will create opengate_app on first bootstrap."
            exit 0
          fi
          kubectl -n "$NAMESPACE" exec -i "statefulset/${RELEASE}-postgres" -- \
            psql -U opengate -d opengate -v ON_ERROR_STOP=1 \
              --set=app_password="$POSTGRES_APP_PASSWORD" <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opengate_app') THEN
              CREATE ROLE opengate_app LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE NOREPLICATION;
            END IF;
          END
          $$;

          ALTER ROLE opengate_app WITH LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE NOREPLICATION PASSWORD :'app_password';
          GRANT CONNECT ON DATABASE opengate TO opengate_app;
          GRANT USAGE, CREATE ON SCHEMA public TO opengate_app;
          GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO opengate_app;
          GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO opengate_app;

          DO $$
          DECLARE
            obj record;
          BEGIN
            FOR obj IN
              SELECT quote_ident(schemaname) || '.' || quote_ident(tablename) AS name
              FROM pg_tables
              WHERE schemaname = 'public'
            LOOP
              EXECUTE format('ALTER TABLE %s OWNER TO opengate_app', obj.name);
            END LOOP;

            FOR obj IN
              SELECT quote_ident(sequence_schema) || '.' || quote_ident(sequence_name) AS name
              FROM information_schema.sequences
              WHERE sequence_schema = 'public'
            LOOP
              EXECUTE format('ALTER SEQUENCE %s OWNER TO opengate_app', obj.name);
            END LOOP;
          END
          $$;

          DO $$
          BEGIN
            IF EXISTS (
              SELECT 1
              FROM pg_roles
              WHERE rolname = 'opengate_app'
                AND (rolsuper OR rolbypassrls)
            ) THEN
              RAISE EXCEPTION 'database role opengate_app must be NOSUPERUSER and NOBYPASSRLS';
            END IF;
          END
          $$;
          SQL

      - name: Helm upgrade
        run: |
          helm upgrade --install "$RELEASE" deploy/helm/opengate -n "$NAMESPACE" \
            -f deploy/helm/opengate/values-staging.yaml \
            --set image.tag="${IMAGE_TAG}" \
            --set domain="${{ secrets.DEPLOY_STAGING_DOMAIN }}" \
            --set certManager.create=false \
            --wait --timeout 5m
          kubectl -n "$NAMESPACE" rollout status "deploy/${RELEASE}-server" --timeout=300s

      - name: Port-forward server
        run: |
          kubectl -n "$NAMESPACE" port-forward "svc/${RELEASE}-server" 18080:8080 >/tmp/pf.log 2>&1 &
          echo "$!" > /tmp/pf.pid
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/pf.log
          exit 1

      - name: Run smoke tests
        run: bash deploy/scripts/smoke-test.sh --host 127.0.0.1 --port 18080 --mode staging --scheme http

      - name: Reset staging DB for E2E
        run: |
          kubectl -n "$NAMESPACE" exec "statefulset/${RELEASE}-postgres" -- \
            psql -U opengate -d opengate -c "
            TRUNCATE TABLE
              security_group_members, device_hardware, device_updates,
              enrollment_tokens, amt_devices, audit_events, web_push_subscriptions,
              agent_sessions, devices, groups_, security_groups, users
            RESTART IDENTITY CASCADE;
            INSERT INTO security_groups (id, org_id, name, description, is_system)
            VALUES ('00000000-0000-0000-0000-000000000001', '00000000-0000-0000-0000-000000000002', 'Administrators', 'Full system access', TRUE)
            ON CONFLICT (id) DO NOTHING;"

      - name: Run Playwright E2E against staging
        working-directory: web
        run: npx playwright test --config=playwright.staging.config.ts

      - name: Write staging deploy state
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          jq -n \
            --arg sha "$GIT_SHA" \
            --arg digest "$TARGET_DIGEST" \
            --arg tag "$IMAGE_TAG" \
            '{ git_sha: $sha, image_digest: $digest, image_tag: $tag }' \
            > staging-deploy-state.json

      - name: Cache staging deploy state
        uses: actions/cache/save@v6
        with:
          path: staging-deploy-state.json
          key: cd-deploy-state-staging-v1-${{ github.run_id }}

      - name: Stop port-forward
        if: always()
        run: kill "$(cat /tmp/pf.pid)" 2>/dev/null || true

  # Deployed fault-tolerance drills, run against staging after E2E. Activation
  # is config-only: skipped unless the STAGING_FAULT_TESTS repo variable is
  # 'true'. When active it gates production promotion (a failed drill blocks the
  # deploy below); STAGING_FAULT_PROFILE picks the enumerated scenario. The
  # in-process app-fault suite gates separately in CI (make test).
  staging-fault-drills:
    name: Staging fault drills
    needs: [resolve-tag, deploy-staging-k8s]
    if: >-
      needs.resolve-tag.outputs.should_skip_staging != 'true' &&
      vars.STAGING_FAULT_TESTS == 'true'
    uses: ./.github/workflows/fault-tolerance.yml
    with:
      scenario: ${{ vars.STAGING_FAULT_PROFILE || 'pod-delete' }}
    secrets: inherit

  deploy-production-k8s:
    name: Deploy production
    needs: [resolve-tag, deploy-staging-k8s, staging-fault-drills]
    # Promote only when staging deployed and the fault drills passed (or were
    # not activated). always() lets this evaluate even though the optional
    # fault-drill job is skipped when STAGING_FAULT_TESTS is off.
    if: >-
      always() &&
      needs.resolve-tag.outputs.should_skip_staging != 'true' &&
      needs.deploy-staging-k8s.result == 'success' &&
      (needs.staging-fault-drills.result == 'success' ||
       needs.staging-fault-drills.result == 'skipped')
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
      NAMESPACE: opengate
      RELEASE: opengate
    steps:
      - uses: actions/checkout@v7

      - name: OCI + kubeconfig setup
        uses: ./.github/actions/oci-kube-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          cluster-id: ${{ secrets.OKE_CLUSTER_ID }}

      - name: Sync namespace + secret
        env:
          JWT_SECRET: ${{ secrets.DEPLOY_JWT_SECRET }}
          AMT_PASS: ${{ secrets.DEPLOY_AMT_PASS }}
          VAPID_CONTACT: ${{ secrets.DEPLOY_VAPID_CONTACT }}
          POSTGRES_PASSWORD: ${{ secrets.DEPLOY_POSTGRES_PASSWORD }}
          POSTGRES_APP_PASSWORD: ${{ secrets.DEPLOY_POSTGRES_APP_PASSWORD || secrets.DEPLOY_POSTGRES_PASSWORD }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          if ! kubectl -n "$NAMESPACE" get secret opengate-secrets >/dev/null 2>&1; then
            kubectl -n "$NAMESPACE" create secret generic opengate-secrets \
              --from-literal=JWT_SECRET="$JWT_SECRET" \
              --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
              --from-literal=POSTGRES_APP_PASSWORD="$POSTGRES_APP_PASSWORD" \
              --from-literal=AMT_PASS="$AMT_PASS" \
              --from-literal=VAPID_CONTACT="$VAPID_CONTACT"
          else
            APP_PASSWORD_B64="$(printf '%s' "$POSTGRES_APP_PASSWORD" | base64 | tr -d '\n')"
            kubectl -n "$NAMESPACE" patch secret opengate-secrets --type merge \
              -p "{\"data\":{\"POSTGRES_APP_PASSWORD\":\"${APP_PASSWORD_B64}\"}}"
          fi

      - name: Ensure database role honors RLS
        env:
          POSTGRES_APP_PASSWORD: ${{ secrets.DEPLOY_POSTGRES_APP_PASSWORD || secrets.DEPLOY_POSTGRES_PASSWORD }}
        run: |
          if ! kubectl -n "$NAMESPACE" get statefulset "${RELEASE}-postgres" >/dev/null 2>&1; then
            echo "Postgres StatefulSet not present yet; zz-app-role.sh will create opengate_app on first bootstrap."
            exit 0
          fi
          kubectl -n "$NAMESPACE" exec -i "statefulset/${RELEASE}-postgres" -- \
            psql -U opengate -d opengate -v ON_ERROR_STOP=1 \
              --set=app_password="$POSTGRES_APP_PASSWORD" <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'opengate_app') THEN
              CREATE ROLE opengate_app LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE NOREPLICATION;
            END IF;
          END
          $$;

          ALTER ROLE opengate_app WITH LOGIN NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE NOREPLICATION PASSWORD :'app_password';
          GRANT CONNECT ON DATABASE opengate TO opengate_app;
          GRANT USAGE, CREATE ON SCHEMA public TO opengate_app;
          GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO opengate_app;
          GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO opengate_app;

          DO $$
          DECLARE
            obj record;
          BEGIN
            FOR obj IN
              SELECT quote_ident(schemaname) || '.' || quote_ident(tablename) AS name
              FROM pg_tables
              WHERE schemaname = 'public'
            LOOP
              EXECUTE format('ALTER TABLE %s OWNER TO opengate_app', obj.name);
            END LOOP;

            FOR obj IN
              SELECT quote_ident(sequence_schema) || '.' || quote_ident(sequence_name) AS name
              FROM information_schema.sequences
              WHERE sequence_schema = 'public'
            LOOP
              EXECUTE format('ALTER SEQUENCE %s OWNER TO opengate_app', obj.name);
            END LOOP;
          END
          $$;

          DO $$
          BEGIN
            IF EXISTS (
              SELECT 1
              FROM pg_roles
              WHERE rolname = 'opengate_app'
                AND (rolsuper OR rolbypassrls)
            ) THEN
              RAISE EXCEPTION 'database role opengate_app must be NOSUPERUSER and NOBYPASSRLS';
            END IF;
          END
          $$;
          SQL

      - name: Helm upgrade
        run: |
          helm upgrade --install "$RELEASE" deploy/helm/opengate -n "$NAMESPACE" \
            -f deploy/helm/opengate/values-production.yaml \
            --set image.tag="${IMAGE_TAG}" \
            --set server.replicas=1 \
            --set domain="${{ secrets.DEPLOY_DOMAIN }}" \
            --set certManager.email="${{ secrets.DEPLOY_ACME_EMAIL }}" \
            --wait --timeout 5m
          kubectl -n "$NAMESPACE" rollout status "deploy/${RELEASE}-server" --timeout=300s

      - name: Port-forward + smoke test
        run: |
          kubectl -n "$NAMESPACE" port-forward "svc/${RELEASE}-server" 18080:8080 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/api/v1/health >/dev/null; then
              break
            fi
            sleep 1
          done
          bash deploy/scripts/smoke-test.sh --host 127.0.0.1 --port 18080 --mode production --scheme http
          kill "$PF_PID" 2>/dev/null || true

  notify-failure:
    name: Create failure issue
    needs: [resolve-tag, deploy-staging-k8s, staging-fault-drills, deploy-production-k8s]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Ensure cd-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "cd-failure" \
            --description "Automated: CD pipeline failure" \
            --color "D93F0B" \
            --force \
            --repo "${{ github.repository }}"

      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURE_LABEL: cd-failure
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/notify_failure.py
