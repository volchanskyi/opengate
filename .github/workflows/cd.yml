name: CD

on:
  workflow_run:
    workflows: ["Build & Push Container Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234)"
        required: true

concurrency:
  group: deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: volchanskyi/opengate-server
  DEPLOY_DIR: /opt/opengate

permissions:
  contents: read
  packages: read
  issues: write
  actions: read

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Determine the image tag, verify it exists in GHCR, and decide
  # whether deploy-staging needs to run at all (ADR-025 pre-flight check).
  # --------------------------------------------------------------------------
  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      target_digest: ${{ steps.preflight.outputs.target_digest }}
      should_skip_staging: ${{ steps.preflight.outputs.should_skip_staging }}
    steps:
      # fetch-depth: 0 required for the `git diff` against deploy/** below.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.image_tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            TAG="sha-${SHA:0:7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: $TAG"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image exists in GHCR
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Checking ghcr.io/${{ env.IMAGE_NAME }}:${TAG}..."
          docker manifest inspect "ghcr.io/${{ env.IMAGE_NAME }}:${TAG}" \
            || { echo "::error::Image tag '${TAG}' not found in GHCR"; exit 1; }

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify image signature
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository_owner }}/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "ghcr.io/${{ env.IMAGE_NAME }}:${TAG}"

      # ADR-025: pre-flight check to short-circuit no-op staging deploys.
      # Pin matches build-image.yml's setup-crane to avoid drift.
      - uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0 # v0.6

      - name: Restore prior staging deploy state
        id: restore-state
        uses: actions/cache/restore@v5
        with:
          path: staging-deploy-state.json
          key: cd-deploy-state-staging-v1-${{ github.run_id }}
          restore-keys: |
            cd-deploy-state-staging-v1-

      - name: Pre-flight digest check
        id: preflight
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GIT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # Resolve the target image's digest from GHCR. Fail-open: a transient
          # crane error falls through to a full deploy.
          TARGET_DIGEST="$(crane digest "${IMAGE}:${TAG}" 2>/dev/null || true)"
          echo "target_digest=${TARGET_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Target digest: ${TARGET_DIGEST:-<unresolved>}"

          # Manual dispatch always proceeds — user intent overrides the cache.
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: workflow_dispatch → full deploy"
            exit 0
          fi

          if [[ -z "$TARGET_DIGEST" ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: target digest unresolved → full deploy (fail-open)"
            exit 0
          fi

          if [[ ! -f staging-deploy-state.json ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: no prior state cached → full deploy"
            exit 0
          fi

          PRIOR_DIGEST="$(jq -r '.image_digest // ""' staging-deploy-state.json)"
          PRIOR_SHA="$(jq -r '.git_sha // ""' staging-deploy-state.json)"
          echo "Prior digest: ${PRIOR_DIGEST:-<empty>}"
          echo "Prior sha:    ${PRIOR_SHA:-<empty>}"

          if [[ -z "$PRIOR_DIGEST" ]] || [[ "$TARGET_DIGEST" != "$PRIOR_DIGEST" ]]; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: digest changed → full deploy"
            exit 0
          fi

          # deploy/** drift since the cached deploy.
          if [[ -z "$PRIOR_SHA" ]] \
             || ! git cat-file -e "${PRIOR_SHA}^{commit}" 2>/dev/null \
             || ! git diff --quiet "$PRIOR_SHA" "$GIT_SHA" -- deploy/; then
            echo "should_skip_staging=false" >> "$GITHUB_OUTPUT"
            echo "Pre-flight: deploy/** changed since prior deploy → full deploy"
            exit 0
          fi

          echo "should_skip_staging=true" >> "$GITHUB_OUTPUT"
          echo "::notice::Pre-flight: digest unchanged AND deploy/** unchanged → SKIP deploy-staging (ADR-025)"

  # --------------------------------------------------------------------------
  # Job 2: Deploy to persistent staging, run smoke tests
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy staging
    needs: resolve-tag
    # ADR-025: skip when the pre-flight check found the target digest matches
    # the cached prior deploy AND deploy/** is unchanged. The on-VPS sentinel
    # remains the source of truth (deploy.sh would skip the compose restart
    # anyway); this gate avoids the ~2-3 min of OCI/SSH/scp setup before that.
    #
    # K8S_CUTOVER (repo variable, ADR-030): unset/false → this compose job runs
    # and deploy-staging-k8s skips; 'true' → this skips and the k8s job runs.
    # deploy-production needs deploy-staging, so it auto-skips on the k8s path.
    if: needs.resolve-tag.outputs.should_skip_staging != 'true' && vars.K8S_CUTOVER != 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
      TARGET_DIGEST: ${{ needs.resolve-tag.outputs.target_digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is needed for the deploy/** drift check below.
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright dependencies
        working-directory: web
        run: npm ci && npx playwright install --with-deps chromium

      - name: OCI + SSH setup
        id: infra
        uses: ./.github/actions/oci-ssh-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          run-id: ${{ github.run_id }}

      - name: Copy deploy files to VPS
        run: |
          # Copy scripts
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/scripts ${{ env.DEPLOY_DIR }}/caddy ${{ env.DEPLOY_DIR }}/postgres"
          scp deploy/scripts/*.sh deploy-target:${{ env.DEPLOY_DIR }}/scripts/
          ssh deploy-target "chmod +x ${{ env.DEPLOY_DIR }}/scripts/*.sh"

          # Copy compose files
          scp deploy/docker-compose.yml deploy-target:${{ env.DEPLOY_DIR }}/
          scp deploy/docker-compose.staging.yml deploy-target:${{ env.DEPLOY_DIR }}/

          # Copy Caddy configs
          scp deploy/caddy/Caddyfile deploy-target:${{ env.DEPLOY_DIR }}/caddy/
          scp deploy/caddy/Caddyfile.staging deploy-target:${{ env.DEPLOY_DIR }}/caddy/

          # Copy Postgres init script
          scp deploy/postgres/init.sql deploy-target:${{ env.DEPLOY_DIR }}/postgres/

          # Copy monitoring configs
          scp deploy/docker-compose.monitoring.yml deploy-target:${{ env.DEPLOY_DIR }}/
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/{victoriametrics,loki,promtail,grafana/provisioning/{datasources,dashboards,alerting}}"
          scp deploy/victoriametrics/scrape.yml deploy-target:${{ env.DEPLOY_DIR }}/victoriametrics/
          scp deploy/loki/loki-config.yml deploy-target:${{ env.DEPLOY_DIR }}/loki/
          scp deploy/promtail/promtail-config.yml deploy-target:${{ env.DEPLOY_DIR }}/promtail/
          scp deploy/grafana/provisioning/datasources/datasources.yml deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/datasources/
          scp deploy/grafana/provisioning/dashboards/*.yml deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/dashboards/
          scp deploy/grafana/provisioning/dashboards/*.json deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/dashboards/
          scp deploy/grafana/provisioning/alerting/*.yml deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/alerting/

      - name: Ensure cosign is installed on VPS
        run: |
          ssh deploy-target 'command -v cosign >/dev/null 2>&1 || {
            echo "Installing cosign..."
            sudo curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-arm64 -o /usr/local/bin/cosign
            sudo chmod +x /usr/local/bin/cosign
            cosign version
          }'

      - name: Compute deploy/** drift vs last deploy
        id: drift_staging
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          LAST_SHA=$(ssh deploy-target \
            "grep -oP '^git_sha=\K.*' ${{ env.DEPLOY_DIR }}/.last-deployed-staging 2>/dev/null || true")
          DEPLOY_CHANGED="true"
          if [[ -n "$LAST_SHA" ]] \
             && git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null \
             && git diff --quiet "$LAST_SHA" "$GIT_SHA" -- deploy/; then
            DEPLOY_CHANGED="false"
          fi
          echo "deploy_changed=$DEPLOY_CHANGED" >> "$GITHUB_OUTPUT"
          echo "last_sha=$LAST_SHA deploy_changed=$DEPLOY_CHANGED"

      - name: Deploy staging
        env:
          JWT_SECRET: ${{ secrets.DEPLOY_STAGING_JWT_SECRET }}
          AMT_PASS: ${{ secrets.DEPLOY_STAGING_AMT_PASS }}
          DOMAIN: ${{ secrets.DEPLOY_STAGING_DOMAIN }}
          VAPID_CONTACT: ${{ secrets.DEPLOY_STAGING_VAPID_CONTACT }}
          POSTGRES_PASSWORD: ${{ secrets.DEPLOY_STAGING_POSTGRES_PASSWORD }}
        run: |
          ssh deploy-target "grep -oP '^IMAGE_TAG=\K.*' ${{ env.DEPLOY_DIR }}/.env.staging 2>/dev/null \
            > ${{ env.DEPLOY_DIR }}/.previous-tag-staging || true"

          printf '%s\n' \
            "IMAGE_TAG=${{ env.IMAGE_TAG }}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "STAGING_JWT_SECRET=${JWT_SECRET}" \
            "STAGING_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            "AMT_USER=admin" \
            "AMT_PASS=${AMT_PASS}" \
            "VAPID_CONTACT=${VAPID_CONTACT}" \
            "DOMAIN=${DOMAIN}" \
            "OPENGATE_GITHUB_REPO=${{ github.repository }}" \
            "OPENGATE_QUIC_HOST=${{ secrets.DEPLOY_QUIC_HOST }}" \
            | ssh deploy-target "cat > ${{ env.DEPLOY_DIR }}/.env.staging"

          ssh deploy-target "bash ${{ env.DEPLOY_DIR }}/scripts/deploy.sh \
            --mode staging --tag ${{ env.IMAGE_TAG }} \
            --git-sha ${{ github.sha }} \
            --deploy-changed ${{ steps.drift_staging.outputs.deploy_changed }}"

      - name: Run smoke tests
        run: |
          ssh deploy-target "bash ${{ env.DEPLOY_DIR }}/scripts/smoke-test.sh \
            --host 127.0.0.1 --port 18080 --mode staging --scheme http"

      - name: Reset staging DB for E2E (fresh user state)
        run: |
          # Truncate all application tables and re-seed the Administrators group.
          ssh deploy-target "docker exec opengate-postgres-staging psql -U opengate -d opengate -c \"
            TRUNCATE TABLE
              security_group_members, device_logs, device_hardware, device_updates,
              enrollment_tokens, amt_devices, audit_events, web_push_subscriptions,
              agent_sessions, devices, groups_, security_groups, users
            RESTART IDENTITY CASCADE;
            INSERT INTO security_groups (id, name, description, is_system)
            VALUES ('00000000-0000-0000-0000-000000000001', 'Administrators', 'Full system access', TRUE)
            ON CONFLICT (id) DO NOTHING;\""

      - name: Open SSH tunnel for Playwright
        run: |
          ssh -fN -L 18080:127.0.0.1:18080 deploy-target
          echo "SSH tunnel established on localhost:18080"

      - name: Run Playwright E2E against staging
        working-directory: web
        run: npx playwright test --config=playwright.staging.config.ts

      - name: Run PageSpeed Insights
        if: success()
        env:
          PSI_API_KEY: ${{ secrets.PSI_API_KEY }}
          DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
        run: |
          if [ -z "$PSI_API_KEY" ] || [ -z "$DOMAIN" ]; then
            echo "::notice::Skipping PSI — missing API key or domain"
            exit 0
          fi
          URL="https://${DOMAIN}/login"
          RESULT=$(curl -sf "https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url=${URL}&strategy=desktop&category=PERFORMANCE&category=ACCESSIBILITY&category=BEST_PRACTICES&key=${PSI_API_KEY}" || true)
          if [ -z "$RESULT" ]; then
            echo "::warning::PSI API call failed — skipping"
            exit 0
          fi
          echo "$RESULT" > psi-report.json
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('psi-report.json', 'utf8'));
            const cats = r.lighthouseResult?.categories || {};
            let md = '## PageSpeed Insights (Production)\n\n| Category | Score |\n|----------|-------|\n';
            Object.values(cats).forEach(c => {
              const score = Math.round(c.score * 100);
              const icon = score >= 90 ? ':green_circle:' : score >= 50 ? ':orange_circle:' : ':red_circle:';
              md += '| ' + c.title + ' | ' + icon + ' ' + score + ' |\n';
            });
            const cwv = r.loadingExperience?.metrics || {};
            if (Object.keys(cwv).length > 0) {
              md += '\n### Core Web Vitals (Field Data)\n\n| Metric | Value | Category |\n|--------|-------|----------|\n';
              Object.entries(cwv).forEach(([name, data]) => {
                md += '| ' + name + ' | ' + data.percentile + ' | ' + data.category + ' |\n';
              });
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "

      - name: Upload PSI report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: psi-report
          path: psi-report.json
          retention-days: 20

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: staging-playwright-report
          path: web/playwright-report/
          retention-days: 20

      # ADR-025: write the pre-flight cache only when the full deploy chain
      # (compose pull/up + smoke + Playwright) succeeded. A rollback path
      # below would leave the VPS on the previous tag, so we must NOT cache
      # the new digest as deployed in that case.
      - name: Write staging deploy state for next pre-flight
        if: success()
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          jq -n \
            --arg sha "$GIT_SHA" \
            --arg digest "$TARGET_DIGEST" \
            --arg tag "$IMAGE_TAG" \
            '{ git_sha: $sha, image_digest: $digest, image_tag: $tag }' \
            > staging-deploy-state.json
          echo "Cached state:"
          cat staging-deploy-state.json

      - name: Cache staging deploy state for next pre-flight
        if: success()
        uses: actions/cache/save@v5
        with:
          path: staging-deploy-state.json
          key: cd-deploy-state-staging-v1-${{ github.run_id }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::warning::Staging deploy failed — rolling back to previous tag"
          ssh deploy-target "bash ${{ env.DEPLOY_DIR }}/scripts/rollback.sh --mode staging" || true

      - name: OCI + SSH teardown
        if: always()
        uses: ./.github/actions/oci-ssh-teardown
        with:
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          rule-id: ${{ steps.infra.outputs.rule-id }}

  # --------------------------------------------------------------------------
  # Job 3: Deploy to production (manual approval required)
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # Job 2b (cutover-gated, ADR-030): deploy staging to OKE via Helm. Dormant
  # until the K8S_CUTOVER repo variable is 'true'. Mirrors deploy-staging but
  # targets the cluster; reuses smoke-test.sh + playwright.staging.config.ts
  # unchanged by port-forwarding the server Service to localhost:18080 (the
  # k8s analogue of the SSH tunnel).
  # --------------------------------------------------------------------------
  deploy-staging-k8s:
    name: Deploy staging (k8s)
    needs: resolve-tag
    if: needs.resolve-tag.outputs.should_skip_staging != 'true' && vars.K8S_CUTOVER == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
      NAMESPACE: opengate-staging
      RELEASE: opengate-staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Playwright dependencies
        working-directory: web
        run: npm ci && npx playwright install --with-deps chromium

      - name: OCI + kubeconfig setup
        uses: ./.github/actions/oci-kube-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          cluster-id: ${{ secrets.OKE_CLUSTER_ID }}

      - name: Sync namespace + secret
        env:
          JWT_SECRET: ${{ secrets.DEPLOY_STAGING_JWT_SECRET }}
          AMT_PASS: ${{ secrets.DEPLOY_STAGING_AMT_PASS }}
          VAPID_CONTACT: ${{ secrets.DEPLOY_STAGING_VAPID_CONTACT }}
          POSTGRES_PASSWORD: ${{ secrets.DEPLOY_STAGING_POSTGRES_PASSWORD }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NAMESPACE" create secret generic opengate-secrets \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=AMT_PASS="$AMT_PASS" \
            --from-literal=VAPID_CONTACT="$VAPID_CONTACT" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade (staging)
        run: |
          helm upgrade --install "$RELEASE" deploy/helm/opengate -n "$NAMESPACE" \
            -f deploy/helm/opengate/values-staging.yaml \
            --set image.tag="${IMAGE_TAG}" \
            --set domain="${{ secrets.DEPLOY_STAGING_DOMAIN }}" \
            --set certManager.create=false \
            --wait --timeout 5m
          kubectl -n "$NAMESPACE" rollout status "deploy/${RELEASE}-server" --timeout=300s

      - name: Port-forward server → localhost:18080
        run: |
          kubectl -n "$NAMESPACE" port-forward "svc/${RELEASE}-server" 18080:8080 >/tmp/pf.log 2>&1 &
          echo $! > /tmp/pf.pid
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:18080/api/v1/health >/dev/null && break
            sleep 1
          done

      - name: Run smoke tests
        run: bash deploy/scripts/smoke-test.sh --host 127.0.0.1 --port 18080 --mode staging --scheme http

      - name: Reset staging DB for E2E (fresh user state)
        run: |
          kubectl -n "$NAMESPACE" exec "statefulset/${RELEASE}-postgres" -- \
            psql -U opengate -d opengate -c "
            TRUNCATE TABLE
              security_group_members, device_logs, device_hardware, device_updates,
              enrollment_tokens, amt_devices, audit_events, web_push_subscriptions,
              agent_sessions, devices, groups_, security_groups, users
            RESTART IDENTITY CASCADE;
            INSERT INTO security_groups (id, name, description, is_system)
            VALUES ('00000000-0000-0000-0000-000000000001', 'Administrators', 'Full system access', TRUE)
            ON CONFLICT (id) DO NOTHING;"

      - name: Run Playwright E2E against staging
        working-directory: web
        run: npx playwright test --config=playwright.staging.config.ts

      - name: Stop port-forward
        if: always()
        run: kill "$(cat /tmp/pf.pid)" 2>/dev/null || true

  deploy-production:
    name: Deploy production
    needs: [resolve-tag, deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is needed for the deploy/** drift check below.
          fetch-depth: 0

      - name: OCI + SSH setup
        id: infra
        uses: ./.github/actions/oci-ssh-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          run-id: ${{ github.run_id }}

      - name: Copy deploy files to VPS
        run: |
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/scripts ${{ env.DEPLOY_DIR }}/caddy ${{ env.DEPLOY_DIR }}/postgres"
          scp deploy/scripts/*.sh deploy-target:${{ env.DEPLOY_DIR }}/scripts/
          ssh deploy-target "chmod +x ${{ env.DEPLOY_DIR }}/scripts/*.sh"

          scp deploy/docker-compose.yml deploy-target:${{ env.DEPLOY_DIR }}/
          scp deploy/caddy/Caddyfile deploy-target:${{ env.DEPLOY_DIR }}/caddy/

          # Copy Postgres init script
          scp deploy/postgres/init.sql deploy-target:${{ env.DEPLOY_DIR }}/postgres/

          # Copy monitoring configs
          scp deploy/docker-compose.monitoring.yml deploy-target:${{ env.DEPLOY_DIR }}/
          ssh deploy-target "mkdir -p ${{ env.DEPLOY_DIR }}/{victoriametrics,loki,promtail,grafana/provisioning/{datasources,dashboards,alerting}}"
          scp deploy/victoriametrics/scrape.yml deploy-target:${{ env.DEPLOY_DIR }}/victoriametrics/
          scp deploy/loki/loki-config.yml deploy-target:${{ env.DEPLOY_DIR }}/loki/
          scp deploy/promtail/promtail-config.yml deploy-target:${{ env.DEPLOY_DIR }}/promtail/
          scp deploy/grafana/provisioning/datasources/datasources.yml deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/datasources/
          scp deploy/grafana/provisioning/dashboards/*.yml deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/dashboards/
          scp deploy/grafana/provisioning/dashboards/*.json deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/dashboards/
          scp deploy/grafana/provisioning/alerting/*.yml deploy-target:${{ env.DEPLOY_DIR }}/grafana/provisioning/alerting/

      - name: Ensure cosign is installed on VPS
        run: |
          ssh deploy-target 'command -v cosign >/dev/null 2>&1 || {
            echo "Installing cosign..."
            sudo curl -sSfL https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-arm64 -o /usr/local/bin/cosign
            sudo chmod +x /usr/local/bin/cosign
            cosign version
          }'

      - name: Compute deploy/** drift vs last deploy
        id: drift_production
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          LAST_SHA=$(ssh deploy-target \
            "grep -oP '^git_sha=\K.*' ${{ env.DEPLOY_DIR }}/.last-deployed 2>/dev/null || true")
          DEPLOY_CHANGED="true"
          if [[ -n "$LAST_SHA" ]] \
             && git cat-file -e "${LAST_SHA}^{commit}" 2>/dev/null \
             && git diff --quiet "$LAST_SHA" "$GIT_SHA" -- deploy/; then
            DEPLOY_CHANGED="false"
          fi
          echo "deploy_changed=$DEPLOY_CHANGED" >> "$GITHUB_OUTPUT"
          echo "last_sha=$LAST_SHA deploy_changed=$DEPLOY_CHANGED"

      - name: Deploy production
        env:
          JWT_SECRET: ${{ secrets.DEPLOY_JWT_SECRET }}
          AMT_PASS: ${{ secrets.DEPLOY_AMT_PASS }}
          DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
          VAPID_CONTACT: ${{ secrets.DEPLOY_VAPID_CONTACT }}
          POSTGRES_PASSWORD: ${{ secrets.DEPLOY_POSTGRES_PASSWORD }}
          GF_ADMIN_PASSWORD: ${{ secrets.DEPLOY_GF_ADMIN_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
        run: |
          ssh deploy-target "grep -oP '^IMAGE_TAG=\K.*' ${{ env.DEPLOY_DIR }}/.env 2>/dev/null \
            > ${{ env.DEPLOY_DIR }}/.previous-tag || true"

          printf '%s\n' \
            "IMAGE_TAG=${{ env.IMAGE_TAG }}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            "AMT_USER=admin" \
            "AMT_PASS=${AMT_PASS}" \
            "VAPID_CONTACT=${VAPID_CONTACT}" \
            "DOMAIN=${DOMAIN}" \
            "OPENGATE_GITHUB_REPO=${{ github.repository }}" \
            "OPENGATE_QUIC_HOST=${{ secrets.DEPLOY_QUIC_HOST }}" \
            | ssh deploy-target "cat > ${{ env.DEPLOY_DIR }}/.env"

          printf '%s\n' \
            "GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}" \
            "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
            "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" \
            "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" \
            | ssh deploy-target "cat > ${{ env.DEPLOY_DIR }}/.env.monitoring && chmod 600 ${{ env.DEPLOY_DIR }}/.env.monitoring"

          ssh deploy-target "bash ${{ env.DEPLOY_DIR }}/scripts/deploy.sh \
            --mode production --tag ${{ env.IMAGE_TAG }} \
            --git-sha ${{ github.sha }} \
            --deploy-changed ${{ steps.drift_production.outputs.deploy_changed }}"

      - name: Run production health check
        run: |
          ssh deploy-target "bash ${{ env.DEPLOY_DIR }}/scripts/smoke-test.sh \
            --mode production --domain ${{ secrets.DEPLOY_DOMAIN }}"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::warning::Production deploy failed — rolling back to previous tag"
          ssh deploy-target "bash ${{ env.DEPLOY_DIR }}/scripts/rollback.sh --mode production" || true

      - name: OCI + SSH teardown
        if: always()
        uses: ./.github/actions/oci-ssh-teardown
        with:
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          rule-id: ${{ steps.infra.outputs.rule-id }}

  # --------------------------------------------------------------------------
  # Job 4: Notify on failure via GitHub Issues
  # --------------------------------------------------------------------------
  # --------------------------------------------------------------------------
  # Job 3b (cutover-gated, ADR-030): deploy production to OKE via Helm. Dormant
  # until K8S_CUTOVER == 'true'; auto-skips otherwise (needs deploy-staging-k8s).
  # --------------------------------------------------------------------------
  deploy-production-k8s:
    name: Deploy production (k8s)
    needs: [resolve-tag, deploy-staging-k8s]
    if: vars.K8S_CUTOVER == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
      NAMESPACE: opengate
      RELEASE: opengate
    steps:
      - uses: actions/checkout@v6

      - name: OCI + kubeconfig setup
        uses: ./.github/actions/oci-kube-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          cluster-id: ${{ secrets.OKE_CLUSTER_ID }}

      - name: Sync namespace + secret
        env:
          JWT_SECRET: ${{ secrets.DEPLOY_JWT_SECRET }}
          AMT_PASS: ${{ secrets.DEPLOY_AMT_PASS }}
          VAPID_CONTACT: ${{ secrets.DEPLOY_VAPID_CONTACT }}
          POSTGRES_PASSWORD: ${{ secrets.DEPLOY_POSTGRES_PASSWORD }}
        run: |
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "$NAMESPACE" create secret generic opengate-secrets \
            --from-literal=JWT_SECRET="$JWT_SECRET" \
            --from-literal=POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --from-literal=AMT_PASS="$AMT_PASS" \
            --from-literal=VAPID_CONTACT="$VAPID_CONTACT" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm upgrade (production)
        run: |
          helm upgrade --install "$RELEASE" deploy/helm/opengate -n "$NAMESPACE" \
            -f deploy/helm/opengate/values-production.yaml \
            --set image.tag="${IMAGE_TAG}" \
            --set server.replicas=1 \
            --set domain="${{ secrets.DEPLOY_DOMAIN }}" \
            --set certManager.email="${{ secrets.DEPLOY_ACME_EMAIL }}" \
            --wait --timeout 5m
          kubectl -n "$NAMESPACE" rollout status "deploy/${RELEASE}-server" --timeout=300s

      - name: Port-forward + smoke test
        run: |
          kubectl -n "$NAMESPACE" port-forward "svc/${RELEASE}-server" 18080:8080 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          for _ in $(seq 1 30); do
            curl -sf http://127.0.0.1:18080/api/v1/health >/dev/null && break
            sleep 1
          done
          bash deploy/scripts/smoke-test.sh --host 127.0.0.1 --port 18080 --mode production --scheme http
          kill "$PF_PID" 2>/dev/null || true

  notify-failure:
    name: Create failure issue
    needs: [resolve-tag, deploy-staging, deploy-staging-k8s, deploy-production, deploy-production-k8s]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Ensure cd-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "cd-failure" \
            --description "Automated: CD pipeline failure" \
            --color "D93F0B" \
            --force \
            --repo "${{ github.repository }}"

      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FAILURE_LABEL: cd-failure
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/notify_failure.py
