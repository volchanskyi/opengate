  perf-publish:
    name: Publish Performance Data
    needs: [e2e, web-bundle-size]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: Download Lighthouse results
        uses: actions/download-artifact@v8
        with:
          name: lighthouse-results
          path: lighthouse-results/
      - name: Download bundle size report
        uses: actions/download-artifact@v8
        with:
          name: bundle-size-report
          path: .
      - name: Update performance data
        run: |
          mkdir -p gh-pages/dev/perf
          node -e "
            const fs = require('fs');
            const dir = './lighthouse-results';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('manifest'));
            if (files.length === 0) process.exit(0);
            const report = JSON.parse(fs.readFileSync(dir + '/' + files[files.length - 1], 'utf8'));
            const entry = {
              date: new Date().toISOString(),
              sha: (process.env.GITHUB_SHA || '').substring(0, 7),
              scores: {}
            };
            Object.entries(report.categories).forEach(([key, val]) => {
              entry.scores[key] = Math.round(val.score * 100);
            });
            const histFile = 'gh-pages/dev/perf/lighthouse-history.json';
            const history = fs.existsSync(histFile) ? JSON.parse(fs.readFileSync(histFile, 'utf8')) : [];
            history.push(entry);
            fs.writeFileSync(histFile, JSON.stringify(history.slice(-100), null, 2));
          "
          cp size-report.json gh-pages/dev/perf/latest-bundle-size.json
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/perf/
          git diff --cached --quiet && exit 0
          git commit -m "perf: update Lighthouse + bundle size data"
          git push

  iac-gate:
    # Inlined from the former .github/workflows/iac-plan-preview.yml so
    # merge-to-main can `needs:` it (cross-workflow `needs:` is not supported).
    # Runs `terraform plan` against the remote backend whenever a commit or PR
    # touches `deploy/terraform/**` or the parser script. The plan summary is
    # posted as a sticky PR comment on PR events and written to
    # GITHUB_STEP_SUMMARY on push events. A destroy of a protected resource
    # type (VCN / subnet / security list / NSG / state bucket) fails the gate
    # unless the PR carries the `iac:approve-destroy` label.
    #
    # No bypass exists for direct pushes to dev: destructive terraform changes
    # must go through a labelled PR. Drift detection
    # (`.github/workflows/terraform-drift.yml`) is the complementary control
    # that catches anything the gate missed.
    #
    # Path filter: the job is always queued, but every terraform step is
    # gated on `steps.changes.outputs.terraform == 'true'` so non-terraform
    # commits complete in ~10s without paying for `terraform init`. That keeps
    # this safe to be a `needs:` of `merge-to-main` for every push.
    name: IaC plan + destroy-blocklist gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write  # for the sticky PR comment on PR events
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need a baseline for git diff in the change-detection step

      - name: Detect terraform changes
        id: changes
        run: |
          set -euo pipefail
          # Pick the diff baseline based on the event:
          #   pull_request → the PR base commit
          #   push         → github.event.before (the previous tip of the branch)
          #                  except on a brand-new branch first push, where
          #                  github.event.before is all zeros; fall back to HEAD~1.
          #   workflow_dispatch / anything else → no clear baseline; run the gate.
          case "${{ github.event_name }}" in
            pull_request)
              BASE_SHA="${{ github.event.pull_request.base.sha }}"
              ;;
            push)
              BEFORE="${{ github.event.before }}"
              if [[ "$BEFORE" =~ ^0+$ ]]; then BASE_SHA="HEAD~1"; else BASE_SHA="$BEFORE"; fi
              ;;
            *)
              echo "no baseline for event=${{ github.event_name }}; running the gate"
              echo "terraform=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          if git diff --name-only "$BASE_SHA" HEAD 2>/dev/null | \
               grep -qE '^deploy/terraform/|^deploy/scripts/parse-tfplan\.sh$'; then
            echo "terraform changes detected; running the gate"
            echo "terraform=true" >> "$GITHUB_OUTPUT"
          else
            echo "no terraform changes; gate skipped (job stays green)"
            echo "terraform=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        if: steps.changes.outputs.terraform == 'true'
        with:
          terraform_version: 1.9.x

      - name: Write OCI provider API key
        if: steps.changes.outputs.terraform == 'true'
        env:
          OCI_DRIFT_PRIVATE_KEY: ${{ secrets.OCI_DRIFT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_DRIFT_PRIVATE_KEY" > ~/.oci/drift.pem
          chmod 600 ~/.oci/drift.pem

      - name: Write backend config
        if: steps.changes.outputs.terraform == 'true'
        env:
          OCI_TFSTATE_NAMESPACE: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cat > /tmp/backend.tfbackend <<EOF
          endpoints = {
            s3 = "https://${OCI_TFSTATE_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          }
          EOF

      - name: Verify OCI endpoint reachability + credential shape
        if: steps.changes.outputs.terraform == 'true'
        uses: ./.github/actions/verify-oci-tfstate-creds
        with:
          oci-tfstate-namespace: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          oci-region: ${{ secrets.OCI_REGION }}
          tfstate-s3-access-key: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          tfstate-s3-secret-key: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          oci-tenancy-ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user-ocid: ${{ secrets.OCI_DRIFT_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_DRIFT_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_DRIFT_PRIVATE_KEY }}

      - name: Terraform init (with retry on transient OCI DNS / S3-compat flake)
        if: steps.changes.outputs.terraform == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: |
          set -e
          for attempt in 1 2 3; do
            if terraform -chdir=deploy/terraform init -backend-config=/tmp/backend.tfbackend -input=false; then
              exit 0
            fi
            echo "::warning::terraform init attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::terraform init failed after 3 attempts"
          exit 1

      - name: Terraform plan
        id: plan
        if: steps.changes.outputs.terraform == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_DRIFT_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_DRIFT_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/drift.pem
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          TF_VAR_ssh_allowed_cidr: 203.0.113.0/24
          TF_VAR_ssh_public_key_path: /dev/null
        run: |
          terraform -chdir=deploy/terraform plan -out=plan.tfplan -input=false -no-color
          terraform -chdir=deploy/terraform show -json plan.tfplan > /tmp/plan.json

      - name: Parse plan, build summary, gate destroys
        id: parse
        if: steps.changes.outputs.terraform == 'true'
        env:
          # The destroy bypass is gated to PRs only: a PR may carry the
          # `iac:approve-destroy` label after human review. Direct pushes
          # have no PR and no label → no bypass → destructive terraform
          # changes are hard-blocked on dev.
          HAS_APPROVE_DESTROY: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'iac:approve-destroy') }}
        run: |
          set -euo pipefail
          ARGS=()
          if [[ "$HAS_APPROVE_DESTROY" == "true" ]]; then
            ARGS+=(--approve-destroy)
          fi
          set +e
          ./deploy/scripts/parse-tfplan.sh /tmp/plan.json "${ARGS[@]}" > /tmp/pr-body.md 2>/tmp/parse-stderr.txt
          ec=$?
          set -e
          echo "parse_exit=$ec" >> "$GITHUB_OUTPUT"
          # GitHub PR comments are capped at 64 KB; trim with margin.
          head -c 60000 /tmp/pr-body.md > /tmp/pr-body-trim.md
          cat /tmp/pr-body-trim.md
          {
            echo "body<<PRBODY_EOF"
            cat /tmp/pr-body-trim.md
            echo "PRBODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        if: steps.changes.outputs.terraform == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          PR_BODY: ${{ steps.parse.outputs.body }}
        with:
          script: |
            const wfPath = '.github/workflows/ci.yml';
            const wfUrl =
              `${context.serverUrl}/${context.repo.owner}` +
              `/${context.repo.repo}/blob/${context.sha}/${wfPath}`;
            const marker = '### IaC plan preview';
            const body =
              `${marker}\n\n${process.env.PR_BODY}\n\n` +
              `_Posted by the \`iac-gate\` job in [\`${wfPath}\`](${wfUrl})._`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Write plan summary to job summary (push events)
        if: steps.changes.outputs.terraform == 'true' && github.event_name != 'pull_request'
        run: |
          {
            echo "### IaC plan preview"
            echo ""
            cat /tmp/pr-body-trim.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow on protected-resource destroy
        if: steps.changes.outputs.terraform == 'true' && steps.parse.outputs.parse_exit != '0'
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "::error::Plan destroys a protected resource. Add the 'iac:approve-destroy' label to this PR and re-run the workflow to override."
          else
            echo "::error::Plan destroys a protected resource. Direct-push destroys are blocked unconditionally — open a PR carrying the 'iac:approve-destroy' label instead."
          fi
          exit 1

  merge-to-main:
    name: Auto-merge to main
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - pentest-review
      - sonarcloud
      - e2e
      - go-bench
      - rust-bench
      - web-bundle-size
      - iac-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge source into main
        id: merge
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          git fetch origin "$SOURCE"
          if git merge-base --is-ancestor origin/"$SOURCE" HEAD; then
            echo "main already contains all commits from $SOURCE — skipping"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git merge --no-ff origin/"$SOURCE" -m "ci: auto-merge $SOURCE → main"
          git push origin main
          echo "merged=true" >> "$GITHUB_OUTPUT"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-coverage.json
          label: Go Server Coverage
          message: ${{ needs.go-unit.outputs.coverage }}%
          valColorRange: ${{ needs.go-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 90
      - name: Update Rust coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-rust-coverage.json
          label: Rust Agent Coverage
          message: ${{ needs.rust-test.outputs.coverage }}%
          valColorRange: ${{ needs.rust-test.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 90
      - name: Update Web coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-web-coverage.json
          label: Web Client Coverage
          message: ${{ needs.web-unit.outputs.coverage }}%
          valColorRange: ${{ needs.web-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 90

  auto-tag:
    name: Auto-tag release
    needs: [merge-to-main]
    if: needs.merge-to-main.outputs.merged == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: auto-tag
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Ivan Volchanskyi"
          git config user.email "ivan.volchanskyi@gmail.com"

      - name: Determine version bump
        id: bump
        run: |
          # Find latest semver tag, default to v0.0.0
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          LATEST="${LATEST:-v0.0.0}"
          SEMVER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"

          # Get commits merged in the last merge commit (--no-ff merge)
          MERGE_SHA=$(git rev-parse HEAD)
          COMMITS=$(git log --format='%s' "${MERGE_SHA}^1..${MERGE_SHA}^2" 2>/dev/null || echo "")

          if [ -z "$COMMITS" ]; then
            echo "No new commits to analyze"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level (highest wins)
          BUMP=""
          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.*\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.*\))?:'; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No release-worthy commits (ci/style/refactor/docs/test only)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → $NEW_TAG (was $LATEST)"
          {
            echo "tag=$NEW_TAG"
            echo "version=${MAJOR}.${MINOR}.${PATCH}"
            echo "prev=$LATEST"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          MERGE_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)

          # Collect commits by category
          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Strip type prefix, keep scope and description
            MSG=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?!?:\s*//')
            SCOPE=$(echo "$line" | sed -nE 's/^[a-z]+\(([^)]*)\).*$/\1/p')
            [ -n "$SCOPE" ] && MSG="**$SCOPE:** $MSG"

            if echo "$line" | grep -qE '^feat(\(.*\))?:'; then
              ADDED="${ADDED}\n- ${MSG}"
            elif echo "$line" | grep -qE '^fix(\(.*\))?:'; then
              FIXED="${FIXED}\n- ${MSG}"
            elif echo "$line" | grep -qE '^(refactor|perf)(\(.*\))?:'; then
              CHANGED="${CHANGED}\n- ${MSG}"
            fi
          done <<< "$(git log --format='%s' "${MERGE_SHA}^1..${MERGE_SHA}^2" 2>/dev/null)"

          # Build the new entry
          ENTRY="## [${TAG}] - ${DATE}"
          [ -n "$ADDED" ]  && ENTRY="${ENTRY}\n\n### Added$(echo -e "$ADDED")"
          [ -n "$FIXED" ]  && ENTRY="${ENTRY}\n\n### Fixed$(echo -e "$FIXED")"
          [ -n "$CHANGED" ] && ENTRY="${ENTRY}\n\n### Changed$(echo -e "$CHANGED")"

          # Insert after the header (before the first ## entry or at end)
          if [ -f CHANGELOG.md ]; then
            awk -v entry="$(echo -e "$ENTRY")" '
              /^## \[/ && !inserted { print entry; print ""; inserted=1 }
              { print }
              ENDFILE { if (!inserted) { print ""; print entry } }
            ' CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),"
              echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
              echo ""
              echo -e "$ENTRY"
              echo ""
            } > CHANGELOG.md
          fi

      - name: Commit changelog and tag
        id: push
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"

          # Check if tag already exists (idempotency)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for $TAG [skip ci]"
          git tag "$TAG"
          git push origin main "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-agent.yml -f tag="${{ steps.bump.outputs.tag }}"
          echo "Dispatched release-agent.yml for ${{ steps.bump.outputs.tag }}"

  notify-failure:
    name: Create failure issue
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
      - e2e
      - go-bench
      - rust-bench
      - deploy-api-docs
      - merge-to-main
      - auto-tag
    if: >-
      failure()
      && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "ci-failure" \
            --description "Automated: CI pipeline failure" \
            --color "B60205" \
            --force \
            --repo "${{ github.repository }}"
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/notify_failure.py
