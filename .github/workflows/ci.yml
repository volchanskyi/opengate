name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions: {}

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      # ADR-020 §5.2 — Rust architecture gates.
      - name: Cache cargo-deny + cargo-modules binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/bin/cargo-modules
          key: arch-lint-tools-${{ runner.os }}-v1
      - name: Install cargo-deny + cargo-modules (if not cached)
        run: |
          command -v cargo-deny    || cargo install --locked cargo-deny
          command -v cargo-modules || cargo install --locked cargo-modules
      - name: cargo-deny check
        run: cargo-deny check --hide-inclusion-graph
      - name: cargo modules snapshot diff
        run: |
          actual=$(NO_COLOR=1 cargo modules structure --no-fns --no-types --no-traits --package mesh-agent-core 2>&1)
          if ! printf "%s\n" "$actual" | diff -u crates/mesh-agent-core/tests/module-graph.snap - ; then
            echo "::error::mesh-agent-core module graph diverged from the ADR-020 §5.2 snapshot."
            echo "If intentional, regenerate locally and commit:"
            echo "  cd agent && NO_COLOR=1 cargo modules structure --no-fns --no-types --no-traits --package mesh-agent-core > crates/mesh-agent-core/tests/module-graph.snap"
            exit 1
          fi

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
      - uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2
        with:
          tool: cargo-nextest
      - name: Tests
        run: |
          set +e
          cargo nextest run --workspace --no-fail-fast --color never > test-output.txt 2>&1
          EXIT_CODE=$?
          cat test-output.txt
          SUMMARY=$(grep "Summary" test-output.txt | tail -1 || echo "no summary")
          FAIL_TESTS=$(grep " FAIL " test-output.txt || echo "")
          {
            echo "## Rust Tests"
            echo ""
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ $SUMMARY"
            else
              echo "❌ $SUMMARY"
              if [ -n "$FAIL_TESTS" ]; then
                echo ""
                # shellcheck disable=SC2001
                echo "$FAIL_TESTS" | sed 's/.*FAIL \[.*\] /- ❌ /'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Generate golden files
        run: GENERATE_GOLDEN=1 cargo nextest run -p mesh-protocol -E 'binary(golden_test)'
      - uses: actions/upload-artifact@v7
        with:
          name: golden-files
          path: testdata/golden/
          retention-days: 20
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2 — newer pin requires explicit tool input
        with:
          tool: cargo-llvm-cov
      - name: Generate Rust coverage
        id: coverage
        run: |
          cargo llvm-cov nextest --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(main\.rs|/webrtc\.rs|/terminal\.rs|/session/mod\.rs|/session/relay\.rs|/tests/)' \
            --fail-under-lines 80
          # cargo-llvm-cov only writes LCOV to the file when --lcov is set,
          # so compute the line-coverage % from lcov.info directly.
          PCT=$(awk -F: '
            /^LF:/ { lf += $2 }
            /^LH:/ { lh += $2 }
            END { if (lf > 0) printf "%.1f", (lh / lf) * 100; else print "0" }
          ' lcov.info)
          echo "Rust coverage: $PCT%"
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
      - name: Upload Rust coverage
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: agent/lcov.info
          retention-days: 20

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      # ADR-020 §5.1 — Go architecture gate.
      - name: Install go-arch-lint
        run: go install github.com/fe3dback/go-arch-lint@v1.15.0
      - name: go-arch-lint check
        run: go-arch-lint check
      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0
      - name: Verify OpenAPI codegen is in sync
        run: |
          cd server && oapi-codegen -config oapi-codegen.yaml ../api/openapi.yaml > internal/api/openapi_gen.go
          cd ..
          git diff --exit-code -- server/internal/api/ || {
            echo "::error::OpenAPI generated code is out of sync. Run oapi-codegen and commit."
            exit 1
          }

  go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: server
    # Postgres is launched manually below (not as a service) so we can pass
    # `-c max_connections=400`. The default 100-conn limit saturates when
    # tests run in parallel — each parallel test holds its own schema via
    # testutil.NewTestStore and the working set of transient conns exceeds
    # 100 with `go test -p $GOMAXPROCS`.
    env:
      POSTGRES_TEST_URL: postgres://opengate:opengate@localhost:5432/opengate_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - name: Start Postgres with max_connections=400
        working-directory: .
        run: |
          docker run -d --rm --name pg-ci \
            -e POSTGRES_USER=opengate -e POSTGRES_PASSWORD=opengate -e POSTGRES_DB=opengate_test \
            -p 5432:5432 postgres:17-alpine -c max_connections=400
          for i in {1..30}; do
            if docker exec pg-ci pg_isready -U opengate -d opengate_test >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempt(s)"; exit 0
            fi
            sleep 1
          done
          echo "::error::postgres never became ready"; docker logs pg-ci; exit 1
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Unit tests with coverage
        run: |
          set +e
          go test -json -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./internal/... > unit-results.json 2>unit-stderr.log
          cat unit-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Unit Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              echo "| Package | Test |"
              echo "|---------|------|"
              jq -r 'select(.Action=="fail" and .Test != null) | "| \(.Package | split("/") | last) | \(.Test) |"' unit-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          # Exclude test scaffolding, generated code, and infrastructure
          # exposition. WSMAN's IO surface is now covered by in-package wire
          # tests (Phase B / B3) and no longer needs an exclusion carve-out.
          grep -v -E '/(testutil|metrics)/|api/openapi_gen\.go' coverage.out > coverage-prod.out
          TOTAL=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: $TOTAL%"
          go tool cover -func=coverage-prod.out
          echo "percentage=$TOTAL" >> "$GITHUB_OUTPUT"
          THRESHOLD=80
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Coverage $TOTAL% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: server/coverage.out
          retention-days: 20

  go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Integration tests
        run: |
          set +e
          go test -json -race -timeout 5m ./tests/integration/ > integration-results.json 2>integration-stderr.log
          cat integration-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Integration Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              jq -r 'select(.Action=="fail" and .Test != null) | "- ❌ \(.Test)"' integration-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  go-bench:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    # See go-unit job above for rationale on launching Postgres manually
    # with `-c max_connections=400`.
    env:
      POSTGRES_TEST_URL: postgres://opengate:opengate@localhost:5432/opengate_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - name: Start Postgres with max_connections=400
        working-directory: .
        run: |
          docker run -d --rm --name pg-ci \
            -e POSTGRES_USER=opengate -e POSTGRES_PASSWORD=opengate -e POSTGRES_DB=opengate_test \
            -p 5432:5432 postgres:17-alpine -c max_connections=400
          for i in {1..30}; do
            if docker exec pg-ci pg_isready -U opengate -d opengate_test >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempt(s)"; exit 0
            fi
            sleep 1
          done
          echo "::error::postgres never became ready"; docker logs pg-ci; exit 1
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Run Go benchmarks
        run: go test -bench=. -benchmem -count=1 -run='^$' ./internal/... | tee "$GITHUB_WORKSPACE/bench-go.txt"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-go
          path: bench-go.txt
          retention-days: 20

  rust-bench:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
      - name: Run Rust benchmarks
        run: cargo bench --package mesh-protocol --bench codec_bench
      - name: Convert criterion JSON to benchmark format
        run: |
          jq -n '[inputs | {
            name: input_filename | split("/")[-3],
            unit: "ns/iter",
            value: .mean.point_estimate
          }]' target/criterion/*/new/estimates.json \
            > "$GITHUB_WORKSPACE/bench-rust.json"
          cat "$GITHUB_WORKSPACE/bench-rust.json"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-rust
          path: bench-rust.json
          retention-days: 20

  golden:
    name: Golden File Verification (bidirectional)
    needs: [rust-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/download-artifact@v8
        with:
          name: golden-files
          path: testdata/golden/
      - name: Generate reverse goldens + sidecars (Go encodes)
        working-directory: server
        run: GENERATE_GOLDEN=1 go test ./internal/protocol/ -run "TestGenerateReverseGoldens|TestGenerateForwardSidecars" -v
      - name: Verify forward goldens (Go decodes Rust-encoded)
        working-directory: server
        run: go test ./internal/protocol/ -run TestGolden -v
      - name: Verify reverse goldens (Rust decodes Go-encoded)
        working-directory: agent
        run: cargo test -p mesh-protocol --test reverse_golden_test
      - name: Verify golden files unchanged (bidirectional drift gate)
        run: git diff --exit-code -- testdata/golden/

  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      # ADR-020 §5.3 — web architecture gate (cross-feature edge count).
      - name: depcruise snapshot check
        run: |
          current=$(npx --no-install depcruise src --output-type json --no-progress 2>/dev/null | jq -r ".summary.warn")
          baseline=$(jq -r ".warn" dependency-cruiser.snapshot.json)
          if [ -f ../.claude/.markers/arch-lint-flipped/depcruise ]; then
            if [ "$current" -gt 0 ]; then
              echo "::error::depcruise (flipped to error mode per ADR-020 §5.4) violations: current=$current"
              exit 1
            fi
          else
            if [ "$current" -gt "$baseline" ]; then
              echo "::error::depcruise warning count grew: current=$current baseline=$baseline (ADR-020 §5.3)."
              echo "Either fix the new violation or, if intentional, update the baseline:"
              echo "  jq \".warn = \$current\" web/dependency-cruiser.snapshot.json > /tmp/snap.json && mv /tmp/snap.json web/dependency-cruiser.snapshot.json"
              exit 1
            fi
          fi
      - name: Verify generated API types are in sync
        # Mirrors the Go-side codegen drift check earlier in this workflow.
        # Regenerate `src/types/api.d.ts` from the OpenAPI spec; if the diff
        # is non-empty the developer forgot to run `npm run generate:api`
        # after editing `api/openapi.yaml`.
        run: |
          npm run generate:api
          if ! git diff --exit-code -- src/types/api.d.ts; then
            echo "::error::src/types/api.d.ts is out of sync with api/openapi.yaml. Run \`cd web && npm run generate:api\` and commit."
            exit 1
          fi

  web-unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Unit & component tests
        run: |
          set +e
          npx vitest run --coverage --reporter=verbose --reporter=json --outputFile=test-results.json src/
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const p = r.numPassedTests, f = r.numFailedTests;
            let md = '## Web Unit Tests\n\n';
            if (f === 0) {
              md += '✅ **' + p + ' passed**\n';
            } else {
              md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
              r.testResults.forEach(s => s.assertionResults
                .filter(t => t.status === 'failed')
                .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          LINES=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(s.total.lines.pct)")
          echo "Web line coverage: $LINES%"
          echo "percentage=$LINES" >> "$GITHUB_OUTPUT"
          THRESHOLD=80
          if [ "$(echo "$LINES < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Web coverage $LINES% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
      - name: Upload Web coverage
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: web/coverage/lcov.info
          retention-days: 20
      - run: npx vite build

  web-integration:
    name: Web Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Integration tests
        run: |
          set +e
          npx vitest run --reporter=verbose --reporter=json --outputFile=test-results.json tests/integration/
          EXIT_CODE=$?
          if [ -f test-results.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              const p = r.numPassedTests, f = r.numFailedTests;
              let md = '## Web Integration Tests\n\n';
              if (f === 0) {
                md += '✅ **' + p + ' passed**\n';
              } else {
                md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
                r.testResults.forEach(s => s.assertionResults
                  .filter(t => t.status === 'failed')
                  .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
              }
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
            "
          fi
          exit $EXIT_CODE

  web-bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Check bundle size
        run: |
          set +e
          npx size-limit --json > size-report.json 2>&1
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('size-report.json', 'utf8'));
            let md = '## Bundle Size\n\n| Name | Size | Limit | Status |\n|------|------|-------|--------|\n';
            data.forEach(entry => {
              const status = entry.passed !== false ? ':white_check_mark:' : ':x:';
              const size = (entry.size / 1024).toFixed(1) + ' KB';
              const limit = entry.sizeLimit || 'N/A';
              md += '| ' + entry.name + ' | ' + size + ' | ' + limit + ' | ' + status + ' |\n';
            });
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - name: Upload size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: web/size-report.json
          retention-days: 20

  e2e:
    name: E2E Tests
    # No `needs:` — E2E builds its own docker-compose test stack and shares
    # no artifacts with the unit/integration jobs, so it can run in
    # parallel from the start of the workflow. Failures here surface
    # alongside the unit failures instead of after them, cutting the
    # critical path roughly in half on PRs that touch web code.
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start test server
        run: |
          cd deploy
          # Docker Hub pulls (postgres:17-alpine + the golang/node build base images)
          # intermittently time out on hosted runners. Retry the whole bring-up with a
          # clean slate between attempts so a transient registry flake doesn't fail E2E.
          for attempt in 1 2 3; do
            if docker compose -f docker-compose.test.yml up -d --build --wait; then
              exit 0
            fi
            echo "::warning::test server bring-up attempt $attempt/3 failed; cleaning up, retrying in $((attempt * 20))s"
            docker compose -f docker-compose.test.yml down -v || true
            sleep $((attempt * 20))
          done
          echo "::error::test server failed to start after 3 attempts"
          exit 1
      - name: Wait for server
        run: bash deploy/scripts/wait-for-server.sh http://localhost:8080 60
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        working-directory: web
        run: lhci autorun

      - name: Generate Lighthouse summary
        if: always()
        working-directory: web
        run: |
          node -e "
            const fs = require('fs');
            const dir = './lighthouse-results';
            if (!fs.existsSync(dir)) process.exit(0);
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('manifest'));
            if (files.length === 0) process.exit(0);
            const report = JSON.parse(fs.readFileSync(dir + '/' + files[files.length - 1], 'utf8'));
            const cats = report.categories;
            let md = '## Lighthouse Scores\n\n| Category | Score |\n|----------|-------|\n';
            Object.entries(cats).forEach(([key, val]) => {
              const score = Math.round(val.score * 100);
              const icon = score >= 90 ? ':green_circle:' : score >= 50 ? ':orange_circle:' : ':red_circle:';
              md += '| ' + val.title + ' | ' + icon + ' ' + score + ' |\n';
            });
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: web/lighthouse-results/
          retention-days: 20

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 20
      - name: Teardown
        if: always()
        run: cd deploy && docker compose -f docker-compose.test.yml down -v

  deploy-api-docs:
    name: Deploy API Docs
    needs: [web-unit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: Deploy API docs
        run: |
          mkdir -p gh-pages/docs/api
          cp api/openapi.yaml gh-pages/docs/api/
          cp docs/api/index.html gh-pages/docs/api/
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update API reference"
          git push

  config-lint:
    name: Config Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks scans git history

      # GitHub Actions workflow lint
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2

      # L2 — Secrets scanning (S1 of iac-security-testing-pyramid plan).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -sSL "$url" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: make secrets-scan

      # L4 — Dockerfile policy (S2 of iac-security-testing-pyramid plan).
      - name: Install hadolint
        env:
          HADOLINT_VERSION: 2.12.0
        run: |
          set -euo pipefail
          url="https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -sSL "$url" -o /tmp/hadolint
          chmod +x /tmp/hadolint
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint
          hadolint --version
      - name: Hadolint Dockerfile
        run: make lint-dockerfile

      # Kubernetes tooling (Phase 13b PR-B): helm renders deploy/helm/** charts
      # (Checkov's helm framework + `make lint-k8s` both need it); kubeconform
      # schema-validates the rendered manifests; conftest runs the k8s Rego.
      - name: Install helm, kubeconform, conftest
        env:
          HELM_VERSION: 3.16.3
          KUBECONFORM_VERSION: 0.6.7
          CONFTEST_VERSION: 0.55.0
        run: |
          set -euo pipefail
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 120 \
            -sSL "https://get.helm.sh/helm-v${HELM_VERSION}-linux-amd64.tar.gz" -o /tmp/helm.tgz
          tar -xzf /tmp/helm.tgz -C /tmp linux-amd64/helm
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 120 \
            -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kc.tgz
          tar -xzf /tmp/kc.tgz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 120 \
            -sSL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" -o /tmp/conftest.tgz
          tar -xzf /tmp/conftest.tgz -C /tmp conftest
          sudo install -m 0755 /tmp/conftest /usr/local/bin/conftest
          helm version --short && kubeconform -v && conftest --version

      # L4 — Built-in policy scanning across terraform/dockerfile/github_actions/helm.
      # Baseline at .checkov.baseline pins the currently-accepted findings; see ADR-015.
      - name: Install checkov
        run: pipx install checkov
      - name: Run checkov
        run: make iac-policy

      # L4 — Helm chart validation: helm lint + kubeconform schema + the k8s
      # Rego policy (policy/k8s) against every rendered overlay.
      - name: Validate Helm charts
        run: make lint-k8s

      # YAML lint (deploy configs, cloud-init)
      - run: pip install --user yamllint
      - run: yamllint -c .yamllint.yml deploy/

      # Terraform format + validate. Pin to 1.9.x — `expect_failures` for
      # variable validation in `terraform test` requires 1.7+; pinning a known
      # working line avoids surprise breaks when HashiCorp ships 2.x.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.9.x
      - name: Terraform fmt
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - name: Terraform init (with retry)
        # `terraform init` fetches the oracle/oci provider's SHA256SUMS from
        # github.com to verify the lockfile hashes; that endpoint is occasionally
        # flaky from GitHub Actions runners (observed: net/http Client.Timeout
        # while awaiting headers, 2026-05-15 02:50). Retry with exponential
        # backoff before failing the gate. Same retry pattern applied to the
        # other init invocations below + in terraform-drift.yml.
        run: |
          set -e
          for attempt in 1 2 3; do
            if terraform -chdir=deploy/terraform init -backend=false; then
              exit 0
            fi
            echo "::warning::terraform init attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::terraform init failed after 3 attempts"
          exit 1
      - name: Terraform validate
        run: terraform -chdir=deploy/terraform validate

      # Terraform linting
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
      - name: Tflint init (with retry)
        run: |
          set -e
          for attempt in 1 2 3; do
            if tflint --init --chdir=deploy/terraform; then
              exit 0
            fi
            echo "::warning::tflint --init attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::tflint --init failed after 3 attempts"
          exit 1
      - run: tflint --chdir=deploy/terraform --format=compact

      # Module-invariant tests (mock_provider, no OCI creds). Submodules and the
      # root each carry their own tftest suite; one umbrella target runs all three.
      # Also runs the output-sensitivity grep check.
      - name: Terraform test (module invariants + sensitivity grep)
        run: make terraform-test
      - name: Output sensitivity grep
        run: |
          for out in cd_nsg_id; do
            grep -A3 "output \"$out\"" deploy/terraform/outputs.tf | grep -q "sensitive *= *true" \
              || { echo "::error::output \"$out\" must have sensitive = true in deploy/terraform/outputs.tf"; exit 1; }
          done

      # Docker Compose validation
      - name: Validate Docker Compose
        working-directory: deploy
        env:
          JWT_SECRET: ci-dummy
          AMT_USER: admin
          AMT_PASS: ci-dummy
          VAPID_CONTACT: ci@example.com
          IMAGE_TAG: latest
          DOMAIN: example.com
          STAGING_JWT_SECRET: ci-dummy
          POSTGRES_PASSWORD: ci-dummy
          STAGING_POSTGRES_PASSWORD: ci-dummy
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config --quiet
          docker compose -f docker-compose.test.yml config --quiet

      # Caddyfile validation
      #
      # Install from GitHub Releases (static, CDN-backed) rather than the
      # caddyserver.com/api/download build-on-demand endpoint, which has stalled
      # job runs for hours when unreachable. curl is bounded with explicit
      # timeouts + retries + --fail so any transient failure surfaces fast
      # instead of hanging the runner.
      - name: Install Caddy
        env:
          CADDY_VERSION: "2.11.2"
        run: |
          set -euo pipefail
          url="https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/caddy_${CADDY_VERSION}_linux_amd64.tar.gz"
          tmp="$(mktemp -d)"
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -sSL "$url" -o "$tmp/caddy.tar.gz"
          tar -xzf "$tmp/caddy.tar.gz" -C "$tmp" caddy
          sudo install -m 0755 "$tmp/caddy" /usr/local/bin/caddy
          caddy version
      - name: Validate Caddyfiles
        run: |
          caddy fmt --diff deploy/caddy/Caddyfile
          caddy fmt --diff deploy/caddy/Caddyfile.staging
          caddy validate --config deploy/caddy/Caddyfile --adapter caddyfile
          caddy validate --config deploy/caddy/Caddyfile.staging --adapter caddyfile

      # IaC security scan
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore
      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore

      # Cross-config consistency tests
      - name: Deploy config integration tests
        run: bash deploy/tests/validate-configs.sh

  codeql-go:
    name: CodeQL Go
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: go

  codeql-js:
    name: CodeQL TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: javascript-typescript

  codeql-rust:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
