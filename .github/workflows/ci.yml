name: CI

on:
  push:
    branches: [dev, main, dependabot-dev]
  pull_request:
    branches: [main, dev, dependabot-dev]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  security-events: write
  contents: read
  actions: read
  issues: write

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Tests
        run: |
          set +e
          cargo nextest run --workspace --no-fail-fast --color never > test-output.txt 2>&1
          EXIT_CODE=$?
          cat test-output.txt
          SUMMARY=$(grep "Summary" test-output.txt | tail -1 || echo "no summary")
          FAIL_TESTS=$(grep " FAIL " test-output.txt || echo "")
          {
            echo "## Rust Tests"
            echo ""
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ $SUMMARY"
            else
              echo "❌ $SUMMARY"
              if [ -n "$FAIL_TESTS" ]; then
                echo ""
                # shellcheck disable=SC2001
                echo "$FAIL_TESTS" | sed 's/.*FAIL \[.*\] /- ❌ /'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Generate golden files
        run: GENERATE_GOLDEN=1 cargo nextest run -p mesh-protocol -E 'binary(golden_test)'
      - uses: actions/upload-artifact@v4
        with:
          name: golden-files
          path: testdata/golden/
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate Rust coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - name: Upload Rust coverage
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: agent/lcov.info

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - run: go vet ./...

  go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - name: Unit tests with coverage
        run: |
          set +e
          go test -json -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./internal/... > unit-results.json 2>unit-stderr.log
          cat unit-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Unit Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              echo "| Package | Test |"
              echo "|---------|------|"
              jq -r 'select(.Action=="fail" and .Test != null) | "| \(.Package | split("/") | last) | \(.Test) |"' unit-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          grep -v '/testutil/' coverage.out > coverage-prod.out
          TOTAL=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: $TOTAL%"
          go tool cover -func=coverage-prod.out
          echo "percentage=$TOTAL" >> "$GITHUB_OUTPUT"
          THRESHOLD=70
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Coverage $TOTAL% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: server/coverage.out

  go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - name: Integration tests
        run: |
          set +e
          go test -json -race -timeout 5m ./tests/integration/ > integration-results.json 2>integration-stderr.log
          cat integration-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Integration Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              jq -r 'select(.Action=="fail" and .Test != null) | "- ❌ \(.Test)"' integration-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  golden:
    name: Golden File Verification
    needs: [rust-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: golden-files
          path: testdata/golden/
      - run: go test ./internal/protocol/ -run TestGolden -v

  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  web:
    name: Web Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Run tests
        run: |
          set +e
          npx vitest run --coverage --reporter=verbose --reporter=json --outputFile=test-results.json
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const p = r.numPassedTests, f = r.numFailedTests;
            let md = '## Web Tests\n\n';
            if (f === 0) {
              md += '✅ **' + p + ' passed**\n';
            } else {
              md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
              r.testResults.forEach(s => s.assertionResults
                .filter(t => t.status === 'failed')
                .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - name: Upload Web coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/lcov.info
      - run: npx vite build

  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: raven-actions/actionlint@v2

  codeql-go:
    name: CodeQL Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: go

  codeql-js:
    name: CodeQL TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: javascript-typescript

  codeql-rust:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: rust

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd server && govulncheck ./...
      - name: Rust vulnerability check
        run: |
          cargo install cargo-audit
          cd agent && cargo audit
      - name: npm vulnerability check
        run: cd web && npm ci && npm audit --audit-level=high

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [go-unit, rust-test, web]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: go-coverage
          path: server/
      - name: Download Web coverage
        uses: actions/download-artifact@v4
        with:
          name: web-coverage
          path: web/coverage/
      - name: Download Rust coverage
        uses: actions/download-artifact@v4
        with:
          name: rust-coverage
          path: agent/
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Export SonarCloud findings as SARIF
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          pip install --quiet sonar-tools
          sonar-findings-export \
            -u https://sonarcloud.io \
            -t "$SONAR_TOKEN" \
            -o volchanskyi \
            -k volchanskyi_opengate \
            --format sarif > sonar-results-raw.sarif
          jq '
            (.runs[]?.results[]? | .properties.tags) |=
              if type == "string" then split(",") | map(ltrimstr(" "))
              elif type != "array" then []
              else . end
          ' sonar-results-raw.sarif > sonar-results.sarif
      - name: Upload SonarCloud SARIF to GitHub
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sonar-results.sarif
          category: sonarcloud

  merge-to-main:
    name: Auto-merge to main
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web
      - yaml-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/dependabot-dev')
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge source into main
        id: merge
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          git fetch origin "$SOURCE"
          if git merge-base --is-ancestor origin/"$SOURCE" HEAD; then
            echo "main already contains all commits from $SOURCE — skipping"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git merge --no-ff origin/"$SOURCE" -m "ci: auto-merge $SOURCE → main"
          git push origin main
          echo "merged=true" >> "$GITHUB_OUTPUT"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-coverage.json
          label: Go Server Coverage
          message: ${{ needs.go-unit.outputs.coverage }}%
          valColorRange: ${{ needs.go-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 85

  sync-branches:
    name: Sync branches
    needs: [merge-to-main]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/dependabot-dev') && needs.merge-to-main.outputs.merged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Sync main to other branches
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          MAIN_SHA=$(git rev-parse HEAD)
          git fetch origin dev dependabot-dev
          for BRANCH in dev dependabot-dev; do
            if [ "$BRANCH" = "$SOURCE" ]; then
              continue
            fi
            if git merge-base --is-ancestor "$MAIN_SHA" origin/"$BRANCH"; then
              echo "$BRANCH already contains all of main — skipping"
              continue
            fi
            git checkout -B "$BRANCH" origin/"$BRANCH"
            git merge --no-ff "$MAIN_SHA" -m "ci: sync $BRANCH with main [skip ci]"
            git push origin "$BRANCH"
          done

  notify-failure:
    name: Create failure issue
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web
      - yaml-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
      - merge-to-main
      - sync-branches
    if: >-
      failure()
      && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "ci-failure" \
            --description "Automated: CI pipeline failure" \
            --color "B60205" \
            --force \
            --repo "${{ github.repository }}"
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, subprocess, sys

          repo    = os.environ["REPO"]
          run_id  = os.environ["RUN_ID"]
          branch  = os.environ["BRANCH"]
          workflow = os.environ["WORKFLOW"]
          sha     = os.environ["SHA"]
          event   = os.environ["EVENT"]
          run_url = os.environ["RUN_URL"]
          server  = os.environ.get("GITHUB_SERVER_URL", "https://github.com")

          def gh(*args):
              result = subprocess.run(
                  ["gh"] + list(args),
                  capture_output=True, text=True
              )
              return result.stdout.strip(), result.returncode

          # 1. Get all jobs for this run and find failures
          jobs_json, _ = gh("api", f"repos/{repo}/actions/runs/{run_id}/jobs",
                            "--paginate", "--jq",
                            ".jobs[] | {name, conclusion, html_url, steps: [.steps[] | select(.conclusion == \"failure\") | .name]}")
          failed_jobs = []
          for line in jobs_json.splitlines():
              line = line.strip()
              if not line:
                  continue
              try:
                  job = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if job.get("conclusion") == "failure":
                  failed_jobs.append(job)

          if not failed_jobs:
              print("No failed jobs found — nothing to do.")
              sys.exit(0)

          # 2. Fetch failed log lines (tab-separated: Job\tStep\tTimestamp\tLogLine)
          log_out, _ = gh("run", "view", run_id, "--log-failed", "--repo", repo)

          # Strip ANSI escape codes
          ansi_re = re.compile(r'\x1b\[[0-9;]*[a-zA-Z]')
          log_out = ansi_re.sub("", log_out)

          # Parse log lines into per-job buckets
          job_logs: dict = {}
          for raw_line in log_out.splitlines():
              parts = raw_line.split("\t", 3)
              if len(parts) < 4:
                  continue
              job_name, _step, _ts, log_line = parts
              job_logs.setdefault(job_name, []).append(log_line)

          short_sha = sha[:7]
          commit_url = f"{server}/{repo}/commit/{sha}"

          # 3. For each failed job: dedup-check then create issue or comment
          for job in failed_jobs:
              job_name = job["name"]
              job_url  = job["html_url"]
              failed_steps = job.get("steps", [])
              steps_str = ", ".join(failed_steps) if failed_steps else "unknown"

              # Build log excerpt (last 80 lines for this job)
              lines = job_logs.get(job_name, [])
              excerpt_lines = lines[-80:] if len(lines) > 80 else lines
              excerpt = "\n".join(excerpt_lines) if excerpt_lines else "No log output available."

              # Build issue body
              body = f"""## CI Failure: {job_name}

          **Workflow**: {workflow}
          **Branch**: `{branch}`
          **Commit**: [`{short_sha}`]({commit_url})
          **Trigger**: {event}
          **Run**: [{run_url}]({run_url})
          **Job**: [{job_name}]({job_url})
          **Failed Step(s)**: {steps_str}

          ### Error Log (last 80 lines)

          <details>
          <summary>Expand log</summary>

          ```
          {excerpt}
          ```

          </details>
          """

              # Truncate if needed (GitHub body limit ~65 536 chars)
              if len(body) > 60000:
                  body = body[:60000] + f"\n\n_Log truncated. [Full run]({run_url})_"

              title = f"CI failure on {branch} in {job_name}"

              # Dedup: look for open issue with same title
              existing, _ = gh(
                  "issue", "list",
                  "--repo", repo,
                  "--label", "ci-failure",
                  "--state", "open",
                  "--search", f"{title} in:title",
                  "--limit", "1",
                  "--json", "number",
                  "--jq", ".[0].number // empty"
              )

              if existing.strip():
                  issue_num = existing.strip()
                  comment = f"New failure in run [{run_id}]({run_url}) — {short_sha}\n\n{body}"
                  gh("issue", "comment", issue_num, "--repo", repo, "--body", comment)
                  print(f"Commented on issue #{issue_num} for job '{job_name}'")
              else:
                  gh(
                      "issue", "create",
                      "--repo", repo,
                      "--title", title,
                      "--body", body,
                      "--label", "ci-failure"
                  )
                  print(f"Created issue for job '{job_name}'")
          PYEOF
