    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download Go benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-go
          path: .
      - name: Download Rust benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-rust
          path: .
      - name: Store Go benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: go
          output-file-path: bench-go.txt
          benchmark-data-dir-path: dev/bench/go
