name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Tests
        run: |
          set +e
          cargo nextest run --workspace --no-fail-fast --color never > test-output.txt 2>&1
          EXIT_CODE=$?
          cat test-output.txt
          SUMMARY=$(grep "Summary" test-output.txt | tail -1 || echo "no summary")
          FAIL_TESTS=$(grep " FAIL " test-output.txt || echo "")
          {
            echo "## Rust Tests"
            echo ""
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ $SUMMARY"
            else
              echo "❌ $SUMMARY"
              if [ -n "$FAIL_TESTS" ]; then
                echo ""
                echo "$FAIL_TESTS" | sed 's/.*FAIL \[.*\] /- ❌ /'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Generate golden files
        run: GENERATE_GOLDEN=1 cargo nextest run -p mesh-protocol -E 'binary(golden_test)'
      - uses: actions/upload-artifact@v4
        with:
          name: golden-files
          path: testdata/golden/

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - run: go vet ./...

  go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - name: Unit tests with coverage
        run: |
          set +e
          go test -json -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./internal/... > unit-results.json 2>&1
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Unit Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              echo "| Package | Test |"
              echo "|---------|------|"
              jq -r 'select(.Action=="fail" and .Test != null) | "| \(.Package | split("/") | last) | \(.Test) |"' unit-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          grep -v '/testutil/' coverage.out > coverage-prod.out
          TOTAL=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: $TOTAL%"
          go tool cover -func=coverage-prod.out
          echo "percentage=$TOTAL" >> "$GITHUB_OUTPUT"
          THRESHOLD=70
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Coverage $TOTAL% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi

  go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - name: Integration tests
        run: |
          set +e
          go test -json -race -timeout 5m ./tests/integration/ > integration-results.json 2>&1
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Integration Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              jq -r 'select(.Action=="fail" and .Test != null) | "- ❌ \(.Test)"' integration-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  golden:
    name: Golden File Verification
    needs: [rust-test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: golden-files
          path: testdata/golden/
      - run: go test ./internal/protocol/ -run TestGolden -v

  web:
    name: Web Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Run tests
        run: |
          set +e
          npx vitest run --reporter=verbose --reporter=json --outputFile=test-results.json
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const p = r.numPassedTests, f = r.numFailedTests;
            let md = '## Web Tests\n\n';
            if (f === 0) {
              md += '✅ **' + p + ' passed**\n';
            } else {
              md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
              r.testResults.forEach(s => s.assertionResults
                .filter(t => t.status === 'failed')
                .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - run: npx vite build

  codeql-go:
    name: CodeQL Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: go

  codeql-js:
    name: CodeQL TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: javascript-typescript

  codeql-rust:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: rust

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd server && govulncheck ./...
      - name: Rust vulnerability check
        run: |
          cargo install cargo-audit
          cd agent && cargo audit
      - name: npm vulnerability check
        run: cd web && npm ci && npm audit --audit-level=high

  merge-to-main:
    name: Auto-merge dev → main
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge dev into main
        run: |
          git fetch origin dev
          git merge --no-ff origin/dev -m "ci: auto-merge dev → main"
          git push origin main
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-coverage.json
          label: Go Server Coverage
          message: ${{ needs.go-unit.outputs.coverage }}%
          valColorRange: ${{ needs.go-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 85
