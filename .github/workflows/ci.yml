name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo test --workspace
      - name: Generate golden files
        run: GENERATE_GOLDEN=1 cargo test -p mesh-protocol --test golden_test
      - uses: actions/upload-artifact@v4
        with:
          name: golden-files
          path: testdata/golden/

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - name: Unit tests with coverage
        run: go test -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./internal/...
      - name: Integration tests
        run: go test -race -timeout 5m -v ./tests/integration/
      - name: Enforce coverage threshold
        run: |
          grep -v '/testutil/' coverage.out > coverage-prod.out
          TOTAL=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: $TOTAL%"
          go tool cover -func=coverage-prod.out
          THRESHOLD=70
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Coverage $TOTAL% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi

  golden:
    name: Golden File Verification
    needs: [rust]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum
      - uses: actions/download-artifact@v4
        with:
          name: golden-files
          path: testdata/golden/
      - run: go test ./internal/protocol/ -run TestGolden -v

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npx vite build

  merge-to-main:
    name: Auto-merge dev → main
    needs: [rust, go, golden, web]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge dev into main
        run: |
          git fetch origin dev
          git merge --no-ff origin/dev -m "ci: auto-merge dev → main"
          git push origin main
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: server/go.sum
      - name: Extract unit test coverage
        id: coverage
        working-directory: server
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./internal/... > /dev/null 2>&1
          grep -v '/testutil/' coverage.out > coverage-prod.out
          COVERAGE=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
          echo "Go server unit test coverage: $COVERAGE%"
      - name: Update coverage badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: <GIST_ID>
          filename: opengate-coverage.json
          label: Go Server Coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 75
          maxColorRange: 85
