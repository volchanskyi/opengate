name: CI

on:
  push:
    branches: [dev, dependabot-dev]
  pull_request:
    branches: [main, dev, dependabot-dev]
  workflow_dispatch:

permissions: {}

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 # v2
        with:
          tool: cargo-nextest
      - name: Tests
        run: |
          set +e
          cargo nextest run --workspace --no-fail-fast --color never > test-output.txt 2>&1
          EXIT_CODE=$?
          cat test-output.txt
          SUMMARY=$(grep "Summary" test-output.txt | tail -1 || echo "no summary")
          FAIL_TESTS=$(grep " FAIL " test-output.txt || echo "")
          {
            echo "## Rust Tests"
            echo ""
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ $SUMMARY"
            else
              echo "❌ $SUMMARY"
              if [ -n "$FAIL_TESTS" ]; then
                echo ""
                # shellcheck disable=SC2001
                echo "$FAIL_TESTS" | sed 's/.*FAIL \[.*\] /- ❌ /'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Generate golden files
        run: GENERATE_GOLDEN=1 cargo nextest run -p mesh-protocol -E 'binary(golden_test)'
      - uses: actions/upload-artifact@v7
        with:
          name: golden-files
          path: testdata/golden/
          retention-days: 20
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@12ed20a2623efa905821036b9bae41ea21e1a490 # cargo-llvm-cov
      - name: Generate Rust coverage
        id: coverage
        run: |
          cargo llvm-cov nextest --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(main\.rs|/webrtc\.rs|/terminal\.rs|/session/mod\.rs|/session/relay\.rs|/tests/)' \
            --fail-under-lines 80
          # cargo-llvm-cov only writes LCOV to the file when --lcov is set,
          # so compute the line-coverage % from lcov.info directly.
          PCT=$(awk -F: '
            /^LF:/ { lf += $2 }
            /^LH:/ { lh += $2 }
            END { if (lf > 0) printf "%.1f", (lh / lf) * 100; else print "0" }
          ' lcov.info)
          echo "Rust coverage: $PCT%"
          echo "percentage=$PCT" >> "$GITHUB_OUTPUT"
      - name: Upload Rust coverage
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: agent/lcov.info
          retention-days: 20

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - run: go vet ./...
      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.6.0
      - name: Verify OpenAPI codegen is in sync
        run: |
          cd server && oapi-codegen -config oapi-codegen.yaml ../api/openapi.yaml > internal/api/openapi_gen.go
          cd ..
          git diff --exit-code -- server/internal/api/ || {
            echo "::error::OpenAPI generated code is out of sync. Run oapi-codegen and commit."
            exit 1
          }

  go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: server
    # Postgres is launched manually below (not as a service) so we can pass
    # `-c max_connections=400`. The default 100-conn limit saturates when
    # tests run in parallel — each parallel test holds its own schema via
    # testutil.NewTestStore and the working set of transient conns exceeds
    # 100 with `go test -p $GOMAXPROCS`.
    env:
      POSTGRES_TEST_URL: postgres://opengate:opengate@localhost:5432/opengate_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - name: Start Postgres with max_connections=400
        working-directory: .
        run: |
          docker run -d --rm --name pg-ci \
            -e POSTGRES_USER=opengate -e POSTGRES_PASSWORD=opengate -e POSTGRES_DB=opengate_test \
            -p 5432:5432 postgres:17-alpine -c max_connections=400
          for i in {1..30}; do
            if docker exec pg-ci pg_isready -U opengate -d opengate_test >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempt(s)"; exit 0
            fi
            sleep 1
          done
          echo "::error::postgres never became ready"; docker logs pg-ci; exit 1
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Unit tests with coverage
        run: |
          set +e
          go test -json -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./internal/... > unit-results.json 2>unit-stderr.log
          cat unit-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Unit Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              echo "| Package | Test |"
              echo "|---------|------|"
              jq -r 'select(.Action=="fail" and .Test != null) | "| \(.Package | split("/") | last) | \(.Test) |"' unit-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          # Exclude test scaffolding, generated code, and infrastructure
          # exposition. WSMAN's IO surface is now covered by in-package wire
          # tests (Phase B / B3) and no longer needs an exclusion carve-out.
          grep -v -E '/(testutil|metrics)/|api/openapi_gen\.go' coverage.out > coverage-prod.out
          TOTAL=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: $TOTAL%"
          go tool cover -func=coverage-prod.out
          echo "percentage=$TOTAL" >> "$GITHUB_OUTPUT"
          THRESHOLD=80
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Coverage $TOTAL% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: server/coverage.out
          retention-days: 20

  go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Integration tests
        run: |
          set +e
          go test -json -race -timeout 5m ./tests/integration/ > integration-results.json 2>integration-stderr.log
          cat integration-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Integration Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              jq -r 'select(.Action=="fail" and .Test != null) | "- ❌ \(.Test)"' integration-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  go-bench:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    # See go-unit job above for rationale on launching Postgres manually
    # with `-c max_connections=400`.
    env:
      POSTGRES_TEST_URL: postgres://opengate:opengate@localhost:5432/opengate_test?sslmode=disable
    steps:
      - uses: actions/checkout@v6
      - name: Start Postgres with max_connections=400
        working-directory: .
        run: |
          docker run -d --rm --name pg-ci \
            -e POSTGRES_USER=opengate -e POSTGRES_PASSWORD=opengate -e POSTGRES_DB=opengate_test \
            -p 5432:5432 postgres:17-alpine -c max_connections=400
          for i in {1..30}; do
            if docker exec pg-ci pg_isready -U opengate -d opengate_test >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempt(s)"; exit 0
            fi
            sleep 1
          done
          echo "::error::postgres never became ready"; docker logs pg-ci; exit 1
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Run Go benchmarks
        run: go test -bench=. -benchmem -count=1 -run='^$' ./internal/... | tee "$GITHUB_WORKSPACE/bench-go.txt"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-go
          path: bench-go.txt
          retention-days: 20

  rust-bench:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
      - name: Run Rust benchmarks
        run: cargo bench --package mesh-protocol --bench codec_bench
      - name: Convert criterion JSON to benchmark format
        run: |
          jq -n '[inputs | {
            name: input_filename | split("/")[-3],
            unit: "ns/iter",
            value: .mean.point_estimate
          }]' target/criterion/*/new/estimates.json \
            > "$GITHUB_WORKSPACE/bench-rust.json"
          cat "$GITHUB_WORKSPACE/bench-rust.json"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-rust
          path: bench-rust.json
          retention-days: 20

  golden:
    name: Golden File Verification (bidirectional)
    needs: [rust-test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/download-artifact@v8
        with:
          name: golden-files
          path: testdata/golden/
      - name: Generate reverse goldens + sidecars (Go encodes)
        working-directory: server
        run: GENERATE_GOLDEN=1 go test ./internal/protocol/ -run "TestGenerateReverseGoldens|TestGenerateForwardSidecars" -v
      - name: Verify forward goldens (Go decodes Rust-encoded)
        working-directory: server
        run: go test ./internal/protocol/ -run TestGolden -v
      - name: Verify reverse goldens (Rust decodes Go-encoded)
        working-directory: agent
        run: cargo test -p mesh-protocol --test reverse_golden_test
      - name: Verify golden files unchanged (bidirectional drift gate)
        run: git diff --exit-code -- testdata/golden/

  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  web-unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Unit & component tests
        run: |
          set +e
          npx vitest run --coverage --reporter=verbose --reporter=json --outputFile=test-results.json src/
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const p = r.numPassedTests, f = r.numFailedTests;
            let md = '## Web Unit Tests\n\n';
            if (f === 0) {
              md += '✅ **' + p + ' passed**\n';
            } else {
              md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
              r.testResults.forEach(s => s.assertionResults
                .filter(t => t.status === 'failed')
                .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          LINES=$(node -e "const s=require('./coverage/coverage-summary.json');console.log(s.total.lines.pct)")
          echo "Web line coverage: $LINES%"
          echo "percentage=$LINES" >> "$GITHUB_OUTPUT"
          THRESHOLD=80
          if [ "$(echo "$LINES < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Web coverage $LINES% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
      - name: Upload Web coverage
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: web/coverage/lcov.info
          retention-days: 20
      - run: npx vite build

  web-integration:
    name: Web Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Integration tests
        run: |
          set +e
          npx vitest run --reporter=verbose --reporter=json --outputFile=test-results.json tests/integration/
          EXIT_CODE=$?
          if [ -f test-results.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              const p = r.numPassedTests, f = r.numFailedTests;
              let md = '## Web Integration Tests\n\n';
              if (f === 0) {
                md += '✅ **' + p + ' passed**\n';
              } else {
                md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
                r.testResults.forEach(s => s.assertionResults
                  .filter(t => t.status === 'failed')
                  .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
              }
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
            "
          fi
          exit $EXIT_CODE

  web-bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Check bundle size
        run: |
          set +e
          npx size-limit --json > size-report.json 2>&1
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('size-report.json', 'utf8'));
            let md = '## Bundle Size\n\n| Name | Size | Limit | Status |\n|------|------|-------|--------|\n';
            data.forEach(entry => {
              const status = entry.passed !== false ? ':white_check_mark:' : ':x:';
              const size = (entry.size / 1024).toFixed(1) + ' KB';
              const limit = entry.sizeLimit || 'N/A';
              md += '| ' + entry.name + ' | ' + size + ' | ' + limit + ' | ' + status + ' |\n';
            });
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - name: Upload size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bundle-size-report
          path: web/size-report.json
          retention-days: 20

  e2e:
    name: E2E Tests
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - web-bundle-size
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start test server
        run: |
          cd deploy && docker compose -f docker-compose.test.yml up -d --build --wait
      - name: Wait for server
        run: bash deploy/scripts/wait-for-server.sh http://localhost:8080 60
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI
        working-directory: web
        run: lhci autorun

      - name: Generate Lighthouse summary
        if: always()
        working-directory: web
        run: |
          node -e "
            const fs = require('fs');
            const dir = './lighthouse-results';
            if (!fs.existsSync(dir)) process.exit(0);
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('manifest'));
            if (files.length === 0) process.exit(0);
            const report = JSON.parse(fs.readFileSync(dir + '/' + files[files.length - 1], 'utf8'));
            const cats = report.categories;
            let md = '## Lighthouse Scores\n\n| Category | Score |\n|----------|-------|\n';
            Object.entries(cats).forEach(([key, val]) => {
              const score = Math.round(val.score * 100);
              const icon = score >= 90 ? ':green_circle:' : score >= 50 ? ':orange_circle:' : ':red_circle:';
              md += '| ' + val.title + ' | ' + icon + ' ' + score + ' |\n';
            });
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: web/lighthouse-results/
          retention-days: 20

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 20
      - name: Teardown
        if: always()
        run: cd deploy && docker compose -f docker-compose.test.yml down -v

  deploy-api-docs:
    name: Deploy API Docs
    needs: [web-unit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: Deploy API docs
        run: |
          mkdir -p gh-pages/docs/api
          cp api/openapi.yaml gh-pages/docs/api/
          cp docs/api/index.html gh-pages/docs/api/
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update API reference"
          git push

  config-lint:
    name: Config Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks scans git history

      # GitHub Actions workflow lint
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2

      # L2 — Secrets scanning (S1 of iac-security-testing-pyramid plan).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -sSL "$url" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: make secrets-scan

      # L4 — Dockerfile policy (S2 of iac-security-testing-pyramid plan).
      - name: Install hadolint
        env:
          HADOLINT_VERSION: 2.12.0
        run: |
          set -euo pipefail
          url="https://github.com/hadolint/hadolint/releases/download/v${HADOLINT_VERSION}/hadolint-Linux-x86_64"
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -sSL "$url" -o /tmp/hadolint
          chmod +x /tmp/hadolint
          sudo install -m 0755 /tmp/hadolint /usr/local/bin/hadolint
          hadolint --version
      - name: Hadolint Dockerfile
        run: make lint-dockerfile

      # L4 — Built-in policy scanning across terraform/dockerfile/github_actions.
      # Baseline at .checkov.baseline pins the currently-accepted findings; see ADR-015.
      - name: Install checkov
        run: pipx install checkov
      - name: Run checkov
        run: make iac-policy

      # YAML lint (deploy configs, cloud-init)
      - run: pip install --user yamllint
      - run: yamllint -c .yamllint.yml deploy/

      # Terraform format + validate. Pin to 1.9.x — `expect_failures` for
      # variable validation in `terraform test` requires 1.7+; pinning a known
      # working line avoids surprise breaks when HashiCorp ships 2.x.
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: 1.9.x
      - name: Terraform fmt
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - name: Terraform init (with retry)
        # `terraform init` fetches the oracle/oci provider's SHA256SUMS from
        # github.com to verify the lockfile hashes; that endpoint is occasionally
        # flaky from GitHub Actions runners (observed: net/http Client.Timeout
        # while awaiting headers, 2026-05-15 02:50). Retry with exponential
        # backoff before failing the gate. Same retry pattern applied to the
        # other init invocations below + in terraform-drift.yml.
        run: |
          set -e
          for attempt in 1 2 3; do
            if terraform -chdir=deploy/terraform init -backend=false; then
              exit 0
            fi
            echo "::warning::terraform init attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::terraform init failed after 3 attempts"
          exit 1
      - name: Terraform validate
        run: terraform -chdir=deploy/terraform validate

      # Terraform linting
      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6
      - name: Tflint init (with retry)
        run: |
          set -e
          for attempt in 1 2 3; do
            if tflint --init --chdir=deploy/terraform; then
              exit 0
            fi
            echo "::warning::tflint --init attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::tflint --init failed after 3 attempts"
          exit 1
      - run: tflint --chdir=deploy/terraform --format=compact

      # Module-invariant tests (mock_provider, no OCI creds). Submodules and the
      # root each carry their own tftest suite; one umbrella target runs all three.
      # Also runs the output-sensitivity grep check.
      - name: Terraform test (module invariants + sensitivity grep)
        run: make terraform-test
      - name: Output sensitivity grep
        run: |
          for out in instance_id cd_nsg_id; do
            grep -A3 "output \"$out\"" deploy/terraform/outputs.tf | grep -q "sensitive *= *true" \
              || { echo "::error::output \"$out\" must have sensitive = true in deploy/terraform/outputs.tf"; exit 1; }
          done

      # Docker Compose validation
      - name: Validate Docker Compose
        working-directory: deploy
        env:
          JWT_SECRET: ci-dummy
          AMT_USER: admin
          AMT_PASS: ci-dummy
          VAPID_CONTACT: ci@example.com
          IMAGE_TAG: latest
          DOMAIN: example.com
          STAGING_JWT_SECRET: ci-dummy
          POSTGRES_PASSWORD: ci-dummy
          STAGING_POSTGRES_PASSWORD: ci-dummy
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config --quiet
          docker compose -f docker-compose.test.yml config --quiet

      # Caddyfile validation
      #
      # Install from GitHub Releases (static, CDN-backed) rather than the
      # caddyserver.com/api/download build-on-demand endpoint, which has stalled
      # job runs for hours when unreachable. curl is bounded with explicit
      # timeouts + retries + --fail so any transient failure surfaces fast
      # instead of hanging the runner.
      - name: Install Caddy
        env:
          CADDY_VERSION: "2.11.2"
        run: |
          set -euo pipefail
          url="https://github.com/caddyserver/caddy/releases/download/v${CADDY_VERSION}/caddy_${CADDY_VERSION}_linux_amd64.tar.gz"
          tmp="$(mktemp -d)"
          curl --fail --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 60 \
            -sSL "$url" -o "$tmp/caddy.tar.gz"
          tar -xzf "$tmp/caddy.tar.gz" -C "$tmp" caddy
          sudo install -m 0755 "$tmp/caddy" /usr/local/bin/caddy
          caddy version
      - name: Validate Caddyfiles
        run: |
          caddy fmt --diff deploy/caddy/Caddyfile
          caddy fmt --diff deploy/caddy/Caddyfile.staging
          caddy validate --config deploy/caddy/Caddyfile --adapter caddyfile
          caddy validate --config deploy/caddy/Caddyfile.staging --adapter caddyfile

      # IaC security scan
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: deploy/
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore
      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore

      # Cross-config consistency tests
      - name: Deploy config integration tests
        run: bash deploy/tests/validate-configs.sh

  codeql-go:
    name: CodeQL Go
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: go

  codeql-js:
    name: CodeQL TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: javascript-typescript

  codeql-rust:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: rust

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Go vulnerability check (with retry)
        # govulncheck queries the Go vulnerability database over the network;
        # wrap in retry for github/proxy.golang.org transient failures.
        run: |
          set -e
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          for attempt in 1 2 3; do
            if (cd server && govulncheck ./...); then exit 0; fi
            echo "::warning::govulncheck attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::govulncheck failed after 3 attempts"
          exit 1
      - name: Rust vulnerability check (with retry)
        # `cargo audit` clones RustSec/advisory-db on each run; that clone is
        # the typical transient point (observed: github.com IO error talking
        # to advisory-db, 2026-05-15 02:53). Retry only the audit, not the
        # install (which has its own caching).
        run: |
          set -e
          cargo install cargo-audit@0.22.1
          for attempt in 1 2 3; do
            if (cd agent && cargo audit); then exit 0; fi
            echo "::warning::cargo audit attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::cargo audit failed after 3 attempts"
          exit 1
      - name: npm vulnerability check (with retry)
        run: |
          set -e
          for attempt in 1 2 3; do
            if (cd web && npm ci && npm audit --audit-level=high); then exit 0; fi
            echo "::warning::npm audit attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::npm audit failed after 3 attempts"
          exit 1

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: [go-unit, rust-test, web-unit]
    if: github.event_name != 'schedule'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Go coverage
        uses: actions/download-artifact@v8
        with:
          name: go-coverage
          path: server/
      - name: Download Web coverage
        uses: actions/download-artifact@v8
        with:
          name: web-coverage
          path: web/coverage/
      - name: Download Rust coverage
        uses: actions/download-artifact@v8
        with:
          name: rust-coverage
          path: agent/
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8
        with:
          args: -Dsonar.qualitygate.wait=true

  bench-publish:
    name: Publish Benchmarks
    needs: [go-bench, rust-bench]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download Go benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-go
          path: .
      - name: Download Rust benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-rust
          path: .
      - name: Store Go benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: go
          output-file-path: bench-go.txt
          benchmark-data-dir-path: dev/bench/go
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'
      - name: Store Rust benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-rust.json
          benchmark-data-dir-path: dev/bench/rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'
      - name: Push benchmark results
        run: git push origin gh-pages

  perf-publish:
    name: Publish Performance Data
    needs: [e2e, web-bundle-size]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: Download Lighthouse results
        uses: actions/download-artifact@v8
        with:
          name: lighthouse-results
          path: lighthouse-results/
      - name: Download bundle size report
        uses: actions/download-artifact@v8
        with:
          name: bundle-size-report
          path: .
      - name: Update performance data
        run: |
          mkdir -p gh-pages/dev/perf
          node -e "
            const fs = require('fs');
            const dir = './lighthouse-results';
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('manifest'));
            if (files.length === 0) process.exit(0);
            const report = JSON.parse(fs.readFileSync(dir + '/' + files[files.length - 1], 'utf8'));
            const entry = {
              date: new Date().toISOString(),
              sha: (process.env.GITHUB_SHA || '').substring(0, 7),
              scores: {}
            };
            Object.entries(report.categories).forEach(([key, val]) => {
              entry.scores[key] = Math.round(val.score * 100);
            });
            const histFile = 'gh-pages/dev/perf/lighthouse-history.json';
            const history = fs.existsSync(histFile) ? JSON.parse(fs.readFileSync(histFile, 'utf8')) : [];
            history.push(entry);
            fs.writeFileSync(histFile, JSON.stringify(history.slice(-100), null, 2));
          "
          cp size-report.json gh-pages/dev/perf/latest-bundle-size.json
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/perf/
          git diff --cached --quiet && exit 0
          git commit -m "perf: update Lighthouse + bundle size data"
          git push

  merge-to-main:
    name: Auto-merge to main
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
      - e2e
      - go-bench
      - rust-bench
      - web-bundle-size
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/dependabot-dev')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge source into main
        id: merge
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          git fetch origin "$SOURCE"
          if git merge-base --is-ancestor origin/"$SOURCE" HEAD; then
            echo "main already contains all commits from $SOURCE — skipping"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git merge --no-ff origin/"$SOURCE" -m "ci: auto-merge $SOURCE → main"
          git push origin main
          echo "merged=true" >> "$GITHUB_OUTPUT"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-coverage.json
          label: Go Server Coverage
          message: ${{ needs.go-unit.outputs.coverage }}%
          valColorRange: ${{ needs.go-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 90
      - name: Update Rust coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-rust-coverage.json
          label: Rust Agent Coverage
          message: ${{ needs.rust-test.outputs.coverage }}%
          valColorRange: ${{ needs.rust-test.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 90
      - name: Update Web coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-web-coverage.json
          label: Web Client Coverage
          message: ${{ needs.web-unit.outputs.coverage }}%
          valColorRange: ${{ needs.web-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 90

  auto-tag:
    name: Auto-tag release
    needs: [merge-to-main]
    if: needs.merge-to-main.outputs.merged == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: auto-tag
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Ivan Volchanskyi"
          git config user.email "ivan.volchanskyi@gmail.com"

      - name: Determine version bump
        id: bump
        run: |
          # Find latest semver tag, default to v0.0.0
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          LATEST="${LATEST:-v0.0.0}"
          SEMVER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"

          # Get commits merged in the last merge commit (--no-ff merge)
          MERGE_SHA=$(git rev-parse HEAD)
          COMMITS=$(git log --format='%s' "${MERGE_SHA}^1..${MERGE_SHA}^2" 2>/dev/null || echo "")

          if [ -z "$COMMITS" ]; then
            echo "No new commits to analyze"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level (highest wins)
          BUMP=""
          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.*\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.*\))?:'; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No release-worthy commits (ci/style/refactor/docs/test only)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → $NEW_TAG (was $LATEST)"
          {
            echo "tag=$NEW_TAG"
            echo "version=${MAJOR}.${MINOR}.${PATCH}"
            echo "prev=$LATEST"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          MERGE_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)

          # Collect commits by category
          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Strip type prefix, keep scope and description
            MSG=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?!?:\s*//')
            SCOPE=$(echo "$line" | sed -nE 's/^[a-z]+\(([^)]*)\).*$/\1/p')
            [ -n "$SCOPE" ] && MSG="**$SCOPE:** $MSG"

            if echo "$line" | grep -qE '^feat(\(.*\))?:'; then
              ADDED="${ADDED}\n- ${MSG}"
            elif echo "$line" | grep -qE '^fix(\(.*\))?:'; then
              FIXED="${FIXED}\n- ${MSG}"
            elif echo "$line" | grep -qE '^(refactor|perf)(\(.*\))?:'; then
              CHANGED="${CHANGED}\n- ${MSG}"
            fi
          done <<< "$(git log --format='%s' "${MERGE_SHA}^1..${MERGE_SHA}^2" 2>/dev/null)"

          # Build the new entry
          ENTRY="## [${TAG}] - ${DATE}"
          [ -n "$ADDED" ]  && ENTRY="${ENTRY}\n\n### Added$(echo -e "$ADDED")"
          [ -n "$FIXED" ]  && ENTRY="${ENTRY}\n\n### Fixed$(echo -e "$FIXED")"
          [ -n "$CHANGED" ] && ENTRY="${ENTRY}\n\n### Changed$(echo -e "$CHANGED")"

          # Insert after the header (before the first ## entry or at end)
          if [ -f CHANGELOG.md ]; then
            awk -v entry="$(echo -e "$ENTRY")" '
              /^## \[/ && !inserted { print entry; print ""; inserted=1 }
              { print }
              ENDFILE { if (!inserted) { print ""; print entry } }
            ' CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),"
              echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
              echo ""
              echo -e "$ENTRY"
              echo ""
            } > CHANGELOG.md
          fi

      - name: Commit changelog and tag
        id: push
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"

          # Check if tag already exists (idempotency)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for $TAG [skip ci]"
          git tag "$TAG"
          git push origin main "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-agent.yml -f tag="${{ steps.bump.outputs.tag }}"
          echo "Dispatched release-agent.yml for ${{ steps.bump.outputs.tag }}"

  sync-branches:
    name: Sync branches
    needs: [merge-to-main, auto-tag]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/dependabot-dev') && needs.merge-to-main.outputs.merged == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Sync main to other branches
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          MAIN_SHA=$(git rev-parse HEAD)
          git fetch origin dev dependabot-dev
          for BRANCH in dev dependabot-dev; do
            if [ "$BRANCH" = "$SOURCE" ]; then
              continue
            fi
            if git merge-base --is-ancestor "$MAIN_SHA" origin/"$BRANCH"; then
              echo "$BRANCH already contains all of main — skipping"
              continue
            fi
            git checkout -B "$BRANCH" origin/"$BRANCH"
            git merge --no-ff "$MAIN_SHA" -m "ci: sync $BRANCH with main [skip ci]"
            git push origin "$BRANCH"
          done

  notify-failure:
    name: Create failure issue
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
      - e2e
      - go-bench
      - rust-bench
      - deploy-api-docs
      - merge-to-main
      - auto-tag
      - sync-branches
    if: >-
      failure()
      && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "ci-failure" \
            --description "Automated: CI pipeline failure" \
            --color "B60205" \
            --force \
            --repo "${{ github.repository }}"
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/notify_failure.py
