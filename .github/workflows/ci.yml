      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: rust

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Pinned to the exact patch (not the '1.26' minor) so govulncheck
          # analyzes against the patched standard library: GO-2026-5039 and
          # GO-2026-5037 are fixed in go1.26.4, and the '1.26' manifest entry
          # can lag a fresh patch release. Keep in sync with the toolchain
          # directive in server/go.mod.
          go-version: '1.26.4'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Go vulnerability check (with retry)
        # govulncheck queries the Go vulnerability database over the network;
        # wrap in retry for github/proxy.golang.org transient failures.
        run: |
          set -e
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          for attempt in 1 2 3; do
            if (cd server && govulncheck ./...); then exit 0; fi
            echo "::warning::govulncheck attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::govulncheck failed after 3 attempts"
          exit 1
      - name: Rust vulnerability check (with retry)
        # `cargo audit` clones RustSec/advisory-db on each run; that clone is
        # the typical transient point (observed: github.com IO error talking
        # to advisory-db, 2026-05-15 02:53). Retry only the audit, not the
        # install (which has its own caching).
        run: |
          set -e
          cargo install cargo-audit@0.22.1
          for attempt in 1 2 3; do
            if (cd agent && cargo audit); then exit 0; fi
            echo "::warning::cargo audit attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::cargo audit failed after 3 attempts"
          exit 1
      - name: npm vulnerability check (with retry)
        run: |
          set -e
          for attempt in 1 2 3; do
            if (cd web && npm ci && npm audit --audit-level=high); then exit 0; fi
            echo "::warning::npm audit attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::npm audit failed after 3 attempts"
          exit 1

  pentest-review:
    name: Pen-Test Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need the branch base for diff-only scanning
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install pinned Semgrep
        run: bash scripts/install-semgrep.sh
      - name: Run adversarial pen-test gate
        # Diff-only: pull_request scans against the PR base SHA; push scans
        # against the previous branch tip (github.event.before), falling back
        # to HEAD~1 on a brand-new branch's first push. The runner blocks on
        # any HIGH-severity finding (exit 2) — a required merge-to-main check.
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            export PENTEST_BASELINE_REF="$PR_BASE_SHA"
          elif [ -n "${PUSH_BEFORE:-}" ] && ! printf '%s' "$PUSH_BEFORE" | grep -qE '^0+$'; then
            export PENTEST_BASELINE_REF="$PUSH_BEFORE"
          else
            export PENTEST_BASELINE_REF="HEAD~1"
          fi
          echo "pen-test baseline ref: $PENTEST_BASELINE_REF"
          bash scripts/pentest-review.sh

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    needs: [go-unit, rust-test, web-unit]
    if: github.event_name != 'schedule'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Go coverage
        uses: actions/download-artifact@v8
        with:
          name: go-coverage
          path: server/
      - name: Download Web coverage
        uses: actions/download-artifact@v8
        with:
          name: web-coverage
          path: web/coverage/
      - name: Download Rust coverage
        uses: actions/download-artifact@v8
        with:
          name: rust-coverage
          path: agent/
      # Primary path: the official action (fast, signature-verified). It
      # downloads the scanner CLI from binaries.sonarsource.com, which has
      # 403'd transiently (observed 2026-06-02). continue-on-error lets the
      # Docker fallback below take over instead of failing the gate on a CDN
      # blip; a real quality-gate failure still propagates (the fallback
      # re-runs the same scan and fails too).
      - name: SonarCloud Scan
        id: sonar_action
        if: env.SONAR_TOKEN != ''
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8
        with:
          args: -Dsonar.qualitygate.wait=true
      # Fallback: only when the action failed. Runs the scanner via the Docker
      # image (pulled from the container registry, NOT binaries.sonarsource.com
      # — the same path `make sonar` uses), with the repo's retry-with-backoff
      # pattern on the image pull.
      #
      # CRITICAL: pass -Dsonar.scanner.skipJreProvisioning=true. SonarScanner CLI
      # 8.x bootstraps by downloading a JRE from scanner.sonarcloud.io/jres/… —
      # a SECOND SonarSource CDN, which has 403'd in CI (observed repeatedly). A
      # fallback that re-downloads from a SonarSource CDN does not actually
      # survive a SonarSource-CDN outage. The scanner image already bundles a
      # compatible JRE (Corretto 21), so skipping provisioning makes the fallback
      # fully self-contained (image from docker.io only). Without this flag the
      # fallback fails on the JRE 403 — the recurring breakage this fixes.
      - name: SonarCloud Scan (Docker fallback on CDN failure)
        if: env.SONAR_TOKEN != '' && steps.sonar_action.outcome == 'failure'
        run: |
          set -euo pipefail
          echo "::warning::SonarCloud action failed (likely the binaries.sonarsource.com CDN); falling back to the Docker scanner."
          for attempt in 1 2 3; do
            if docker pull sonarsource/sonar-scanner-cli:latest; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::scanner image pull failed after 3 attempts"
              exit 1
            fi
            echo "::warning::scanner image pull attempt $attempt failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          docker run --rm \
            -e SONAR_TOKEN="$SONAR_TOKEN" \
            -v "$(pwd):/usr/src" -w /usr/src \
            sonarsource/sonar-scanner-cli:latest \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.scanner.skipJreProvisioning=true \
            -Dsonar.branch.name=dev

  bench-publish:
    name: Publish Benchmarks
    needs: [go-bench, rust-bench]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
