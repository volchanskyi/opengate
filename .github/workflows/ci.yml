name: CI

on:
  push:
    branches: [dev, dependabot-dev]
  pull_request:
    branches: [main, dev, dependabot-dev]
  workflow_dispatch:

permissions: {}

jobs:
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings

  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Tests
        run: |
          set +e
          cargo nextest run --workspace --no-fail-fast --color never > test-output.txt 2>&1
          EXIT_CODE=$?
          cat test-output.txt
          SUMMARY=$(grep "Summary" test-output.txt | tail -1 || echo "no summary")
          FAIL_TESTS=$(grep " FAIL " test-output.txt || echo "")
          {
            echo "## Rust Tests"
            echo ""
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ $SUMMARY"
            else
              echo "❌ $SUMMARY"
              if [ -n "$FAIL_TESTS" ]; then
                echo ""
                # shellcheck disable=SC2001
                echo "$FAIL_TESTS" | sed 's/.*FAIL \[.*\] /- ❌ /'
              fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Generate golden files
        run: GENERATE_GOLDEN=1 cargo nextest run -p mesh-protocol -E 'binary(golden_test)'
      - uses: actions/upload-artifact@v7
        with:
          name: golden-files
          path: testdata/golden/
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate Rust coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov.info
      - name: Upload Rust coverage
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: agent/lcov.info

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - run: go vet ./...

  go-unit:
    name: Go Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      coverage: ${{ steps.coverage.outputs.percentage }}
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Unit tests with coverage
        run: |
          set +e
          go test -json -race -timeout 5m -coverprofile=coverage.out -covermode=atomic ./internal/... > unit-results.json 2>unit-stderr.log
          cat unit-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' unit-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Unit Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              echo "| Package | Test |"
              echo "|---------|------|"
              jq -r 'select(.Action=="fail" and .Test != null) | "| \(.Package | split("/") | last) | \(.Test) |"' unit-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE
      - name: Enforce coverage threshold
        id: coverage
        run: |
          grep -v '/testutil/' coverage.out > coverage-prod.out
          TOTAL=$(go tool cover -func=coverage-prod.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Unit test coverage: $TOTAL%"
          go tool cover -func=coverage-prod.out
          echo "percentage=$TOTAL" >> "$GITHUB_OUTPUT"
          THRESHOLD=70
          if [ "$(echo "$TOTAL < $THRESHOLD" | bc)" -eq 1 ]; then
            echo "::error::Coverage $TOTAL% is below minimum threshold of $THRESHOLD%"
            exit 1
          fi
      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: server/coverage.out

  go-integration:
    name: Go Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Integration tests
        run: |
          set +e
          go test -json -race -timeout 5m ./tests/integration/ > integration-results.json 2>integration-stderr.log
          cat integration-stderr.log >&2
          EXIT_CODE=$?
          PASSED=$(jq -r 'select(.Action=="pass" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          FAILED=$(jq -r 'select(.Action=="fail" and .Test != null) | .Test' integration-results.json | wc -l | tr -d ' ')
          {
            echo "## Go Integration Tests"
            echo ""
            if [ "$FAILED" -eq 0 ]; then
              echo "✅ **${PASSED} passed**"
            else
              echo "❌ **${FAILED} failed**, ${PASSED} passed"
              echo ""
              jq -r 'select(.Action=="fail" and .Test != null) | "- ❌ \(.Test)"' integration-results.json
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit $EXIT_CODE

  go-bench:
    name: Go Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - name: Run Go benchmarks
        run: go test -bench=. -benchmem -count=1 -run='^$' ./internal/... | tee "$GITHUB_WORKSPACE/bench-go.txt"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-go
          path: bench-go.txt

  rust-bench:
    name: Rust Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: Run Rust benchmarks
        run: cargo bench --package mesh-protocol --bench codec_bench
      - name: Convert criterion JSON to benchmark format
        run: |
          jq -n '[inputs | {
            name: input_filename | split("/")[-3],
            unit: "ns/iter",
            value: .mean.point_estimate
          }]' target/criterion/*/new/estimates.json \
            > "$GITHUB_WORKSPACE/bench-rust.json"
          cat "$GITHUB_WORKSPACE/bench-rust.json"
      - uses: actions/upload-artifact@v7
        with:
          name: bench-rust
          path: bench-rust.json

  golden:
    name: Golden File Verification
    needs: [rust-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: actions/download-artifact@v8
        with:
          name: golden-files
          path: testdata/golden/
      - run: go test ./internal/protocol/ -run TestGolden -v
      - name: Verify golden files unchanged
        run: git diff --exit-code -- testdata/golden/

  web-lint:
    name: Web Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint

  web-unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Unit & component tests
        run: |
          set +e
          npx vitest run --coverage --reporter=verbose --reporter=json --outputFile=test-results.json src/
          EXIT_CODE=$?
          node -e "
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
            const p = r.numPassedTests, f = r.numFailedTests;
            let md = '## Web Unit Tests\n\n';
            if (f === 0) {
              md += '✅ **' + p + ' passed**\n';
            } else {
              md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
              r.testResults.forEach(s => s.assertionResults
                .filter(t => t.status === 'failed')
                .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
          "
          exit $EXIT_CODE
      - name: Upload Web coverage
        uses: actions/upload-artifact@v7
        with:
          name: web-coverage
          path: web/coverage/lcov.info
      - run: npx vite build

  web-integration:
    name: Web Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Integration tests
        run: |
          set +e
          npx vitest run --reporter=verbose --reporter=json --outputFile=test-results.json tests/integration/
          EXIT_CODE=$?
          if [ -f test-results.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('test-results.json', 'utf8'));
              const p = r.numPassedTests, f = r.numFailedTests;
              let md = '## Web Integration Tests\n\n';
              if (f === 0) {
                md += '✅ **' + p + ' passed**\n';
              } else {
                md += '❌ **' + f + ' failed**, ' + p + ' passed\n\n';
                r.testResults.forEach(s => s.assertionResults
                  .filter(t => t.status === 'failed')
                  .forEach(t => { md += '- ❌ ' + t.fullName + '\n'; }));
              }
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + '\n');
            "
          fi
          exit $EXIT_CODE

  e2e:
    name: E2E Tests
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start test server
        run: |
          cd deploy && docker compose -f docker-compose.test.yml up -d --build --wait
      - name: Wait for server
        run: bash deploy/scripts/wait-for-server.sh http://localhost:8080 60
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
      - name: Teardown
        if: always()
        run: cd deploy && docker compose -f docker-compose.test.yml down -v

  deploy-api-docs:
    name: Deploy API Docs
    needs: [web-unit]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages
      - name: Deploy API docs
        run: |
          mkdir -p gh-pages/docs/api
          cp api/openapi.yaml gh-pages/docs/api/
          cp docs/api/index.html gh-pages/docs/api/
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update API reference"
          git push

  config-lint:
    name: Config Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # GitHub Actions workflow lint
      - uses: raven-actions/actionlint@v2

      # YAML lint (deploy configs, cloud-init)
      - run: pip install --user yamllint
      - run: yamllint -c .yamllint.yml deploy/

      # Terraform format + validate
      - uses: hashicorp/setup-terraform@v4
      - name: Terraform fmt
        run: terraform -chdir=deploy/terraform fmt -check -recursive
      - name: Terraform init
        run: terraform -chdir=deploy/terraform init -backend=false
      - name: Terraform validate
        run: terraform -chdir=deploy/terraform validate

      # Terraform linting
      - uses: terraform-linters/setup-tflint@v6
      - run: tflint --init --chdir=deploy/terraform
      - run: tflint --chdir=deploy/terraform --format=compact

      # Docker Compose validation
      - name: Validate Docker Compose
        working-directory: deploy
        env:
          JWT_SECRET: ci-dummy
          AMT_USER: admin
          AMT_PASS: ci-dummy
          VAPID_CONTACT: ci@example.com
          IMAGE_TAG: latest
          DOMAIN: example.com
          STAGING_JWT_SECRET: ci-dummy
        run: |
          docker compose config --quiet
          docker compose -f docker-compose.yml -f docker-compose.staging.yml config --quiet
          docker compose -f docker-compose.test.yml config --quiet

      # Caddyfile validation
      - name: Install Caddy
        run: |
          curl -sL "https://caddyserver.com/api/download?os=linux&arch=amd64" -o /usr/local/bin/caddy
          chmod +x /usr/local/bin/caddy
      - name: Validate Caddyfiles
        run: |
          caddy fmt --diff deploy/caddy/Caddyfile
          caddy fmt --diff deploy/caddy/Caddyfile.staging
          caddy validate --config deploy/caddy/Caddyfile --adapter caddyfile
          caddy validate --config deploy/caddy/Caddyfile.staging --adapter caddyfile

      # IaC security scan
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: deploy/
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore
      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: Dockerfile
          severity: HIGH,CRITICAL
          exit-code: 1
          trivyignores: .trivyignore

      # Cross-config consistency tests
      - name: Deploy config integration tests
        run: bash deploy/tests/validate-configs.sh

  codeql-go:
    name: CodeQL Go
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: go

  codeql-js:
    name: CodeQL TypeScript
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v4
        with:
          category: javascript-typescript

  codeql-rust:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: github/codeql-action/init@v4
        with:
          languages: rust
          queries: security-and-quality
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: rust

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          cd server && govulncheck ./...
      - name: Rust vulnerability check
        run: |
          cargo install cargo-audit@0.22.1
          cd agent && cargo audit
      - name: npm vulnerability check
        run: cd web && npm ci && npm audit --audit-level=high

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    needs: [go-unit, rust-test, web-unit]
    if: github.event_name != 'schedule'
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download Go coverage
        uses: actions/download-artifact@v8
        with:
          name: go-coverage
          path: server/
      - name: Download Web coverage
        uses: actions/download-artifact@v8
        with:
          name: web-coverage
          path: web/coverage/
      - name: Download Rust coverage
        uses: actions/download-artifact@v8
        with:
          name: rust-coverage
          path: agent/
      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v7
      - name: Export SonarCloud findings as SARIF
        if: env.SONAR_TOKEN != ''
        run: |
          pip install --quiet sonar-tools
          sonar-findings-export \
            -u https://sonarcloud.io \
            -t "$SONAR_TOKEN" \
            -o volchanskyi \
            -k volchanskyi_opengate \
            --format sarif > sonar-results-raw.sarif
          jq '
            (.runs[]?.results[]? | .properties.tags) |=
              if type == "string" then split(",") | map(ltrimstr(" "))
              elif type != "array" then []
              else . end
          ' sonar-results-raw.sarif > sonar-results.sarif
      - name: Upload SonarCloud SARIF to GitHub
        if: env.SONAR_TOKEN != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sonar-results.sarif
          category: sonarcloud

  bench-publish:
    name: Publish Benchmarks
    needs: [go-bench, rust-bench]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download Go benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-go
          path: .
      - name: Download Rust benchmark results
        uses: actions/download-artifact@v8
        with:
          name: bench-rust
          path: .
      - name: Store Go benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: go
          output-file-path: bench-go.txt
          benchmark-data-dir-path: dev/bench/go
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'
      - name: Store Rust benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-rust.json
          benchmark-data-dir-path: dev/bench/rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'
      - name: Push benchmark results
        run: git push origin gh-pages

  merge-to-main:
    name: Auto-merge to main
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
      - e2e
      - go-bench
      - rust-bench
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/dependabot-dev')
    runs-on: ubuntu-latest
    outputs:
      merged: ${{ steps.merge.outputs.merged }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge source into main
        id: merge
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          git fetch origin "$SOURCE"
          if git merge-base --is-ancestor origin/"$SOURCE" HEAD; then
            echo "main already contains all commits from $SOURCE — skipping"
            echo "merged=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git merge --no-ff origin/"$SOURCE" -m "ci: auto-merge $SOURCE → main"
          git push origin main
          echo "merged=true" >> "$GITHUB_OUTPUT"
      - name: Update coverage badge
        if: github.ref == 'refs/heads/dev'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: cf505c74b56eab52c9497af517b53222
          filename: opengate-coverage.json
          label: Go Server Coverage
          message: ${{ needs.go-unit.outputs.coverage }}%
          valColorRange: ${{ needs.go-unit.outputs.coverage }}
          minColorRange: 75
          maxColorRange: 85

  auto-tag:
    name: Auto-tag release
    needs: [merge-to-main]
    if: needs.merge-to-main.outputs.merged == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: auto-tag
      cancel-in-progress: false
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Ivan Volchanskyi"
          git config user.email "ivan.volchanskyi@gmail.com"

      - name: Determine version bump
        id: bump
        run: |
          # Find latest semver tag, default to v0.0.0
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          LATEST="${LATEST:-v0.0.0}"
          SEMVER="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$SEMVER"

          # Get commits merged in the last merge commit (--no-ff merge)
          MERGE_SHA=$(git rev-parse HEAD)
          COMMITS=$(git log --format='%s' "${MERGE_SHA}^1..${MERGE_SHA}^2" 2>/dev/null || echo "")

          if [ -z "$COMMITS" ]; then
            echo "No new commits to analyze"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level (highest wins)
          BUMP=""
          if echo "$COMMITS" | grep -qiE 'BREAKING CHANGE|^[a-z]+(\(.*\))?!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\(.*\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^fix(\(.*\))?:'; then
            BUMP="patch"
          fi

          if [ -z "$BUMP" ]; then
            echo "No release-worthy commits (ci/style/refactor/docs/test only)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → $NEW_TAG (was $LATEST)"
          {
            echo "tag=$NEW_TAG"
            echo "version=${MAJOR}.${MINOR}.${PATCH}"
            echo "prev=$LATEST"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          MERGE_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y-%m-%d)

          # Collect commits by category
          ADDED=""
          FIXED=""
          CHANGED=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            # Strip type prefix, keep scope and description
            MSG=$(echo "$line" | sed -E 's/^[a-z]+(\([^)]*\))?!?:\s*//')
            SCOPE=$(echo "$line" | sed -nE 's/^[a-z]+\(([^)]*)\).*$/\1/p')
            [ -n "$SCOPE" ] && MSG="**$SCOPE:** $MSG"

            if echo "$line" | grep -qE '^feat(\(.*\))?:'; then
              ADDED="${ADDED}\n- ${MSG}"
            elif echo "$line" | grep -qE '^fix(\(.*\))?:'; then
              FIXED="${FIXED}\n- ${MSG}"
            elif echo "$line" | grep -qE '^(refactor|perf)(\(.*\))?:'; then
              CHANGED="${CHANGED}\n- ${MSG}"
            fi
          done <<< "$(git log --format='%s' "${MERGE_SHA}^1..${MERGE_SHA}^2" 2>/dev/null)"

          # Build the new entry
          ENTRY="## [${TAG}] - ${DATE}"
          [ -n "$ADDED" ]  && ENTRY="${ENTRY}\n\n### Added$(echo -e "$ADDED")"
          [ -n "$FIXED" ]  && ENTRY="${ENTRY}\n\n### Fixed$(echo -e "$FIXED")"
          [ -n "$CHANGED" ] && ENTRY="${ENTRY}\n\n### Changed$(echo -e "$CHANGED")"

          # Insert after the header (before the first ## entry or at end)
          if [ -f CHANGELOG.md ]; then
            awk -v entry="$(echo -e "$ENTRY")" '
              /^## \[/ && !inserted { print entry; print ""; inserted=1 }
              { print }
              ENDFILE { if (!inserted) { print ""; print entry } }
            ' CHANGELOG.md > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "All notable changes to this project will be documented in this file."
              echo ""
              echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),"
              echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
              echo ""
              echo -e "$ENTRY"
              echo ""
            } > CHANGELOG.md
          fi

      - name: Commit changelog and tag
        id: push
        if: steps.bump.outputs.skip != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"

          # Check if tag already exists (idempotency)
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG for $TAG [skip ci]"
          git tag "$TAG"
          git push origin main "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger release workflow
        if: steps.push.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release-agent.yml -f tag="${{ steps.bump.outputs.tag }}"
          echo "Dispatched release-agent.yml for ${{ steps.bump.outputs.tag }}"

  sync-branches:
    name: Sync branches
    needs: [merge-to-main, auto-tag]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/dependabot-dev') && needs.merge-to-main.outputs.merged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.SYNC_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Sync main to other branches
        run: |
          SOURCE="${GITHUB_REF#refs/heads/}"
          MAIN_SHA=$(git rev-parse HEAD)
          git fetch origin dev dependabot-dev
          for BRANCH in dev dependabot-dev; do
            if [ "$BRANCH" = "$SOURCE" ]; then
              continue
            fi
            if git merge-base --is-ancestor "$MAIN_SHA" origin/"$BRANCH"; then
              echo "$BRANCH already contains all of main — skipping"
              continue
            fi
            git checkout -B "$BRANCH" origin/"$BRANCH"
            git merge --no-ff "$MAIN_SHA" -m "ci: sync $BRANCH with main [skip ci]"
            git push origin "$BRANCH"
          done

  notify-failure:
    name: Create failure issue
    needs:
      - rust-lint
      - rust-test
      - go-lint
      - go-unit
      - go-integration
      - golden
      - web-lint
      - web-unit
      - web-integration
      - config-lint
      - codeql-go
      - codeql-js
      - codeql-rust
      - security-audit
      - sonarcloud
      - e2e
      - go-bench
      - rust-bench
      - deploy-api-docs
      - merge-to-main
      - auto-tag
      - sync-branches
    if: >-
      failure()
      && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Ensure ci-failure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "ci-failure" \
            --description "Automated: CI pipeline failure" \
            --color "B60205" \
            --force \
            --repo "${{ github.repository }}"
      - name: Create or update failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          WORKFLOW: ${{ github.workflow }}
          SHA: ${{ github.sha }}
          EVENT: ${{ github.event_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python3 .github/scripts/notify_failure.py
