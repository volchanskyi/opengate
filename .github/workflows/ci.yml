          auto-push: false
          alert-threshold: '120%'
          fail-on-alert: false
          comment-on-alert: true
          alert-comment-cc-users: '@volchanskyi'
      - name: Store Rust benchmark result
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1
        with:
          tool: customSmallerIsBetter
          output-file-path: bench-rust.json
          benchmark-data-dir-path: dev/bench/rust
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          skip-fetch-gh-pages: true
          alert-threshold: '120%'
          fail-on-alert: false
