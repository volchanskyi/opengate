name: E2E Cross-Browser

# Runs the Playwright suite against Firefox + WebKit in addition to Chromium.
# Gated behind `workflow_dispatch` and a nightly cron (matches mutation.yml
# and terraform-drift.yml at 03:00 UTC) so PR CI stays Chromium-only and
# this never blocks merges. WebKit occasionally flakes inside Docker; the
# Playwright config bumps retries to 1 when PLAYWRIGHT_ALL_BROWSERS=1.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions: {}

jobs:
  e2e:
    name: E2E (Firefox + WebKit + Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    env:
      PLAYWRIGHT_ALL_BROWSERS: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - uses: ./.github/actions/docker-hub-mirror
      - name: Run Playwright across all browsers
        id: pw
        run: |
          set -e
          cd ../deploy
          docker compose -f docker-compose.test.yml down -v 2>/dev/null || true
          docker compose -f docker-compose.test.yml up --build --wait
          cd ../web
          # Tee Playwright's stdout/stderr so the next step can extract the
          # flaky-test list. The retry policy (retries: 1 when
          # PLAYWRIGHT_ALL_BROWSERS=1) means a flaky test exits with code 0;
          # without this capture the flake is invisible outside the HTML report.
          set +e
          npx playwright test 2>&1 | tee /tmp/playwright-output.txt
          ec=${PIPESTATUS[0]}
          set -e
          exit "$ec"
      - name: Summarize flaky tests
        # Always runs so flake visibility is preserved even when the job is
        # going red for an unrelated reason (e.g. Docker compose failure).
        if: always() && hashFiles('/tmp/playwright-output.txt') != ''
        run: |
          set -euo pipefail
          # Playwright's summary line looks like `  N flaky` followed by one
          # indented line per flaky test, then `  N skipped` / `  N passed`.
          FLAKY_LINE="$(grep -E '^[[:space:]]+[0-9]+[[:space:]]+flaky$' /tmp/playwright-output.txt || true)"
          if [[ -z "$FLAKY_LINE" ]]; then
            echo "no flaky tests"
            exit 0
          fi
          FLAKY_COUNT="$(echo "$FLAKY_LINE" | awk '{print $1}')"
          # Grab the flaky test list: every line between the `N flaky` header
          # and the next summary line (skipped/passed). awk's range pattern
          # makes that one-liner.
          FLAKY_LIST="$(awk '
            /^[[:space:]]+[0-9]+[[:space:]]+flaky$/ {flag=1; next}
            /^[[:space:]]+[0-9]+[[:space:]]+(skipped|passed|did not run)/ {flag=0}
            flag {print}
          ' /tmp/playwright-output.txt)"
          echo "::warning::${FLAKY_COUNT} flaky test(s) passed only on retry — see job summary for the list"
          # Emit a per-flake warning so they show as annotations on the run.
          while IFS= read -r line; do
            [[ -z "$line" ]] && continue
            # Trim leading whitespace via bash parameter expansion. Using
            # this form instead of sed avoids spawning a process per line and
            # also keeps the linter's SC2001 rule satisfied.
            trimmed="${line#"${line%%[![:space:]]*}"}"
            echo "::warning::flaky: ${trimmed}"
          done <<< "$FLAKY_LIST"
          {
            echo "## :warning: Flaky tests (${FLAKY_COUNT})"
            echo ""
            echo "These tests **failed on first attempt and passed on retry** (Playwright \`retries: 1\` policy)."
            echo "They did not fail the job, but indicate browser-engine or infrastructure noise worth tracking."
            echo ""
            echo '```'
            echo "$FLAKY_LIST"
            echo '```'
            echo ""
            echo "Full HTML report: see the \`playwright-report-cross-browser\` artifact below."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Tear down docker
        if: always()
        working-directory: deploy
        run: docker compose -f docker-compose.test.yml down -v
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-cross-browser
          path: web/playwright-report/
          retention-days: 14
