name: iac-plan-preview

# Posts a `terraform plan` preview as a PR comment whenever deploy/terraform/**
# is touched. Gates the merge: a `destroy` of a protected resource type
# (VCN / subnet / security list / NSG / state bucket) fails the workflow unless
# the PR carries the `iac:approve-destroy` label.
#
# Plan: .claude/plans/archive/iac-security-testing-pyramid.md (S4)
# Authentication: reuses the read-only OCI user `tf-drift-reader` (provisioned
# for T4 drift detection). Same permissions (inspect + state read), same
# secrets — sharing the credential keeps the secret-management surface small.

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'deploy/terraform/**'
      - '.github/workflows/iac-plan-preview.yml'
      - 'deploy/scripts/parse-tfplan.sh'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write  # for the PR comment

concurrency:
  group: iac-plan-preview-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: 1.9.x

jobs:
  plan-preview:
    name: Plan preview + destroy-blocklist gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Write OCI provider API key
        env:
          OCI_DRIFT_PRIVATE_KEY: ${{ secrets.OCI_DRIFT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_DRIFT_PRIVATE_KEY" > ~/.oci/drift.pem
          chmod 600 ~/.oci/drift.pem

      - name: Write backend config
        env:
          OCI_TFSTATE_NAMESPACE: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          cat > /tmp/backend.tfbackend <<EOF
          endpoints = {
            s3 = "https://${OCI_TFSTATE_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          }
          EOF

      - name: Terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        run: terraform -chdir=deploy/terraform init -backend-config=/tmp/backend.tfbackend -input=false

      - name: Terraform plan
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_DRIFT_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_DRIFT_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/drift.pem
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          # tf-drift-reader is inspect-only; plan refresh works against the
          # actual provider but apply would fail at the API layer.
          TF_VAR_ssh_allowed_cidr: 203.0.113.0/24
          TF_VAR_ssh_public_key_path: /dev/null
        run: |
          terraform -chdir=deploy/terraform plan -out=plan.tfplan -input=false -no-color
          terraform -chdir=deploy/terraform show -json plan.tfplan > /tmp/plan.json

      - name: Parse plan, build PR comment, gate destroys
        id: parse
        env:
          HAS_APPROVE_DESTROY: ${{ contains(github.event.pull_request.labels.*.name, 'iac:approve-destroy') }}
        run: |
          set -euo pipefail
          ARGS=()
          if [[ "$HAS_APPROVE_DESTROY" == "true" ]]; then
            ARGS+=(--approve-destroy)
          fi
          # Capture both stdout (PR body) and exit code (gate decision).
          set +e
          ./deploy/scripts/parse-tfplan.sh /tmp/plan.json "${ARGS[@]}" > /tmp/pr-body.md 2>/tmp/parse-stderr.txt
          ec=$?
          set -e
          echo "parse_exit=$ec" >> "$GITHUB_OUTPUT"
          # The PR body is intended for posting as a comment; truncate to 60 KB
          # (GitHub comments are capped at 64 KB).
          head -c 60000 /tmp/pr-body.md > /tmp/pr-body-trim.md
          cat /tmp/pr-body-trim.md
          # Stash for the comment step
          {
            echo "body<<PRBODY_EOF"
            cat /tmp/pr-body-trim.md
            echo "PRBODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PR_BODY: ${{ steps.parse.outputs.body }}
        with:
          script: |
            const wfPath = '.github/workflows/iac-plan-preview.yml';
            const wfUrl =
              `${context.serverUrl}/${context.repo.owner}` +
              `/${context.repo.repo}/blob/${context.sha}/${wfPath}`;
            const marker = '### IaC plan preview';
            const body =
              `${marker}\n\n${process.env.PR_BODY}\n\n` +
              `_Posted by [\`${wfPath}\`](${wfUrl})._`;
            // Update an existing comment in place so the PR doesn't accumulate
            // one comment per push.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail workflow on protected-resource destroy
        if: steps.parse.outputs.parse_exit != '0'
        run: |
          echo "::error::Plan destroys a protected resource without iac:approve-destroy"
          exit 1
