name: Load Tests

on:
  workflow_dispatch:
    inputs:
      agents:
        description: "Number of QUIC agents to simulate"
        required: false
        default: "100"
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: load-test
  cancel-in-progress: false

env:
  DEPLOY_DIR: /opt/opengate

permissions:
  contents: read

jobs:
  load-test:
    name: Load Tests (k6 + QUIC)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum

      # --- OCI + SSH setup -------------------------------------------------------

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI credentials
        env:
          OCI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "$OCI_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config <<EOF
          [DEFAULT]
          tenancy=$OCI_TENANCY
          user=$OCI_USER
          fingerprint=$OCI_FINGERPRINT
          key_file=$HOME/.oci/key.pem
          region=$OCI_REGION
          EOF
          chmod 600 ~/.oci/config

      - name: Cleanup stale firewall rules
        env:
          NSG_ID: ${{ secrets.OCI_CD_NSG_ID }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          # shellcheck disable=SC2016
          STALE_RULES=$(oci network nsg rules list \
            --nsg-id "$NSG_ID" \
            --query 'data[?"description" != null] | [?starts_with(description, `CD:`)].id' \
            --output json 2>/dev/null || echo '[]')

          if [[ "$STALE_RULES" != "[]" && -n "$STALE_RULES" ]]; then
            echo "::warning::Found stale NSG rules from previous runs — cleaning up: $STALE_RULES"
            oci network nsg rules remove \
              --nsg-id "$NSG_ID" \
              --security-rule-ids "$STALE_RULES" || true
          else
            echo "No stale NSG rules found"
          fi

      - name: Open SSH firewall for runner
        id: firewall
        env:
          NSG_ID: ${{ secrets.OCI_CD_NSG_ID }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          RUNNER_IP=$(curl -sf https://ifconfig.me)
          echo "Adding SSH rule for runner IP: $RUNNER_IP"

          RULE_ID=$(oci network nsg rules add \
            --nsg-id "$NSG_ID" \
            --security-rules "[{
              \"direction\": \"INGRESS\",
              \"protocol\": \"6\",
              \"source\": \"${RUNNER_IP}/32\",
              \"sourceType\": \"CIDR_BLOCK\",
              \"isStateless\": false,
              \"tcpOptions\": {
                \"destinationPortRange\": {\"min\": 22, \"max\": 22}
              },
              \"description\": \"CD: GHA runner ${RUNNER_IP} run ${{ github.run_id }}\"
            }]" \
            --query 'data."security-rules"[0].id' \
            --raw-output)
          echo "rule_id=$RULE_ID" >> "$GITHUB_OUTPUT"
          echo "NSG rule added: $RULE_ID"

          sleep 5

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          if [[ -z "$DEPLOY_HOST" ]]; then
            echo "::error::DEPLOY_HOST secret is empty"
            exit 1
          fi
          if [[ -z "$SSH_KEY" ]]; then
            echo "::error::SSH_KEY secret is empty"
            exit 1
          fi

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          cat >> ~/.ssh/config <<EOF
          Host deploy-target
            HostName $DEPLOY_HOST
            User ubuntu
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

          for attempt in 1 2 3; do
            if ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              echo "ssh-keyscan succeeded (attempt $attempt)"
              break
            fi
            echo "::warning::ssh-keyscan attempt $attempt failed"
            if [[ $attempt -lt 3 ]]; then sleep 2; else
              echo "::error::ssh-keyscan failed after 3 attempts"
              exit 1
            fi
          done

      # --- Phase 1: k6 HTTP/WebSocket load tests --------------------------------

      - name: Install k6 on VPS
        run: |
          ssh deploy-target "curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz | tar xz && mv k6-v0.54.0-linux-amd64/k6 /tmp/k6 && rm -rf k6-v0.54.0-linux-amd64"

      - name: Copy k6 scenarios to VPS
        run: scp load/k6/scenarios/*.js deploy-target:/tmp/

      - name: Run k6 API baseline
        run: ssh deploy-target "/tmp/k6 run --env BASE_URL=http://127.0.0.1:18080 /tmp/api-baseline.js"

      - name: Run k6 concurrent agents
        run: ssh deploy-target "/tmp/k6 run --env BASE_URL=http://127.0.0.1:18080 /tmp/concurrent-agents.js"

      - name: Run k6 relay throughput
        run: ssh deploy-target "/tmp/k6 run --env BASE_URL=http://127.0.0.1:18080 /tmp/relay-throughput.js"

      - name: Cleanup k6 files on VPS
        if: always()
        run: ssh deploy-target "rm -f /tmp/k6 /tmp/api-baseline.js /tmp/concurrent-agents.js /tmp/relay-throughput.js" || true

      # --- Phase 2: Go QUIC agent load test --------------------------------------

      - name: Build QUIC load test harness
        run: cd server && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o /tmp/loadtest ./tests/loadtest/

      - name: Copy harness to VPS
        run: scp /tmp/loadtest deploy-target:/tmp/loadtest

      - name: Run QUIC load test
        run: |
          AGENTS="${{ inputs.agents || '100' }}"
          # shellcheck disable=SC2029
          ssh deploy-target "/tmp/loadtest -agents=${AGENTS} -addr=127.0.0.1:19090"

      - name: Cleanup harness on VPS
        if: always()
        run: ssh deploy-target "rm -f /tmp/loadtest" || true

      # --- Teardown --------------------------------------------------------------

      - name: Close SSH firewall
        if: always() && steps.firewall.outputs.rule_id
        env:
          NSG_ID: ${{ secrets.OCI_CD_NSG_ID }}
          OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
        run: |
          oci network nsg rules remove \
            --nsg-id "$NSG_ID" \
            --security-rule-ids '["${{ steps.firewall.outputs.rule_id }}"]' \
            || true

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh/deploy_key ~/.oci
