name: Load Tests

on:
  workflow_dispatch:
    inputs:
      agents:
        description: "Number of QUIC agents to simulate"
        required: false
        default: "100"

concurrency:
  group: load-test
  cancel-in-progress: false

env:
  DEPLOY_DIR: /opt/opengate

permissions:
  contents: read

jobs:
  load-test:
    name: Load Tests (k6 + QUIC)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum

      - name: OCI + SSH setup
        id: infra
        uses: ./.github/actions/oci-ssh-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          run-id: ${{ github.run_id }}

      # --- Phase 1: k6 HTTP/WebSocket load tests --------------------------------

      - name: Detect VPS architecture
        id: arch
        run: |
          VPS_ARCH=$(ssh deploy-target "uname -m")
          case "$VPS_ARCH" in
            aarch64) K6_ARCH=arm64; GO_ARCH=arm64 ;;
            *)       K6_ARCH=amd64; GO_ARCH=amd64 ;;
          esac
          echo "k6=$K6_ARCH" >> "$GITHUB_OUTPUT"
          echo "go=$GO_ARCH" >> "$GITHUB_OUTPUT"

      - name: Install k6 on VPS
        run: |
          ARCH=${{ steps.arch.outputs.k6 }}
          ssh deploy-target "curl -sL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-${ARCH}.tar.gz | tar xz && mv k6-v0.54.0-linux-${ARCH}/k6 /tmp/k6 && rm -rf k6-v0.54.0-linux-${ARCH}"

      - name: Copy k6 scenarios to VPS
        run: scp load/k6/scenarios/*.js deploy-target:/tmp/

      - name: Run k6 API baseline
        run: ssh deploy-target "/tmp/k6 run --env BASE_URL=http://127.0.0.1:18080 /tmp/api-baseline.js"

      - name: Run k6 concurrent agents
        run: ssh deploy-target "/tmp/k6 run --env BASE_URL=http://127.0.0.1:18080 /tmp/concurrent-agents.js"

      - name: Run k6 relay throughput
        run: ssh deploy-target "/tmp/k6 run --env BASE_URL=http://127.0.0.1:18080 /tmp/relay-throughput.js"

      - name: Cleanup k6 files on VPS
        if: always()
        run: ssh deploy-target "rm -f /tmp/k6 /tmp/api-baseline.js /tmp/concurrent-agents.js /tmp/relay-throughput.js" || true

      # --- Phase 2: Go QUIC agent load test --------------------------------------

      - name: Build QUIC load test harness
        run: cd server && CGO_ENABLED=0 GOOS=linux GOARCH=${{ steps.arch.outputs.go }} go build -trimpath -o /tmp/loadtest ./tests/loadtest/

      - name: Copy harness to VPS
        run: scp /tmp/loadtest deploy-target:/tmp/loadtest

      - name: Run QUIC load test
        run: |
          AGENTS="${{ inputs.agents || '100' }}"
          # shellcheck disable=SC2029
          ssh deploy-target "/tmp/loadtest -agents=${AGENTS} -addr=127.0.0.1:19090"

      - name: Cleanup harness on VPS
        if: always()
        run: ssh deploy-target "rm -f /tmp/loadtest" || true

      # --- Teardown --------------------------------------------------------------

      - name: OCI + SSH teardown
        if: always()
        uses: ./.github/actions/oci-ssh-teardown
        with:
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          rule-id: ${{ steps.infra.outputs.rule-id }}
