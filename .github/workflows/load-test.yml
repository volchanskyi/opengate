name: Load Tests

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      agents:
        description: "Number of QUIC agents to simulate"
        required: false
        default: "100"

concurrency:
  group: load-test
  cancel-in-progress: false

env:
  K6_VERSION: v1.6.1
  K6_SUMMARY_TREND_STATS: avg,min,med,p(50),p(95),p(99),max
  LOADTEST_K6_SUMMARY_DIR: /tmp/loadtest-k6
  LOADTEST_QUIC_OUTPUT: /tmp/loadtest-quic.txt
  NAMESPACE: opengate-staging
  RELEASE: opengate-staging

permissions:
  contents: read

jobs:
  load-test:
    name: Load Tests (k6 + QUIC)
    runs-on: ubuntu-latest
    # Deliberately avoid `environment: staging`: its required reviewers would
    # block the scheduled run. This read-only workload uses repository-level OCI
    # credentials and creates only short-lived port-forwards and test pods.
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: server/go.sum

      - name: OCI + kubeconfig setup
        uses: ./.github/actions/oci-kube-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          cluster-id: ${{ secrets.OKE_CLUSTER_ID }}

      # --- Phase 1: k6 HTTP/WebSocket load tests ------------------------------

      - name: Install k6
        run: |
          curl -fsSL \
            "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          install -m 0755 "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /tmp/k6
          /tmp/k6 version

      - name: Prepare load-test summaries
        run: install -d -m 0755 "$LOADTEST_K6_SUMMARY_DIR"

      - name: Port-forward staging server
        run: |
          kubectl -n "$NAMESPACE" port-forward "svc/${RELEASE}-server" 18080:8080 >/tmp/loadtest-pf.log 2>&1 &
          echo "$!" >/tmp/loadtest-pf.pid
          for _ in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18080/api/v1/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/loadtest-pf.log
          exit 1

      - name: Run k6 API baseline
        run: |
          /tmp/k6 run \
            --summary-export "$LOADTEST_K6_SUMMARY_DIR/api-baseline.json" \
            --summary-trend-stats "$K6_SUMMARY_TREND_STATS" \
            --env BASE_URL=http://127.0.0.1:18080 \
            load/k6/scenarios/api-baseline.js

      - name: Run k6 concurrent agents
        run: |
          /tmp/k6 run \
            --summary-export "$LOADTEST_K6_SUMMARY_DIR/concurrent-agents.json" \
            --summary-trend-stats "$K6_SUMMARY_TREND_STATS" \
            --env BASE_URL=http://127.0.0.1:18080 \
            load/k6/scenarios/concurrent-agents.js

      - name: Run k6 relay throughput
        run: |
          /tmp/k6 run \
            --summary-export "$LOADTEST_K6_SUMMARY_DIR/relay-throughput.json" \
            --summary-trend-stats "$K6_SUMMARY_TREND_STATS" \
            --env BASE_URL=http://127.0.0.1:18080 \
            load/k6/scenarios/relay-throughput.js

      - name: Stop staging port-forward
        if: always()
        run: kill "$(cat /tmp/loadtest-pf.pid)" 2>/dev/null || true

      # --- Phase 2: Go QUIC agent load test ----------------------------------

      - name: Resolve staging QUIC target
        run: |
          set -euo pipefail
          kubectl -n "$NAMESPACE" rollout status "deploy/${RELEASE}-server" --timeout=120s
          SERVER_POD="$(kubectl -n "$NAMESPACE" get pods \
            -l "app.kubernetes.io/instance=${RELEASE},app.kubernetes.io/component=server" \
            -o jsonpath='{.items[0].metadata.name}')"
          SERVER_POD_IP="$(kubectl -n "$NAMESPACE" get pod "$SERVER_POD" \
            -o jsonpath='{.status.podIP}')"
          SERVER_NODE="$(kubectl -n "$NAMESPACE" get pod "$SERVER_POD" \
            -o jsonpath='{.spec.nodeName}')"
          LOADTEST_GOARCH="$(kubectl get node "$SERVER_NODE" \
            -o jsonpath='{.status.nodeInfo.architecture}')"
          case "$LOADTEST_GOARCH" in
            amd64|arm64) ;;
            *) echo "::error::Unsupported OKE node architecture: $LOADTEST_GOARCH"; exit 1 ;;
          esac
          test -n "$SERVER_POD_IP"
          {
            echo "SERVER_POD=$SERVER_POD"
            echo "SERVER_POD_IP=$SERVER_POD_IP"
            echo "LOADTEST_GOARCH=$LOADTEST_GOARCH"
          } >>"$GITHUB_ENV"

      - name: Build QUIC load test harness
        working-directory: server
        run: CGO_ENABLED=0 GOOS=linux GOARCH="$LOADTEST_GOARCH" go build -trimpath -o /tmp/loadtest ./tests/loadtest/

      - name: Stage QUIC harness in cluster
        run: |
          set -euo pipefail
          LOADTEST_POD="quic-loadtest-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "LOADTEST_POD=$LOADTEST_POD" >>"$GITHUB_ENV"

          install -d -m 0700 /tmp/loadtest-data
          kubectl -n "$NAMESPACE" exec "$SERVER_POD" -- cat /data/ca.crt > /tmp/loadtest-data/ca.crt
          kubectl -n "$NAMESPACE" exec "$SERVER_POD" -- cat /data/ca.key > /tmp/loadtest-data/ca.key
          chmod 0600 /tmp/loadtest-data/ca.key

          kubectl -n "$NAMESPACE" run "$LOADTEST_POD" \
            --image=docker.io/library/alpine:3.21.3 \
            --restart=Never \
            --command -- sleep 900
          kubectl -n "$NAMESPACE" wait --for=condition=Ready "pod/$LOADTEST_POD" --timeout=120s
          kubectl -n "$NAMESPACE" exec "$LOADTEST_POD" -- mkdir -p /tmp/loadtest-data
          kubectl -n "$NAMESPACE" cp /tmp/loadtest "$LOADTEST_POD:/tmp/loadtest"
          kubectl -n "$NAMESPACE" cp /tmp/loadtest-data/. "$LOADTEST_POD:/tmp/loadtest-data"
          kubectl -n "$NAMESPACE" exec "$LOADTEST_POD" -- chmod 0755 /tmp/loadtest

      - name: Run QUIC load test in cluster
        run: |
          set -o pipefail
          AGENTS="${{ inputs.agents || '100' }}"
          kubectl -n "$NAMESPACE" exec "$LOADTEST_POD" -- \
            /tmp/loadtest \
              -agents="$AGENTS" \
              -addr="${SERVER_POD_IP}:9090" \
              -data-dir=/tmp/loadtest-data \
            | tee "$LOADTEST_QUIC_OUTPUT"

      - name: Cleanup QUIC load test pod
        if: always()
        run: |
          if [[ -n "${LOADTEST_POD:-}" ]]; then
            kubectl -n "$NAMESPACE" delete pod "$LOADTEST_POD" --ignore-not-found --wait=false
          fi
          rm -rf /tmp/loadtest /tmp/loadtest-data /tmp/k6 /tmp/k6-"${K6_VERSION}"-linux-amd64

      - name: Build canonical load-test summary
        if: always()
        run: |
          K6_SUMMARY_DIR="$LOADTEST_K6_SUMMARY_DIR" \
            QUIC_OUTPUT_FILE="$LOADTEST_QUIC_OUTPUT" \
            scripts/loadtest-summarize.sh > loadtest-summary.json

      - name: Upload canonical load-test summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: loadtest-summary
          path: loadtest-summary.json
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish load-test trend
    needs: [load-test]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: observability
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: OCI + kubeconfig setup
        uses: ./.github/actions/oci-kube-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          cluster-id: ${{ secrets.OKE_CLUSTER_ID }}

      - name: Download load-test summary
        uses: actions/download-artifact@v8
        with:
          name: loadtest-summary
          path: artifacts/loadtest

      - name: Check regression
        id: check
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          set +e
          ./scripts/loadtest-regression-check.sh artifacts/loadtest/loadtest-summary.json > loadtest-regression.out 2>&1
          CHECK_STATUS=$?
          set -e

          cat loadtest-regression.out

          case "$CHECK_STATUS" in
            0) REGRESSION=0 ;;
            1) REGRESSION=1 ;;
            2)
              echo "regression=0" >> "$GITHUB_OUTPUT"
              echo "::error::Load-test summary input missing or invalid."
              exit 2
              ;;
            *)
              echo "regression=0" >> "$GITHUB_OUTPUT"
              echo "::error::loadtest-regression-check.sh failed with unexpected exit ${CHECK_STATUS}"
              exit "$CHECK_STATUS"
              ;;
          esac

          ROWS="$(grep -E '^\[' loadtest-regression.out | tail -n 1 || true)"
          if [ -z "$ROWS" ]; then
            echo "::error::loadtest-regression-check.sh produced no canonical JSON row array"
            exit 2
          fi
          printf '%s\n' "$ROWS" > loadtest-rows.json

          echo "regression=$REGRESSION" >> "$GITHUB_OUTPUT"
          ALERT_TEXT="$(grep '^REGRESSION_ALERT:' loadtest-regression.out | sed 's/^REGRESSION_ALERT://' || true)"
          {
            echo "alert_text<<EOF"
            echo "$ALERT_TEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload canonical rows as artifact
        uses: actions/upload-artifact@v7
        with:
          name: loadtest-canonical-rows
          path: loadtest-rows.json
          retention-days: 90

      - name: Push to VictoriaMetrics
        run: ./scripts/loadtest-vm-push.sh loadtest-rows.json

      - name: Write GITHUB_STEP_SUMMARY
        run: |
          set -euo pipefail
          {
            echo "# Load-test trend run"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo "Regression: \`${{ steps.check.outputs.regression }}\`"
            echo ""
            echo "## Canonical rows"
            echo '```json'
            python3 -m json.tool < loadtest-rows.json || cat loadtest-rows.json
            echo '```'
            if grep -q '^P99_ADVISORY:' loadtest-regression.out; then
              echo ""
              echo "## p99 advisories"
              grep '^P99_ADVISORY:' loadtest-regression.out | sed 's/^P99_ADVISORY:/- /'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram alert on regression
        if: steps.check.outputs.regression == '1'
        env:
          BOT: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
          ALERT_TEXT: ${{ steps.check.outputs.alert_text }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${BOT:-}" ] || [ -z "${CHAT:-}" ]; then
            echo "::warning::Telegram secrets not set; skipping alert (regression still reported via workflow exit)."
            exit 0
          fi

          getme_http=$(curl -sS --max-time 10 \
            -o /tmp/telegram-getme.json \
            -w '%{http_code}' \
            "https://api.telegram.org/bot${BOT}/getMe" 2>/dev/null || echo "curl_error")
          if [ "$getme_http" != "200" ] || ! jq -e '.ok == true' /tmp/telegram-getme.json >/dev/null 2>&1; then
            echo "::error::Telegram getMe returned HTTP ${getme_http} — DEPLOY_TELEGRAM_BOT_TOKEN appears invalid or revoked."
            cat /tmp/telegram-getme.json 2>/dev/null || echo "(no body)"
            exit 0
          fi

          MSG="$(printf '%s\n\nRun: %s\nTrend: Grafana dashboard \"Load Test Trends\" (opengate-loadtest-trend)' \
            "$ALERT_TEXT" "$RUN_URL")"
          send_http=$(curl -sS --max-time 30 \
            -o /tmp/telegram-send.json \
            -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" 2>/dev/null || echo "curl_error")
          if [ "$send_http" != "200" ] || ! jq -e '.ok == true' /tmp/telegram-send.json >/dev/null 2>&1; then
            echo "::error::Telegram sendMessage returned HTTP ${send_http}."
            cat /tmp/telegram-send.json 2>/dev/null || echo "(no body)"
            exit 0
          fi
          echo "Telegram alert delivered"

      - name: Fail workflow red on regression
        if: always() && steps.check.outputs.regression == '1'
        run: |
          echo "Load-test regression detected (latency/rps/error_rate vs VM window or absolute ceilings) — see workflow summary and Telegram alert (if delivered) above."
          exit 1
