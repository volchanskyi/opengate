name: Mutation Testing

# Mutation testing as observability, not as a CI gate.
# Plan: .claude/plans/pr9-mutation-testing-as-observability.md
#
# Runs nightly. Does NOT block merges or deploys.
# On regression (drop >2pp from previous successful run OR absolute score <85%):
#   - Telegram alert via the existing DEPLOY_TELEGRAM_BOT_TOKEN / _CHAT_ID
#   - Workflow exits red (audit trail)
# All scores are pushed to Loki for the "Mutation Testing Trend" Grafana
# dashboard, which is the canonical trend store. The per-run canonical row is
# also uploaded as a workflow artifact for one-off audit access. The repo no
# longer stores docs/mutation-history.jsonl — the previous attempt to commit
# nightly snapshots to dev was rejected by branch protection (the bot push
# lacks the required status checks for new commits), and Loki + Grafana is the
# correct home for time-series telemetry.

on:
  schedule:
    - cron: '0 3 * * *'  # nightly 03:00 UTC (after load-test Sun 02:00)
  workflow_dispatch:

concurrency:
  group: mutation-testing
  cancel-in-progress: false

# Default to read-only at the workflow level. The publish job no longer
# commits anything to the repo (trend data lives in Loki + workflow artifacts);
# read-only is sufficient throughout.
permissions:
  contents: read

env:
  RUST_VERSION: stable
  GO_VERSION: '1.26'
  NODE_VERSION: '24'
  CARGO_MUTANTS_VERSION: 27.0.0  # pin for reproducible mutation runs (latest as of PR 9 land)

jobs:
  # -----------------------------------------------------------------------------
  # Per-language mutation runs in parallel. fail-fast: false so one language
  # failing does not cancel the others — we want partial visibility.
  # -----------------------------------------------------------------------------
  mutation:
    name: Mutation (${{ matrix.language }})
    strategy:
      fail-fast: false
      matrix:
        language: [rust, go, web]
    runs-on: ubuntu-latest
    # Rust historically dominates (~349 mutants × ~13s each on 2 cores).
    # 60min leaves headroom over the prior 35min ceiling that timed out on
    # the 2026-05-14 run. Go and web finish in ~25min and share the matrix.
    timeout-minutes: 60
    steps:
      # Only the Go matrix leg needs Postgres, but launch is cheap (~5s)
      # and uniform across legs simplifies the conditional. `-c
      # max_connections=400` is required so the parallel per-schema test
      # store pattern in testutil.NewTestStore stays within the conn budget.
      - name: Start Postgres with max_connections=400
        run: |
          docker run -d --rm --name pg-ci \
            -e POSTGRES_USER=opengate -e POSTGRES_PASSWORD=opengate -e POSTGRES_DB=opengate_test \
            -p 5432:5432 postgres:17-alpine -c max_connections=400
          for i in {1..30}; do
            if docker exec pg-ci pg_isready -U opengate -d opengate_test >/dev/null 2>&1; then
              echo "postgres ready after ${i} attempt(s)"; exit 0
            fi
            sleep 1
          done
          echo "::error::postgres never became ready"; docker logs pg-ci; exit 1
      - uses: actions/checkout@v6

      # -- Rust --------------------------------------------------------------
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: matrix.language == 'rust'
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        if: matrix.language == 'rust'
        with:
          workspaces: agent
          cache-on-failure: true
      - name: Install cargo-mutants
        if: matrix.language == 'rust'
        run: cargo install --locked --version "${CARGO_MUTANTS_VERSION}" cargo-mutants
      - name: Run cargo-mutants
        if: matrix.language == 'rust'
        env:
          OPENGATE_GOLDEN_DIR: ${{ github.workspace }}/testdata/golden
        # cargo-mutants writes outcomes.json to mutants.out/ automatically.
        # --jobs 4 matches the ubuntu-latest 4-vCPU public-runner spec
        # (https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners).
        # --no-shuffle for deterministic ordering when comparing runs.
        # --annotations none suppresses per-mutant GitHub Actions warning
        # annotations — surviving mutants are observability signal in the
        # JSONL trend / Loki dashboard, not actionable line-level warnings
        # that should clutter the Annotations panel on every nightly run.
        run: |
          cd agent
          cargo mutants --workspace --no-shuffle --jobs 4 --annotations none || EXIT=$?
          # cargo-mutants exits non-zero when any mutant survives. For an
          # observability workflow that is expected; capture and continue.
          echo "cargo-mutants exit: ${EXIT:-0}"

      # -- Go ----------------------------------------------------------------
      - uses: actions/setup-go@v6
        if: matrix.language == 'go'
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum
      - name: Install gremlins
        if: matrix.language == 'go'
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@latest
      - name: Run gremlins
        if: matrix.language == 'go'
        env:
          POSTGRES_TEST_URL: postgres://opengate:opengate@localhost:5432/opengate_test?sslmode=disable
        run: |
          cd server
          gremlins unleash --output mutation-report.json . || EXIT=$?
          echo "gremlins exit: ${EXIT:-0}"

      # -- Web ---------------------------------------------------------------
      - uses: actions/setup-node@v6
        if: matrix.language == 'web'
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        if: matrix.language == 'web'
        run: cd web && npm ci
      - name: Run stryker
        if: matrix.language == 'web'
        env:
          # Stryker re-runs the full vitest suite once per mutant via a
          # persistent test-runner pool. Vitest's `github-actions` reporter
          # auto-loads when GITHUB_ACTIONS=true and appends a "Vitest Test
          # Report" section to GITHUB_STEP_SUMMARY on every run — leading to
          # thousands of duplicated sections in the job summary. The canonical
          # fix lives in `web/vitest.config.ts`: when STRYKER_MUTATOR_WORKER is
          # present in process.env, vitest is configured with explicit
          # `reporters: ['default']`, which short-circuits the auto-load branch
          # in vitest's reporter resolver (`if (!resolved.reporters.length) {
          # … GITHUB_ACTIONS check … }`).
          #
          # The /dev/null sink below remains as a belt-and-suspenders backstop
          # in case a future vitest version reaches GITHUB_STEP_SUMMARY via a
          # different code path. Stryker's own GHA detection (CIProvider) reads
          # GITHUB_REPOSITORY / GITHUB_REF which remain set, so its output is
          # unaffected.
          GITHUB_STEP_SUMMARY: /dev/null
        run: |
          cd web
          # Stryker exits 0 even with surviving mutants when thresholds.break
          # is null (it is). JSON reporter writes to reports/mutation/mutation.json.
          ./node_modules/.bin/stryker run

      # -- Upload artifacts (HTML reports + JSON outputs, 90d retention) ----
      - name: Upload mutation artifacts (${{ matrix.language }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-${{ matrix.language }}
          retention-days: 90
          if-no-files-found: warn
          path: |
            agent/mutants.out/
            server/mutation-report.json
            web/reports/mutation/

  # -----------------------------------------------------------------------------
  # Publish: aggregate all three matrix outputs, push to Loki, run regression
  # check, alert via Telegram, fail red on regression. The canonical row is
  # also uploaded as a workflow artifact for one-off audits.
  # -----------------------------------------------------------------------------
  publish:
    name: Publish results + alert on regression
    needs: mutation
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The `observability` environment scopes the Telegram alert secrets
    # (DEPLOY_TELEGRAM_BOT_TOKEN / DEPLOY_TELEGRAM_CHAT_ID) to unattended
    # alerting workflows only. It is configured with no required_reviewers
    # and no wait timer (else the nightly cron would block "Waiting on
    # review"), and a deployment-branch policy that permits only `main`
    # (the default branch where scheduled crons trigger) and `dev` (where
    # workflow_dispatch normally runs). The `production` environment used
    # by cd.yml is intentionally separate — deploys keep their gated env;
    # observability runs do not.
    environment: observability
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          # Shallow checkout; no commit-history needs remain after dropping the
          # in-repo JSONL trend file.
          fetch-depth: 1

      - name: Download all matrix artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: mutation-*
          merge-multiple: false

      - name: Place artifacts at canonical input paths
        run: |
          set -euo pipefail
          # The artifact directory layout is artifacts/mutation-<lang>/...
          # Move each into the path the summarize script expects.
          if [ -d "artifacts/mutation-rust/agent/mutants.out" ]; then
            mkdir -p agent
            mv artifacts/mutation-rust/agent/mutants.out agent/mutants.out
          fi
          if [ -f "artifacts/mutation-go/server/mutation-report.json" ]; then
            mkdir -p server
            mv artifacts/mutation-go/server/mutation-report.json server/mutation-report.json
          fi
          if [ -d "artifacts/mutation-web/web/reports" ]; then
            mkdir -p web/reports
            mv artifacts/mutation-web/web/reports/mutation web/reports/mutation
          fi
          echo "--- placed artifacts ---"
          ls -la agent/mutants.out/ server/ web/reports/mutation/ 2>&1 || true

      - name: Summarize + regression check (canonical row to stdout)
        id: summarize
        env:
          GITHUB_SHA: ${{ github.sha }}
        # Run the summarize script (APPEND unset → no on-disk history file
        # written; trend data lives in Loki). Capture the canonical row and
        # any REGRESSION_ALERT lines for downstream steps. Script exits 1 on
        # regression — we capture that but do NOT fail this step yet (the
        # alert step needs to run). The final step re-applies the exit code
        # so the workflow goes red.
        run: |
          set -euo pipefail
          OUTPUT="$(./scripts/mutation-summarize.sh 2>&1)" && REGRESSION=0 || REGRESSION=1
          echo "$OUTPUT"
          echo "--- end ---"
          echo "regression=$REGRESSION" >> "$GITHUB_OUTPUT"
          # Extract the canonical row (last JSON line that begins with `{`)
          CANONICAL_ROW="$(echo "$OUTPUT" | grep -E '^\{' | tail -n 1)"
          echo "$CANONICAL_ROW" > canonical-row.json
          # Extract Telegram-friendly text from REGRESSION_ALERT: lines
          ALERT_TEXT="$(echo "$OUTPUT" | grep '^REGRESSION_ALERT:' | sed 's/^REGRESSION_ALERT://' || true)"
          {
            echo "alert_text<<EOF"
            echo "$ALERT_TEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload canonical row as artifact
        uses: actions/upload-artifact@v7
        with:
          name: mutation-canonical-row
          path: canonical-row.json
          retention-days: 90

      - name: OCI + SSH setup
        id: infra
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/oci-ssh-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          run-id: ${{ github.run_id }}

      - name: Push to Loki
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: ./scripts/mutation-loki-push.sh canonical-row.json

      - name: OCI + SSH teardown
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/oci-ssh-teardown
        with:
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          rule-id: ${{ steps.infra.outputs.rule-id }}

      - name: Write GITHUB_STEP_SUMMARY
        run: |
          {
            echo "# Mutation testing run"
            echo ""
            echo "Commit: \`${{ github.sha }}\`"
            echo ""
            echo "## Canonical row"
            echo '```json'
            python3 -m json.tool < canonical-row.json || cat canonical-row.json
            echo '```'
            echo ""
            echo "## Per-language scores"
            echo "| Lang | Killed | Survived | NoCov | Score |"
            echo "|---|---|---|---|---|"
            for L in rust go web; do
              jq -r --arg l "$L" '
                .scores[$l] as $r
                | "| \($l) | \($r.killed) | \($r.survived) | \($r.no_coverage // "—") | \($r.score_pct)% |"
              ' canonical-row.json
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Telegram alert on regression
        # Never fails the step. Telegram is a notification channel, not a
        # gate — if it's broken we still want `Fail workflow on regression`
        # below to run and mark the workflow red for the actual reason. Curl
        # exit codes are captured + annotated, not propagated.
        if: steps.summarize.outputs.regression == '1'
        env:
          BOT: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
          ALERT_TEXT: ${{ steps.summarize.outputs.alert_text }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${BOT:-}" ] || [ -z "${CHAT:-}" ]; then
            echo "::warning::Telegram secrets not set; skipping alert (regression still reported via workflow exit)."
            exit 0
          fi

          # Pre-flight: validate the bot token via getMe. A 404 here means the
          # token doesn't match any bot (revoked / wrong value pasted). This
          # surfaces the diagnosis as a clear "DEPLOY_TELEGRAM_BOT_TOKEN is
          # invalid" warning instead of letting sendMessage curl-22 with the
          # opaque "404" — see Run 26004707054 for the failure mode this
          # guards against.
          getme_http=$(curl -sS --max-time 10 \
            -o /tmp/telegram-getme.json \
            -w '%{http_code}' \
            "https://api.telegram.org/bot${BOT}/getMe" 2>/dev/null || echo "curl_error")
          if [ "$getme_http" != "200" ] || ! jq -e '.ok == true' /tmp/telegram-getme.json >/dev/null 2>&1; then
            echo "::error::Telegram getMe returned HTTP ${getme_http} — DEPLOY_TELEGRAM_BOT_TOKEN appears invalid or revoked. Fix: in @BotFather → /mybots → select bot → API Token → copy → update GitHub secret. Validate with: curl -s \"https://api.telegram.org/bot\$TOKEN/getMe\""
            # Echo the API response body so the operator sees Telegram's own
            # error message (description field), not just curl's exit code.
            # The body cannot contain credentials — getMe takes nothing in
            # the body and returns only public bot metadata.
            echo "Telegram API response body:"
            cat /tmp/telegram-getme.json 2>/dev/null || echo "(no body)"
            exit 0
          fi
          bot_username="$(jq -r '.result.username // "unknown"' /tmp/telegram-getme.json)"
          echo "Bot token verified via getMe (bot: @${bot_username}) ✓"

          MSG="$(printf '%s\n\nRun: %s\nTrend: Grafana dashboard "Mutation Testing Trend" (opengate-mutation-trend)' \
            "$ALERT_TEXT" "$RUN_URL")"
          send_http=$(curl -sS --max-time 30 \
            -o /tmp/telegram-send.json \
            -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true" 2>/dev/null || echo "curl_error")
          if [ "$send_http" != "200" ] || ! jq -e '.ok == true' /tmp/telegram-send.json >/dev/null 2>&1; then
            echo "::error::Telegram sendMessage returned HTTP ${send_http}. The most common cause when getMe succeeds but sendMessage fails is DEPLOY_TELEGRAM_CHAT_ID — verify the chat ID belongs to a chat the bot has been added to (or has previously messaged)."
            echo "Telegram API response body:"
            cat /tmp/telegram-send.json 2>/dev/null || echo "(no body)"
            exit 0
          fi
          echo "Telegram alert delivered ✓"

      - name: Fail workflow red on regression
        if: always() && steps.summarize.outputs.regression == '1'
        # `always()` so a Telegram outage above doesn't suppress the actual
        # workflow failure signal — the regression is the reason this run is
        # red, not the notification channel.
        run: |
          echo "Regression detected — see workflow summary and Telegram alert (if delivered) above."
          exit 1
