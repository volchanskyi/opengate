name: Release Agent

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g., v0.1.0)"
        required: true
        type: string

jobs:
  check-agent-changed:
    name: Check agent/ changed since previous tag
    runs-on: ubuntu-latest
    outputs:
      agent_changed: ${{ steps.gate.outputs.agent_changed }}
      prev_tag: ${{ steps.gate.outputs.prev_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
          fetch-tags: true
      # Path-gates the matrix build. When the diff against the previous v*
      # tag contains no agent/** entries, build + release are skipped — the
      # tag still exists as a git ref for build-image.yml + CHANGELOG, but
      # no GitHub Release is published (so /releases/latest keeps pointing
      # at the most recent binaries-bearing release). See
      # .claude/plans/path-gate-agent-release.md and ADR-005.
      - name: Gate on agent/ diff
        id: gate
        run: ./scripts/release-agent-gate.sh "${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    needs: check-agent-changed
    if: needs.check-agent-changed.outputs.agent_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact: mesh-agent-linux-amd64
          - target: aarch64-unknown-linux-musl
            artifact: mesh-agent-linux-arm64
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross tools
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: agent
          key: ${{ matrix.target }}

      - name: Determine version
        id: version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Agent version: $VERSION"

      - name: Build release binary (native)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        env:
          OPENGATE_VERSION: ${{ steps.version.outputs.version }}
        run: cargo build --release --target ${{ matrix.target }} -p mesh-agent

      - name: Build release binary (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        env:
          OPENGATE_VERSION: ${{ steps.version.outputs.version }}
        run: cross build --release --target ${{ matrix.target }} -p mesh-agent

      - name: Prepare artifact
        run: |
          cp target/${{ matrix.target }}/release/mesh-agent ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            agent/${{ matrix.artifact }}
            agent/${{ matrix.artifact }}.sha256
          retention-days: 20

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    # Scoped here (vs workflow-level) so the gate + build jobs run with the
    # default read-only token. Only this job publishes to GitHub Releases.
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/mesh-agent-*
