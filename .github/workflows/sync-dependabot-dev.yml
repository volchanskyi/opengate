name: Sync dependabot-dev with dev

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Merge dev → dependabot-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: dependabot-dev
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Merge dev into dependabot-dev
        run: |
          git fetch origin dev
          # Skip if dependabot-dev already contains all dev commits
          if git merge-base --is-ancestor origin/dev HEAD; then
            echo "dependabot-dev is already up to date with dev"
            exit 0
          fi
          git merge --no-ff origin/dev -m "ci: sync dependabot-dev with dev"
          git push origin dependabot-dev
