name: terraform-drift

# Nightly drift detection — catches out-of-band changes to OCI resources
# (operator clicks in the console, cd.yml runtime NSG mutations, manual
# security-list edits) by running `terraform plan -refresh-only -detailed-exitcode`
# against the remote backend.
#
# Plan: .claude/plans/terraform-test-and-remote-state.md (PR T4)
# Same pattern as .github/workflows/mutation.yml — observability, not auto-remediation.
#
# Authentication: a separate read-only IAM user `tf-drift-reader` (inspect-only
# on the compartment + read-only on the tfstate bucket). The new OCI_DRIFT_*
# secrets gate this — distinct from the CD deploy user.

on:
  schedule:
    - cron: '0 3 * * *'  # nightly 03:00 UTC (same slot as mutation.yml; both are observability)
  workflow_dispatch: {}

concurrency:
  group: terraform-drift
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.9.x

jobs:
  drift:
    name: Refresh-only plan + alert
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Write OCI provider API key
        env:
          OCI_DRIFT_PRIVATE_KEY: ${{ secrets.OCI_DRIFT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_DRIFT_PRIVATE_KEY" > ~/.oci/drift.pem
          chmod 600 ~/.oci/drift.pem

      - name: Write backend config
        env:
          OCI_TFSTATE_NAMESPACE: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          # The S3 bucket lives in the same region as the rest of the infra;
          # the endpoint is reconstructed from the OCI namespace + region.
          # Credentials env vars (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
          # are passed at init/plan time below.
          cat > /tmp/backend.tfbackend <<EOF
          endpoints = {
            s3 = "https://${OCI_TFSTATE_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          }
          EOF

      - name: Verify OCI endpoint reachability + S3 credential shape
        env:
          OCI_TFSTATE_NAMESPACE: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          TFSTATE_S3_ACCESS_KEY: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          TFSTATE_S3_SECRET_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
        # Two-stage bisect so an `init` failure points at the real cause
        # instead of the opaque "dial tcp: lookup ***" / "SignatureDoesNotMatch"
        # the AWS SDK emits. All four inputs are secrets — we never echo
        # values, only lengths and resolve booleans, and we add the
        # constructed hostnames to GHA's mask list.
        #
        # Stage 1 — DNS bisect for the S3-compat endpoint:
        #   - both DNS fail            → wrong OCI_REGION or OCI outage
        #   - region OK, namespace not → OCI_TFSTATE_NAMESPACE stale
        # Stage 2 — S3 credential shape:
        #   - either secret empty      → secret never set
        #   - either secret too short  → secret truncated on paste, or only
        #                                one half of the pair was updated
        #                                after rotation in OCI Console
        # Neither stage proves the credentials are correct — only that they
        # are present and shaped plausibly. A 403 SignatureDoesNotMatch
        # downstream after a clean bisect still means "OCI Customer Secret
        # Key needs rotation + both halves re-pasted to GitHub secrets."
        run: |
          set -e
          if [ -z "$OCI_TFSTATE_NAMESPACE" ]; then
            echo "::error::OCI_TFSTATE_NAMESPACE secret is empty — backend URL will not resolve"
            exit 1
          fi
          if [ -z "$OCI_REGION" ]; then
            echo "::error::OCI_REGION secret is empty — backend URL will not resolve"
            exit 1
          fi

          # OCI region codes are short (e.g. "us-ashburn-1", "eu-frankfurt-1");
          # the length is not sensitive and surfaces typos / truncation in
          # secret values without exposing the value itself.
          echo "OCI_TFSTATE_NAMESPACE length: ${#OCI_TFSTATE_NAMESPACE}"
          echo "OCI_REGION length: ${#OCI_REGION}"

          NS_HOST="${OCI_TFSTATE_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          REGION_HOST="objectstorage.${OCI_REGION}.oraclecloud.com"
          echo "::add-mask::${NS_HOST}"
          echo "::add-mask::${REGION_HOST}"

          NS_OK=0
          REGION_OK=0
          if getent hosts "${NS_HOST}" >/dev/null 2>&1; then NS_OK=1; fi
          if getent hosts "${REGION_HOST}" >/dev/null 2>&1; then REGION_OK=1; fi
          echo "namespace-scoped endpoint resolves: ${NS_OK}"
          echo "region-only endpoint resolves: ${REGION_OK}"

          if [ "${NS_OK}" = "0" ] && [ "${REGION_OK}" = "0" ]; then
            echo "::warning::Both OCI endpoints fail DNS — likely wrong OCI_REGION secret or OCI region outage. terraform init will retry."
          elif [ "${NS_OK}" = "0" ] && [ "${REGION_OK}" = "1" ]; then
            echo "::warning::Region resolves but namespace-scoped endpoint does not — likely wrong OCI_TFSTATE_NAMESPACE secret. Verify the tenancy's object-storage namespace matches the secret."
          fi

          # --- S3 credential-shape bisect -------------------------------------
          # OCI Customer Secret Key access keys are 32 hex-like characters;
          # the secret-key half is base64-shaped (28 chars, trailing '='). The
          # AWS SDK emits SignatureDoesNotMatch with the OCI-specific hint
          # "The secret key required to complete authentication could not be
          # found" when either:
          #   (a) the access-key/secret-key pair was rotated in OCI Console
          #       but only one half was re-pasted to GitHub secrets, or
          #   (b) a paste added trailing whitespace / newline, or
          #   (c) the keys were issued for a different IAM user than the
          #       workflow expects.
          # We can't detect (c) without an API call, but we can flag (a) and (b)
          # by length-checking each secret and warning when either is
          # missing or implausibly short.
          AK_LEN=${#TFSTATE_S3_ACCESS_KEY}
          SK_LEN=${#TFSTATE_S3_SECRET_KEY}
          echo "TFSTATE_S3_ACCESS_KEY length: ${AK_LEN}"
          echo "TFSTATE_S3_SECRET_KEY length: ${SK_LEN}"
          STALE=0
          if [ -z "$TFSTATE_S3_ACCESS_KEY" ]; then
            echo "::warning::TFSTATE_S3_ACCESS_KEY is empty — terraform init will 403 with SignatureDoesNotMatch."
            STALE=1
          elif [ "$AK_LEN" -lt 20 ]; then
            echo "::warning::TFSTATE_S3_ACCESS_KEY length (${AK_LEN}) looks short — OCI Customer Secret Key access keys are ~32 chars. Secret may be truncated."
            STALE=1
          fi
          if [ -z "$TFSTATE_S3_SECRET_KEY" ]; then
            echo "::warning::TFSTATE_S3_SECRET_KEY is empty — terraform init will 403 with SignatureDoesNotMatch."
            STALE=1
          elif [ "$SK_LEN" -lt 24 ]; then
            echo "::warning::TFSTATE_S3_SECRET_KEY length (${SK_LEN}) looks short — OCI secret keys are typically ~28 chars (base64-like, trailing '='). Secret may be truncated."
            STALE=1
          fi
          if [ "$STALE" = "1" ]; then
            echo "::warning::S3 credentials look stale or truncated. Rotate the Customer Secret Key in OCI Console for the workflow's IAM user, then re-paste BOTH halves into TFSTATE_S3_ACCESS_KEY and TFSTATE_S3_SECRET_KEY in repo secrets (no surrounding whitespace, no trailing newline)."
          else
            echo "S3 credentials shape OK (lengths plausible). A downstream 403 SignatureDoesNotMatch still implies a key-pair mismatch — rotate both halves together."
          fi

      - name: Terraform init (S3 backend, with retry)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          # AWS SDK v2 defaults to a flexible-checksum chunked upload that OCI's
          # S3-compat rejects with `501 NotImplemented: AWS chunked encoding not
          # supported`. Forcing `when_required` skips it. Required on every
          # terraform invocation against this backend.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        # The S3-compat endpoint hostname `<ns>.compat.objectstorage.<region>.oraclecloud.com`
        # has occasionally failed DNS resolution on GHA runners (observed:
        # `dial tcp: lookup …: no such host`, 2026-05-15 06:37). Retry with
        # exponential backoff before failing the gate.
        run: |
          set -e
          for attempt in 1 2 3; do
            if terraform -chdir=deploy/terraform init -backend-config=/tmp/backend.tfbackend -input=false; then
              exit 0
            fi
            echo "::warning::terraform init attempt $attempt/3 failed; retrying in $((attempt * 15))s"
            sleep $((attempt * 15))
          done
          echo "::error::terraform init failed after 3 attempts"
          exit 1

      - name: Terraform plan (refresh-only, detailed exit)
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_DRIFT_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_DRIFT_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/drift.pem
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          # refresh-only does not compare config to state, but variables still
          # have to satisfy their validation blocks. Any non-`0.0.0.0/0` CIDR
          # satisfies the ssh_allowed_cidr validation.
          TF_VAR_ssh_allowed_cidr: 203.0.113.0/24
          TF_VAR_ssh_public_key_path: /dev/null
        run: |
          set +e
          terraform -chdir=deploy/terraform plan \
            -refresh-only -detailed-exitcode \
            -out=drift.tfplan 2>&1 | tee drift.txt
          ec=${PIPESTATUS[0]}
          echo "exitcode=$ec" >> "$GITHUB_OUTPUT"
          # 0 = no drift, 2 = drift, anything else = real error
          if [ "$ec" != "0" ] && [ "$ec" != "2" ]; then exit "$ec"; fi

      - name: Drift summary JSON
        if: steps.plan.outputs.exitcode == '2'
        run: |
          terraform -chdir=deploy/terraform show -json drift.tfplan > drift.json
          ./scripts/terraform-drift-summarize.sh drift.json > drift-summary.json
          cat drift-summary.json

      - name: Upload drift artifacts
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v7
        with:
          name: terraform-drift
          path: |
            drift.txt
            drift.json
            drift-summary.json
          retention-days: 30

      - name: Telegram alert
        if: steps.plan.outputs.exitcode == '2'
        env:
          BOT: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
          RUN: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${BOT:-}" ] || [ -z "${CHAT:-}" ]; then
            echo "telegram secrets not set; skipping alert"
            exit 0
          fi
          # Plan output can exceed Telegram's 4 KB limit. Truncate to 3500 chars;
          # full output remains in the workflow artifacts (above).
          MSG="$(head -c 3500 drift.txt)"
          TEXT="$(printf '⚠️ Terraform drift detected on dev (run %s):\n\n%s\n\nRun: %s' \
            "$RUN" "$MSG" "$RUN_URL")"
          curl -sS --fail --max-time 30 \
            -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "disable_web_page_preview=true"

      # SSH / Loki push uses the existing CD-user firewall opener composite —
      # the tf-drift-reader user is read-only and cannot mutate the NSG.
      - name: OCI + SSH setup
        if: steps.plan.outputs.exitcode == '2'
        id: infra
        uses: ./.github/actions/oci-ssh-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          run-id: ${{ github.run_id }}

      - name: Loki push
        if: steps.plan.outputs.exitcode == '2'
        run: ./scripts/terraform-drift-loki-push.sh drift-summary.json

      - name: OCI + SSH teardown
        if: always() && steps.plan.outputs.exitcode == '2'
        uses: ./.github/actions/oci-ssh-teardown
        with:
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          rule-id: ${{ steps.infra.outputs.rule-id }}

      - name: Fail workflow on drift (audit trail)
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo "Drift detected — see Telegram alert and uploaded artifacts."
          exit 1
