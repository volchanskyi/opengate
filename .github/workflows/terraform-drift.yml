name: terraform-drift

# Nightly drift detection — catches out-of-band changes to OCI resources
# (operator clicks in the console, cd.yml runtime NSG mutations, manual
# security-list edits) by running `terraform plan -refresh-only -detailed-exitcode`
# against the remote backend.
#
# Plan: .claude/plans/terraform-test-and-remote-state.md (PR T4)
# Same pattern as .github/workflows/mutation.yml — observability, not auto-remediation.
#
# Authentication: a separate read-only IAM user `tf-drift-reader` (inspect-only
# on the compartment + read-only on the tfstate bucket). The new OCI_DRIFT_*
# secrets gate this — distinct from the CD deploy user.

on:
  schedule:
    - cron: '0 3 * * *'  # nightly 03:00 UTC (same slot as mutation.yml; both are observability)
  workflow_dispatch: {}

concurrency:
  group: terraform-drift
  cancel-in-progress: false

permissions:
  contents: read

env:
  TERRAFORM_VERSION: 1.9.x

jobs:
  drift:
    name: Refresh-only plan + alert
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # See mutation.yml for the rationale on the `observability` environment.
    # This job needs DEPLOY_TELEGRAM_BOT_TOKEN / DEPLOY_TELEGRAM_CHAT_ID to
    # fire the drift alert and must run unattended on the nightly cron;
    # `observability` provides the secrets without the required_reviewers
    # gate that `staging` / `production` have.
    environment: observability
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Write OCI provider API key
        env:
          OCI_DRIFT_PRIVATE_KEY: ${{ secrets.OCI_DRIFT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_DRIFT_PRIVATE_KEY" > ~/.oci/drift.pem
          chmod 600 ~/.oci/drift.pem

      - name: Write backend config
        env:
          OCI_TFSTATE_NAMESPACE: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
        run: |
          # The S3 bucket lives in the same region as the rest of the infra;
          # the endpoint is reconstructed from the OCI namespace + region.
          # Credentials env vars (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY)
          # are passed at init/plan time below.
          cat > /tmp/backend.tfbackend <<EOF
          endpoints = {
            s3 = "https://${OCI_TFSTATE_NAMESPACE}.compat.objectstorage.${OCI_REGION}.oraclecloud.com"
          }
          EOF

      - name: Verify OCI endpoint reachability + credential shape
        uses: ./.github/actions/verify-oci-tfstate-creds
        with:
          oci-tfstate-namespace: ${{ secrets.OCI_TFSTATE_NAMESPACE }}
          oci-region: ${{ secrets.OCI_REGION }}
          tfstate-s3-access-key: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          tfstate-s3-secret-key: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          oci-tenancy-ocid: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user-ocid: ${{ secrets.OCI_DRIFT_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_DRIFT_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_DRIFT_PRIVATE_KEY }}

      - name: Terraform init (S3 backend, with retry)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          # AWS SDK v2 defaults to a flexible-checksum chunked upload that OCI's
          # S3-compat rejects with `501 NotImplemented: AWS chunked encoding not
          # supported`. Forcing `when_required` skips it. Required on every
          # terraform invocation against this backend.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
        # init reaches two flaky externals: the S3-compat backend endpoint
        # `<ns>.compat.objectstorage.<region>.oraclecloud.com` (occasional GHA DNS
        # miss — `dial tcp: lookup …: no such host`, 2026-05-15) and the Terraform
        # provider registry, which redirects to github.com for the oracle/oci
        # provider and can return `504 Gateway Timeout` during a GitHub blip
        # (2026-06-08 — outlasted the old 3-attempt/~90s window and false-failed
        # the nightly). Widen to 5 attempts with longer backoff (~5 min total) so a
        # transient registry/DNS outage rides through instead of red-flagging drift.
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if terraform -chdir=deploy/terraform init -backend-config=/tmp/backend.tfbackend -input=false; then
              exit 0
            fi
            echo "::warning::terraform init attempt $attempt/5 failed; retrying in $((attempt * 20))s"
            sleep $((attempt * 20))
          done
          echo "::error::terraform init failed after 5 attempts"
          exit 1

      - name: Terraform plan (refresh-only, detailed exit)
        id: plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid: ${{ secrets.OCI_DRIFT_USER_OCID }}
          TF_VAR_fingerprint: ${{ secrets.OCI_DRIFT_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/drift.pem
          TF_VAR_region: ${{ secrets.OCI_REGION }}
          # refresh-only does not compare config to state, but variables still
          # have to satisfy their validation blocks. Any non-`0.0.0.0/0` CIDR
          # satisfies the ssh_allowed_cidr validation.
          TF_VAR_ssh_allowed_cidr: 203.0.113.0/24
          TF_VAR_ssh_public_key_path: /dev/null
        run: |
          set +e
          terraform -chdir=deploy/terraform plan \
            -refresh-only -detailed-exitcode \
            -out=drift.tfplan 2>&1 | tee drift.txt
          ec=${PIPESTATUS[0]}
          echo "exitcode=$ec" >> "$GITHUB_OUTPUT"
          # 0 = no drift, 2 = drift, anything else = real error
          if [ "$ec" != "0" ] && [ "$ec" != "2" ]; then exit "$ec"; fi

      - name: Drift summary JSON
        if: steps.plan.outputs.exitcode == '2'
        run: |
          terraform -chdir=deploy/terraform show -json drift.tfplan > drift.json
          ./scripts/terraform-drift-summarize.sh drift.json > drift-summary.json
          cat drift-summary.json

      - name: Upload drift artifacts
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/upload-artifact@v7
        with:
          name: terraform-drift
          path: |
            drift.txt
            drift.json
            drift-summary.json
          retention-days: 30

      - name: Telegram alert
        # Never fails the step — same rationale as mutation.yml's Telegram
        # step. Drift is the workflow-level failure signal (see "Fail
        # workflow on drift" below); the Telegram channel is observability.
        if: steps.plan.outputs.exitcode == '2'
        env:
          BOT: ${{ secrets.DEPLOY_TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.DEPLOY_TELEGRAM_CHAT_ID }}
          RUN: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -uo pipefail
          if [ -z "${BOT:-}" ] || [ -z "${CHAT:-}" ]; then
            echo "::warning::Telegram secrets not set; skipping alert (drift still reported via workflow exit)."
            exit 0
          fi
          # Pre-flight: validate the bot token. 404 from getMe means the
          # token doesn't match any bot (revoked / wrong value pasted).
          getme_http=$(curl -sS --max-time 10 \
            -o /tmp/telegram-getme.json \
            -w '%{http_code}' \
            "https://api.telegram.org/bot${BOT}/getMe" 2>/dev/null || echo "curl_error")
          if [ "$getme_http" != "200" ] || ! jq -e '.ok == true' /tmp/telegram-getme.json >/dev/null 2>&1; then
            echo "::error::Telegram getMe returned HTTP ${getme_http} — DEPLOY_TELEGRAM_BOT_TOKEN appears invalid or revoked."
            echo "Telegram API response body:"
            cat /tmp/telegram-getme.json 2>/dev/null || echo "(no body)"
            exit 0
          fi
          bot_username="$(jq -r '.result.username // "unknown"' /tmp/telegram-getme.json)"
          echo "Bot token verified via getMe (bot: @${bot_username}) ✓"

          # Plan output can exceed Telegram's 4 KB limit. Truncate to 3500 chars;
          # full output remains in the workflow artifacts (above).
          MSG="$(head -c 3500 drift.txt)"
          TEXT="$(printf '⚠️ Terraform drift detected on dev (run %s):\n\n%s\n\nRun: %s' \
            "$RUN" "$MSG" "$RUN_URL")"
          send_http=$(curl -sS --max-time 30 \
            -o /tmp/telegram-send.json \
            -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${BOT}/sendMessage" \
            --data-urlencode "chat_id=${CHAT}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "disable_web_page_preview=true" 2>/dev/null || echo "curl_error")
          if [ "$send_http" != "200" ] || ! jq -e '.ok == true' /tmp/telegram-send.json >/dev/null 2>&1; then
            echo "::error::Telegram sendMessage returned HTTP ${send_http}. Common cause when getMe succeeds but sendMessage fails: DEPLOY_TELEGRAM_CHAT_ID points at a chat the bot isn't a member of."
            echo "Telegram API response body:"
            cat /tmp/telegram-send.json 2>/dev/null || echo "(no body)"
            exit 0
          fi
          echo "Telegram alert delivered ✓"

      # SSH / Loki push uses the existing CD-user firewall opener composite —
      # the tf-drift-reader user is read-only and cannot mutate the NSG.
      - name: OCI + SSH setup
        if: steps.plan.outputs.exitcode == '2'
        id: infra
        uses: ./.github/actions/oci-ssh-setup
        with:
          oci-tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.OCI_REGION }}
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          deploy-host: ${{ secrets.DEPLOY_HOST }}
          run-id: ${{ github.run_id }}

      - name: Loki push
        if: steps.plan.outputs.exitcode == '2'
        run: ./scripts/terraform-drift-loki-push.sh drift-summary.json

      - name: OCI + SSH teardown
        if: always() && steps.plan.outputs.exitcode == '2'
        uses: ./.github/actions/oci-ssh-teardown
        with:
          nsg-id: ${{ secrets.OCI_CD_NSG_ID }}
          rule-id: ${{ steps.infra.outputs.rule-id }}

      - name: Fail workflow on drift (audit trail)
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo "Drift detected — see Telegram alert and uploaded artifacts."
          exit 1
