# cargo-mutants configuration for the agent workspace.
#
# Run `make mutate-rust` from the repo root, or `cargo mutants --workspace`
# from `agent/` with the env var `OPENGATE_GOLDEN_DIR=<repo>/testdata/golden`
# set so golden file tests resolve their fixtures inside the temp tree.
#
# exclude_globs carves out genuinely-untestable code:
#   * platform shims (Wayland/X11/Windows/macOS bridges with no in-tree harness)
#   * the agent binary entry point (`mesh-agent/src/main.rs`) — async wiring
#     and process lifecycle exercised only by E2E
#   * SELinux restorecon match guards in `update.rs` — depend on a privileged
#     subprocess (system integration, not unit-testable)
#   * WebRTC peer connection (`mesh-agent-core/src/webrtc.rs`) — RTCPeerConnection
#     / ICE agent / data-channel callback wiring; webrtc-rs only exercises this
#     against a live STUN/network stack. This is the Rust analog of the
#     web-side `webrtc-transport.ts`, `use-remote-desktop.ts`, and
#     `connection-store.ts` carve-outs (see `web/stryker.config.json`).

#   * WebRTC handler (`mesh-agent-core/src/session/handlers/webrtc.rs`) owns the
#     SwitchToWebRTC offer/answer + IceCandidate forwarding logic. It is the same
#     live-STUN/network-stack class as `webrtc.rs` above: `handle_offer` needs a
#     valid SDP offer + ICE gathering, and `handle_candidate`'s peer-present path
#     needs a remote description set (only `handle_offer` does that). The
#     no-peer branches are unit-tested (webrtc_handler_test.rs) for regression;
#     mutation tracking is excluded for the same reason webrtc.rs is.

exclude_globs = [
    "crates/platform-linux/**",
    "crates/platform-windows/**",
    "crates/mesh-agent/src/main.rs",
    "crates/mesh-agent-core/src/webrtc.rs",
    "crates/mesh-agent-core/src/session/handlers/webrtc.rs",
]

# Skip `restore_selinux_context` — the only mutants here are guards on
# `restorecon` exit status / error kinds, which require a real privileged
# subprocess to test. Verified manually on Fedora during the migration.
exclude_re = [
    "restore_selinux_context",
]
