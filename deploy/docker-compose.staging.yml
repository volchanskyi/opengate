# Requires Docker Compose v2.24+ for !override tag support.
# Persistent staging overrides — coexists with production on the same VPS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#
# NOTE: ports use !override to REPLACE base ports, not merge with them.
# Without this, staging would also bind production ports (4433, 9090, 80, 443)
# and block the production deployment.

services:
  postgres:
    container_name: opengate-postgres-staging
    environment:
      - POSTGRES_PASSWORD=${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD is required}
    volumes:
      - postgres-staging-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  postgres-backup:
    container_name: opengate-postgres-backup-staging
    environment:
      - POSTGRES_PASSWORD=${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD is required}
    volumes:
      - postgres-staging-backups:/backups

  server:
    container_name: opengate-server-staging
    environment:
      - JWT_SECRET=${STAGING_JWT_SECRET:?STAGING_JWT_SECRET is required}
      - DATABASE_URL=postgres://opengate:${STAGING_POSTGRES_PASSWORD}@postgres:5432/opengate?sslmode=disable
    ports: !override
      - "19090:9090/udp"
      - "14433:4433"

  web-init:
    container_name: opengate-web-init-staging

  caddy:
    container_name: opengate-caddy-staging
    ports: !override
      - "18080:80"
      - "18443:443"
      - "18443:443/udp"
    volumes:
      - ./caddy/Caddyfile.staging:/etc/caddy/Caddyfile:ro

volumes:
  postgres-staging-data:
    driver: local
  postgres-staging-backups:
    driver: local
