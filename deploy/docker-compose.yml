services:
  postgres:
    image: postgres:17-alpine
    container_name: opengate-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=opengate
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=opengate
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opengate -d opengate"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:17
    container_name: opengate-postgres-backup
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=opengate
      - POSTGRES_USER=opengate
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - HEALTHCHECK_PORT=8008
    volumes:
      - postgres-backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.25'
        reservations:
          memory: 32M

  server:
    image: ghcr.io/volchanskyi/opengate-server:${IMAGE_TAG:-latest}
    container_name: opengate-server
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - DATABASE_URL=postgres://opengate:${POSTGRES_PASSWORD}@postgres:5432/opengate?sslmode=disable
      - OPENGATE_GITHUB_REPO=${OPENGATE_GITHUB_REPO:-}
      - OPENGATE_QUIC_HOST=${OPENGATE_QUIC_HOST:-}
    command:
      - "-listen"
      - ":8080"
      - "-quic-listen"
      - ":9090"
      - "-mps-listen"
      - ":4433"
      - "-data-dir"
      - "/data"
      - "-amt-user"
      - "${AMT_USER:-admin}"
      - "-amt-pass"
      - "${AMT_PASS:-}"
      - "-vapid-contact"
      - "${VAPID_CONTACT:-}"
    volumes:
      - server-data:/data    # TLS certs + VAPID keys (DB is now in postgres-data)
    expose:
      - "8080"
    ports:
      - "9090:9090/udp"   # QUIC — direct to host (not proxied)
      - "4433:4433"       # MPS — Intel AMT CIRA
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M

  web-init:
    image: ghcr.io/volchanskyi/opengate-server:${IMAGE_TAG:-latest}
    container_name: opengate-web-init
    user: "0"
    entrypoint: ["sh", "-c", "rm -rf /web-assets/* && cp -a /srv/web/. /web-assets/"]
    restart: "no"
    volumes:
      - web-assets:/web-assets
    deploy:
      resources:
        limits:
          memory: 128M

  caddy:
    image: caddy:2-alpine
    container_name: opengate-caddy
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - web-assets:/srv/web:ro
    depends_on:
      server:
        condition: service_healthy
      web-init:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M

volumes:
  postgres-data:
    driver: local
  postgres-backups:
    driver: local
  server-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  web-assets:
    driver: local
