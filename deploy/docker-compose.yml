services:
  server:
    image: ghcr.io/volchanskyi/opengate-server:${IMAGE_TAG:-latest}
    container_name: opengate-server
    restart: unless-stopped
    environment:
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    command:
      - "-listen"
      - ":8080"
      - "-quic-listen"
      - ":9090"
      - "-mps-listen"
      - ":4433"
      - "-data-dir"
      - "/data"
      - "-amt-user"
      - "${AMT_USER:-admin}"
      - "-amt-pass"
      - "${AMT_PASS:-}"
      - "-vapid-contact"
      - "${VAPID_CONTACT:-}"
    volumes:
      - server-data:/data
    expose:
      - "8080"
    ports:
      - "9090:9090/udp"   # QUIC — direct to host (not proxied)
      - "4433:4433"       # MPS — Intel AMT CIRA
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  caddy:
    image: caddy:2-alpine
    container_name: opengate-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"     # HTTP/3
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      server:
        condition: service_healthy

volumes:
  server-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
