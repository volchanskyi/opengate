apiVersion: 1

policies:
  - orgId: 1
    receiver: telegram
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: telegram
        matchers:
          - severity = critical
        group_wait: 10s
        repeat_interval: 1h
      - receiver: telegram
        matchers:
          - severity = warning
        group_wait: 1m
        repeat_interval: 4h
