# VictoriaMetrics stream aggregation for live Edge Sentinel telemetry.
# Raw matched input is preserved by -streamAggr.keepInput in the StatefulSet;
# these rules add coarse avg rollups for efficient long-range queries without
# giving agents VM credentials.
#
# Central rollups emit avg only. Each aggregate is its own series, so emitting
# min/max/last centrally as well would multiply active series past the budget
# ratified in server/tests/vmcardinality/spike_test.go. Chart bands are computed
# from min/max over the raw 10 s samples, so no central min/max series is needed.
- name: edge-sentinel-1m
  match: '{__name__=~"opengate_edge_.*"}'
  interval: 1m
  outputs: [avg]

- name: edge-sentinel-1h
  match: '{__name__=~"opengate_edge_.*"}'
  interval: 1h
  outputs: [avg]
