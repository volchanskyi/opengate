# VictoriaMetrics scrape config with Kubernetes service discovery. Scrapes
# pods annotated with prometheus.io/scrape, plus annotated monitoring Service
# endpoints such as node-exporter and postgres-exporter.

global:
  scrape_interval: 30s
  external_labels:
    cluster: opengate

scrape_configs:
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: (.+);(.+)
        target_label: __address__
        replacement: ${1}:${2}
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod

  - job_name: monitoring-service-endpoints
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: [monitoring]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        action: keep
        regex: metrics
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      - source_labels: [__meta_kubernetes_service_name]
        target_label: service
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
        target_label: component

  - job_name: opengate-server
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names: [opengate, opengate-staging]
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_component]
        action: keep
        regex: server
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        action: keep
        regex: http
