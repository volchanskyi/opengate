{{- $name := include "mon.componentName" (list . "loki") -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
data:
  loki-config.yml: |
{{ .Files.Get "files/loki-config.yml" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "mon.selectorLabels" (list . "loki") | nindent 4 }}
  ports:
    - name: http
      port: 3100
      targetPort: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "mon.selectorLabels" (list . "loki") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mon.selectorLabels" (list . "loki") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loki
          image: {{ .Values.loki.image }}
          args: ["-config.file=/etc/loki/loki-config.yml"]
          ports:
            - name: http
              containerPort: 3100
          livenessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 30
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 15
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /loki
            - name: config
              mountPath: /etc/loki
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.storageClass }}
        resources:
          requests:
            storage: {{ .Values.loki.storage }}
