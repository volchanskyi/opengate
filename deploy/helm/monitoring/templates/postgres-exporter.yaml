{{- $name := include "mon.componentName" (list . "postgres-exporter") -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
spec:
  selector:
    {{- include "mon.selectorLabels" (list . "postgres-exporter") | nindent 4 }}
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "mon.selectorLabels" (list . "postgres-exporter") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mon.selectorLabels" (list . "postgres-exporter") | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-exporter
          image: {{ .Values.postgresExporter.image }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: POSTGRES_PASSWORD
            - name: DATA_SOURCE_NAME
              value: "postgresql://opengate:$(POSTGRES_PASSWORD)@{{ .Values.postgresHost }}:5432/opengate?sslmode=disable"
          ports:
            - name: metrics
              containerPort: 9187
          livenessProbe:
            httpGet: { path: /, port: metrics }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /, port: metrics }
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.postgresExporter.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
