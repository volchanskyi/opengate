{{- $name := include "mon.componentName" (list . "promtail") -}}
{{- $loki := include "mon.componentName" (list . "loki") -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
rules:
  # Least privilege: the config uses kubernetes_sd `role: pod` and reads logs
  # from the host's /var/log/pods, so only pod metadata is needed — no
  # nodes/proxy (avoids the node-proxy privilege-escalation finding, KSV0047).
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
data:
  # LOKI_URL substituted at template time with the in-cluster Loki Service.
  promtail-config.yaml: |
{{ .Files.Get "files/promtail-config.yaml" | replace "LOKI_URL" (printf "%s:3100" $loki) | indent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "mon.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "mon.selectorLabels" (list . "promtail") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mon.selectorLabels" (list . "promtail") | nindent 8 }}
    spec:
      serviceAccountName: {{ $name }}
      securityContext:
        {{- if .Values.promtail.runAsRoot }}
        runAsUser: 0
        {{- else }}
        runAsNonRoot: true
        runAsUser: 10001
        {{- end }}
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: promtail
          image: {{ .Values.promtail.image }}
          args: ["-config.file=/etc/promtail/promtail-config.yaml"]
          env:
            # The scrape config relabels __host__ to the pod's node name and
            # promtail keeps only targets whose __host__ equals its own hostname.
            # Default hostname is the *pod* name, so without this every target is
            # filtered out (0 active targets, nothing shipped to Loki). Set the
            # hostname to the node name via the Downward API so they match.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: http
              containerPort: 9080
          # Liveness is a plain port check, NOT /ready: promtail's /ready returns
          # 500 until its first scrape-target sync completes, and on a busy/large
          # node that can lag past the probe's failure window. Gating liveness on
          # readiness there crash-loops a healthy shipper (killed → re-synced from
          # scratch → killed). Readiness still uses /ready so it only joins once
          # it is actually tailing.
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml .Values.promtail.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
              readOnly: true
            - name: run
              mountPath: /run/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/log/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ $name }}
        - name: run
          emptyDir: {}
        - name: pods
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/log/containers
