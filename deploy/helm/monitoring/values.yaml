# Monitoring stack values. Ports the docker-compose.monitoring.yml services
# to Kubernetes (ADR-030). Resource limits mirror the compose `deploy.resources`.

nameOverride: ""
fullnameOverride: ""

# Public hostname, matched to the app chart's `domain`. Used to derive Grafana's
# root URL (GF_SERVER_ROOT_URL). Grafana itself stays internal — reach it via
# `kubectl port-forward` / the OCI Bastion, never an ingress (same posture as the
# compose 127.0.0.1:3000 bind). Public uptime monitoring is an external SaaS
# (ADR-035), so this chart exposes no ingress.
domain: opengate.example.com

# Secret (created out-of-band) with keys: GF_SECURITY_ADMIN_PASSWORD,
# POSTGRES_PASSWORD, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID.
existingSecret: opengate-monitoring-secrets

# In-cluster Postgres the postgres-exporter scrapes (the app chart's headless svc).
postgresHost: opengate-postgres.opengate.svc

storageClass: oci-bv

victoriametrics:
  image: docker.io/victoriametrics/victoria-metrics:v1.114.0
  retention: 30d
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

loki:
  image: docker.io/grafana/loki:3.5.0
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

grafana:
  image: docker.io/grafana/grafana-oss:11.6.0
  # No PVC: /var/lib/grafana is an emptyDir (ADR-035). All config is provisioned
  # from ConfigMaps, so the only state lost on restart is annotations/alert history.
  rootUrl: ""    # set to https://<domain>/grafana when fronted by an ingress
  # Dashboard JSONs are NOT duplicated into the chart. Create the
  # ConfigMap from the canonical files at deploy time (see NOTES.txt):
  #   kubectl -n <ns> create configmap <name> \
  #     --from-file=deploy/grafana/provisioning/dashboards
  dashboardsConfigMap: grafana-dashboards
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

promtail:
  image: docker.io/grafana/promtail:3.5.0
  # promtail reads node pod logs. If the node OS makes /var/log/pods
  # root-only, flip runAsRoot=true at cutover (validate on OKE — runbook §4).
  runAsRoot: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

nodeExporter:
  image: docker.io/prom/node-exporter:v1.9.1
  resources:
    requests:
      cpu: 50m
      memory: 16Mi
    limits:
      cpu: 250m
      memory: 64Mi

postgresExporter:
  image: docker.io/prometheuscommunity/postgres-exporter:v0.16.0
  resources:
    requests:
      cpu: 50m
      memory: 16Mi
    limits:
      cpu: 250m
      memory: 64Mi

# Uptime monitoring is an external SaaS (ADR-035) — UptimeRobot/Better Stack
# probing https://<domain>/healthz from off-cluster (also catches whole-node
# outages an in-cluster monitor is blind to). No in-cluster uptime-kuma pod/PVC,
# and this chart exposes no ingress.
