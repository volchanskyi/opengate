# EXAMPLE ONLY — do NOT commit real values, do NOT `helm install` this file.
# The chart references an existing Secret (values: server.existingSecret).
# Create it out-of-band so secret material never lands in git or Helm release
# history. Production should layer sealed-secrets / SOPS on top of this.
#
# Option A — imperative (quickest):
#
#   kubectl create secret generic opengate-secrets \
#     --namespace opengate \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 48)" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 32)" \
#     --from-literal=AMT_PASS="<intel-amt-admin-password>" \
#     --from-literal=VAPID_CONTACT="mailto:ops@example.com"
#
# Shared keys (server.sharedKeys.enabled, PR-E multi-replica) — REQUIRED before
# scaling past one replica so every pod serves the same enrollment CA, VAPID
# keypair, and agent-update signing keypair. Generate them ONCE by running the
# server with a single replica (PVC path) and extracting /data, then fold the four
# files into this secret (keys: ca.crt, ca.key, vapid.json, update-signing.json):
#
#   mkdir keys && for f in ca.crt ca.key vapid.json update-signing.json; do \
#     kubectl exec deploy/opengate-server -- cat /data/$f > keys/$f; done
#   kubectl create secret generic opengate-secrets --namespace opengate \
#     --from-literal=JWT_SECRET=... (as above) \
#     --from-file=ca.crt=keys/ca.crt --from-file=ca.key=keys/ca.key \
#     --from-file=vapid.json=keys/vapid.json \
#     --from-file=update-signing.json=keys/update-signing.json
#
# Option B — declarative template (fill in, apply, then shred the file):
apiVersion: v1
kind: Secret
metadata:
  name: opengate-secrets
  namespace: opengate
type: Opaque
stringData:
  JWT_SECRET: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"
  AMT_PASS: "CHANGE_ME"
  VAPID_CONTACT: "mailto:ops@example.com"
  # Only required when server.sharedKeys.enabled (multi-replica). PEM / JSON
  # contents of the four /data key files; omit for the single-replica PVC path.
  # ca.crt: |
  #   -----BEGIN CERTIFICATE----- ...
  # ca.key: |
  #   -----BEGIN EC PRIVATE KEY----- ...
  # vapid.json: '{"private_key":"...","public_key":"..."}'
  # update-signing.json: '{"private_key":"...","public_key":"..."}'
