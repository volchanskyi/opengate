{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "opengate.fullname" . }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  annotations:
    {{- if and .Values.certManager.create .Values.ingress.tls }}
    cert-manager.io/cluster-issuer: {{ .Values.certManager.issuerName }}
    {{- end }}
    # WebSocket-friendly timeouts for /ws.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # Security headers are applied controller-side via the add-headers ConfigMap
    # (templates/custom-headers-configmap.yaml) instead of a per-ingress
    # configuration-snippet, so the controller runs with snippet annotations
    # disabled. See NOTES.txt.
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.domain }}
      secretName: {{ include "opengate.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "opengate.fullname" . }}-server
                port:
                  name: http
{{- end }}
