{{- if .Values.l4.ingressNginxConfigMaps -}}
# Multi-node L4 path (alternative to server.hostPortL4). The ingress-nginx
# controller must be started with --tcp-services-configmap / --udp-services-configmap
# pointing at these, and the corresponding ports added to its Service. The
# single-node default uses hostPort and does NOT render these.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tcp-services
  namespace: {{ .Values.l4.ingressNginxNamespace }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
data:
  {{ .Values.server.mpsPort | quote }}: "{{ .Release.Namespace }}/{{ include "opengate.fullname" . }}-server:{{ .Values.server.mpsPort }}"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: udp-services
  namespace: {{ .Values.l4.ingressNginxNamespace }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
data:
  {{ .Values.server.quicPort | quote }}: "{{ .Release.Namespace }}/{{ include "opengate.fullname" . }}-server:{{ .Values.server.quicPort }}"
{{- end }}
