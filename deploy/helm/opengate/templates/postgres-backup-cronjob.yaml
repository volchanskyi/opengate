{{- if .Values.postgres.backup.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "opengate.postgres.fullname" . }}-backups
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-backup
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.postgres.backup.storage.storageClass }}
  resources:
    requests:
      storage: {{ .Values.postgres.backup.storage.size }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "opengate.postgres.fullname" . }}-backup
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres-backup
spec:
  schedule: {{ .Values.postgres.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "opengate.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: postgres-backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: backup
              image: {{ .Values.postgres.image }}
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.server.existingSecret }}
                      key: POSTGRES_PASSWORD
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  F="/backups/opengate-$(date +%Y%m%d-%H%M%S).sql.gz"
                  pg_dump -h {{ include "opengate.postgres.fullname" . }} -U opengate opengate | gzip > "$F"
                  find /backups -name 'opengate-*.sql.gz' -mtime +{{ .Values.postgres.backup.keepDays }} -delete
                  echo "backup written: $F"
              resources:
                {{- toYaml .Values.postgres.backup.resources | nindent 16 }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ include "opengate.postgres.fullname" . }}-backups
{{- end }}
