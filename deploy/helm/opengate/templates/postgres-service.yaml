apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengate.postgres.fullname" . }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  # Headless — stable DNS for the StatefulSet pod.
  clusterIP: None
  selector:
    {{- include "opengate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
