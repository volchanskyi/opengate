apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "opengate.postgres.fullname" . }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  serviceName: {{ include "opengate.postgres.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "opengate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "opengate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      automountServiceAccountToken: false
      securityContext:
        # postgres:17-alpine runs as uid/gid 70; running as non-root makes the
        # entrypoint skip its chown and trust the fsGroup-owned PVC.
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: opengate
            - name: POSTGRES_DB
              value: opengate
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: POSTGRES_PASSWORD
            # Subdir keeps initdb away from the volume's lost+found.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "opengate", "-d", "opengate"]
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "opengate", "-d", "opengate"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            # Writable mounts required under a read-only root filesystem: the
            # Unix-socket dir and scratch space for temp files / lock files.
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: init
          configMap:
            name: {{ include "opengate.postgres.fullname" . }}-init
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if not .Values.postgres.storage.persistent }}
        # Ephemeral DB (staging only, ADR-035): the data dir resets on restart.
        # E2E/smoke seed their own state, so no block volume is provisioned.
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.postgres.storage.persistent }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.postgres.storage.storageClass }}
        resources:
          requests:
            storage: {{ .Values.postgres.storage.size }}
  {{- end }}
