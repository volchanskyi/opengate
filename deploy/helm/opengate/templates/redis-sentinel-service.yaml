{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengate.redisSentinel.fullname" . }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
spec:
  # Headless — the server's go-redis failover client and the Redis nodes both
  # resolve all Sentinel pod IPs through this name.
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "opengate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis-sentinel
  ports:
    - name: sentinel
      port: 26379
      targetPort: sentinel
      protocol: TCP
{{- end }}
