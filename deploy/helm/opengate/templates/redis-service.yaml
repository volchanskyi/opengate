{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengate.redis.fullname" . }}
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  # Headless — stable per-pod DNS for the StatefulSet (master discovery needs
  # pod-0's name to resolve before any pod is Ready).
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "opengate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
{{- end }}
