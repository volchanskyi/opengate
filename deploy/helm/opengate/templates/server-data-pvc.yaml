{{- if and (not .Values.server.sharedKeys.enabled) .Values.server.dataVolume.persistent }}
# Skipped when sharedKeys.enabled (keys come from a shared Secret and /data is an
# emptyDir — PR-E multi-replica) OR when dataVolume.persistent is false (staging
# runs /data on an emptyDir to stay under the free-tier block-volume cap, ADR-035).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "opengate.fullname" . }}-server-data
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.server.dataVolume.storageClass }}
  resources:
    requests:
      storage: {{ .Values.server.dataVolume.size }}
{{- end }}
