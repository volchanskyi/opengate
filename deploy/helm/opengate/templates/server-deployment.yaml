apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengate.fullname" . }}-server
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  strategy:
    {{- if and .Values.server.sharedKeys.enabled (not .Values.server.hostPortL4) }}
    # Shared keys (no RWO PVC) AND LB-based L4 (no node-bound hostPorts) — pods can
    # overlap across nodes, so a rolling update is safe (and wanted for HA).
    type: RollingUpdate
    {{- else }}
    # Recreate (old pod fully released before the new one starts) is required when
    # either: hostPortL4 binds node ports a second pod can't duplicate on the same
    # node, or /data is an RWO PVC (non-shared-keys) that can't be co-mounted.
    type: Recreate
    {{- end }}
  selector:
    matchLabels:
      {{- include "opengate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "opengate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ include "opengate.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-listen"
            - ":{{ .Values.server.httpPort }}"
            - "-quic-listen"
            - ":{{ .Values.server.quicPort }}"
            - "-mps-listen"
            - ":{{ .Values.server.mpsPort }}"
            - "-data-dir"
            - "/data"
            - "-web-dir"
            - "{{ .Values.server.webDir }}"
            - "-amt-user"
            - "{{ .Values.server.amtUser }}"
            - "-amt-pass"
            - "$(AMT_PASS)"
            - "-vapid-contact"
            - "$(VAPID_CONTACT)"
          env:
            # POSTGRES_PASSWORD must precede DATABASE_URL so k8s resolves the
            # $(POSTGRES_PASSWORD) reference below.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: JWT_SECRET
            - name: AMT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: AMT_PASS
            - name: VAPID_CONTACT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: VAPID_CONTACT
            {{- if .Values.server.githubRepo }}
            # Drives the agent-update manifest sync + the OPENGATE_GITHUB_REPO
            # export injected into the served install.sh. Unset → the installer
            # reports "No agent binary found for <os>/<arch>".
            - name: OPENGATE_GITHUB_REPO
              value: {{ .Values.server.githubRepo | quote }}
            {{- end }}
            {{- if .Values.server.quicHost }}
            # Added to the server TLS cert SAN so agents reaching the QUIC listener
            # at this public host pass the handshake. Unset → localhost-only cert →
            # "certificate not valid for name <host>".
            - name: OPENGATE_QUIC_HOST
              value: {{ .Values.server.quicHost | quote }}
            {{- end }}
            {{- if .Values.server.baseURL }}
            # SERVER_URL baked into the served install.sh for manifest fetches.
            - name: OPENGATE_BASE_URL
              value: {{ .Values.server.baseURL | quote }}
            {{- end }}
            {{- if .Values.server.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.server.logLevel | quote }}
            {{- end }}
            - name: DATABASE_URL
              value: "postgres://opengate:$(POSTGRES_PASSWORD)@{{ include "opengate.postgres.fullname" . }}:5432/opengate?sslmode=disable"
          ports:
            - name: http
              containerPort: {{ .Values.server.httpPort }}
              protocol: TCP
            - name: quic
              containerPort: {{ .Values.server.quicPort }}
              protocol: UDP
              {{- if .Values.server.hostPortL4 }}
              hostPort: {{ .Values.server.quicPort }}
              {{- end }}
            - name: mps
              containerPort: {{ .Values.server.mpsPort }}
              protocol: TCP
              {{- if .Values.server.hostPortL4 }}
              hostPort: {{ .Values.server.mpsPort }}
              {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.server.sharedKeys.enabled }}
            # Shared keypairs mounted read-only over the emptyDir /data, so every
            # replica serves the same CA / VAPID / update-signing material. The
            # rest of /data stays writable (manifest cache).
            - name: keys
              mountPath: /data/ca.crt
              subPath: ca.crt
              readOnly: true
            - name: keys
              mountPath: /data/ca.key
              subPath: ca.key
              readOnly: true
            - name: keys
              mountPath: /data/vapid.json
              subPath: vapid.json
              readOnly: true
            - name: keys
              mountPath: /data/update-signing.json
              subPath: update-signing.json
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if or .Values.server.sharedKeys.enabled (not .Values.server.dataVolume.persistent) }}
          # emptyDir when keys are shared via Secret (sharedKeys, prod) OR when
          # persistence is off (staging, ADR-035 free-tier cap — CA/keys reset on
          # restart, acceptable for the deploy-test env).
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "opengate.fullname" . }}-server-data
          {{- end }}
        {{- if .Values.server.sharedKeys.enabled }}
        - name: keys
          secret:
            secretName: {{ .Values.server.existingSecret }}
            items:
              - key: ca.crt
                path: ca.crt
              - key: ca.key
                path: ca.key
              - key: vapid.json
                path: vapid.json
              - key: update-signing.json
                path: update-signing.json
        {{- end }}
        - name: tmp
          emptyDir: {}
