apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opengate.fullname" . }}-server
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  {{- if not .Values.server.autoscaling.enabled }}
  # When autoscaling.enabled, KEDA's ScaledObject owns the replica count, so
  # spec.replicas is intentionally omitted (setting it would fight the autoscaler).
  replicas: {{ .Values.server.replicas }}
  {{- end }}
  strategy:
    {{- if and .Values.server.sharedKeys.enabled (not .Values.server.hostPortL4) }}
    # Shared keys (no RWO PVC) AND LB-based L4 (no node-bound hostPorts) — pods can
    # overlap across nodes, so a rolling update is safe (and wanted for HA).
    type: RollingUpdate
    {{- else }}
    # Recreate (old pod fully released before the new one starts) is required when
    # either: hostPortL4 binds node ports a second pod can't duplicate on the same
    # node, or /data is an RWO PVC (non-shared-keys) that can't be co-mounted.
    type: Recreate
    {{- end }}
  selector:
    matchLabels:
      {{- include "opengate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "opengate.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: {{ include "opengate.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-listen"
            - ":{{ .Values.server.httpPort }}"
            - "-quic-listen"
            - ":{{ .Values.server.quicPort }}"
            - "-mps-listen"
            - ":{{ .Values.server.mpsPort }}"
            - "-data-dir"
            - "/data"
            - "-web-dir"
            - "{{ .Values.server.webDir }}"
            - "-amt-user"
            - "{{ .Values.server.amtUser }}"
            - "-amt-pass"
            - "$(AMT_PASS)"
            - "-vapid-contact"
            - "$(VAPID_CONTACT)"
          env:
            # POSTGRES_PASSWORD must precede DATABASE_URL so k8s resolves the
            # $(POSTGRES_PASSWORD) reference below.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: JWT_SECRET
            - name: AMT_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: AMT_PASS
            - name: VAPID_CONTACT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: VAPID_CONTACT
            - name: DATABASE_URL
              value: "postgres://opengate:$(POSTGRES_PASSWORD)@{{ include "opengate.postgres.fullname" . }}:5432/opengate?sslmode=disable"
            {{- if .Values.redis.enabled }}
            # Distributed SessionRegistry over Redis Sentinel (ADR-031). The
            # failover client is given every Sentinel pod's stable FQDN.
            - name: REGISTRY_BACKEND
              value: redis
            - name: REDIS_MASTER_NAME
              value: {{ .Values.redis.masterName | quote }}
            - name: REDIS_SENTINEL_ADDRS
              value: "{{- $s := include "opengate.redisSentinel.fullname" . }}{{- range $i := until (int .Values.redis.sentinel.replicas) }}{{- if $i }},{{ end }}{{ $s }}-{{ $i }}.{{ $s }}.{{ $.Release.Namespace }}.svc.cluster.local:26379{{- end }}"
            {{- if .Values.redis.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: REDIS_PASSWORD
            {{- end }}
            # Cross-server relay proxy (ADR-033). serverID = this pod's IP via the
            # Downward API; peers are dialed directly on the flat overlay at the
            # shared internal port. The listener is pod-to-pod only (never ingress).
            - name: OPENGATE_SERVER_ID
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: OPENGATE_INTERNAL_LISTEN
              value: ":{{ .Values.server.internalPort }}"
            {{- if .Values.server.proxySecretEnabled }}
            - name: OPENGATE_PROXY_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.server.existingSecret }}
                  key: OPENGATE_PROXY_SECRET
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.httpPort }}
              protocol: TCP
            - name: quic
              containerPort: {{ .Values.server.quicPort }}
              protocol: UDP
              {{- if .Values.server.hostPortL4 }}
              hostPort: {{ .Values.server.quicPort }}
              {{- end }}
            - name: mps
              containerPort: {{ .Values.server.mpsPort }}
              protocol: TCP
              {{- if .Values.server.hostPortL4 }}
              hostPort: {{ .Values.server.mpsPort }}
              {{- end }}
            {{- if .Values.redis.enabled }}
            - name: internal
              containerPort: {{ .Values.server.internalPort }}
              protocol: TCP
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.server.sharedKeys.enabled }}
            # Shared keypairs mounted read-only over the emptyDir /data, so every
            # replica serves the same CA / VAPID / update-signing material. The
            # rest of /data stays writable (manifest cache).
            - name: keys
              mountPath: /data/ca.crt
              subPath: ca.crt
              readOnly: true
            - name: keys
              mountPath: /data/ca.key
              subPath: ca.key
              readOnly: true
            - name: keys
              mountPath: /data/vapid.json
              subPath: vapid.json
              readOnly: true
            - name: keys
              mountPath: /data/update-signing.json
              subPath: update-signing.json
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.server.sharedKeys.enabled }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "opengate.fullname" . }}-server-data
          {{- end }}
        {{- if .Values.server.sharedKeys.enabled }}
        - name: keys
          secret:
            secretName: {{ .Values.server.existingSecret }}
            items:
              - key: ca.crt
                path: ca.crt
              - key: ca.key
                path: ca.key
              - key: vapid.json
                path: vapid.json
              - key: update-signing.json
                path: update-signing.json
        {{- end }}
        - name: tmp
          emptyDir: {}
