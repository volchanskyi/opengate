{{- if .Values.server.podDisruptionBudget.enabled }}
# Phase 13b PR-E: keep at least minAvailable server pods serving during voluntary
# disruptions (node drain, rolling update). Only meaningful with >1 replica
# (autoscaling.enabled / sharedKeys.enabled).
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "opengate.fullname" . }}-server
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  minAvailable: {{ .Values.server.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "opengate.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
{{- end }}
