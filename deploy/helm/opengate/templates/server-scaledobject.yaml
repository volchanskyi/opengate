{{- if .Values.server.autoscaling.enabled }}
# Phase 13b PR-E: KEDA drives the server Deployment's replica count on two
# signals — CPU utilization and the custom opengate_active_sessions gauge queried
# from VictoriaMetrics. KEDA owns the underlying HPA, so server-deployment.yaml
# omits spec.replicas when autoscaling.enabled. Requires the KEDA operator and
# sharedKeys.enabled (multi-replica key correctness). keda.sh is a CRD, so
# kubeconform skips it (-ignore-missing-schemas) and policy/k8s validates it.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "opengate.fullname" . }}-server
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  scaleTargetRef:
    name: {{ include "opengate.fullname" . }}-server
  minReplicaCount: {{ .Values.server.autoscaling.minReplicas }}
  maxReplicaCount: {{ .Values.server.autoscaling.maxReplicas }}
  triggers:
    - type: cpu
      metricType: Utilization
      metadata:
        value: "{{ .Values.server.autoscaling.cpuUtilization }}"
    - type: prometheus
      metadata:
        serverAddress: {{ .Values.server.autoscaling.prometheusServerAddress | quote }}
        # Total live relay sessions across all replicas; KEDA targets
        # ceil(query / threshold) replicas, i.e. ~activeSessionsPerReplica each.
        query: sum(opengate_relay_active_sessions)
        threshold: {{ .Values.server.autoscaling.activeSessionsPerReplica | quote }}
{{- end }}
