apiVersion: v1
kind: Service
metadata:
  name: {{ include "opengate.fullname" . }}-server
  labels:
    {{- include "opengate.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  selector:
    {{- include "opengate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.httpPort }}
      targetPort: http
      protocol: TCP
    {{- if .Values.l4.ingressNginxConfigMaps }}
    # Exposed through the Service only when ingress-nginx tcp/udp-services
    # forward L4 traffic here (multi-node path). The single-node default uses
    # hostPort and bypasses the Service.
    - name: quic
      port: {{ .Values.server.quicPort }}
      targetPort: quic
      protocol: UDP
    - name: mps
      port: {{ .Values.server.mpsPort }}
      targetPort: mps
      protocol: TCP
    {{- end }}
