# Production overlay — real domain, HSTS on, Let's Encrypt prod, full backups.
# Most values inherit from values.yaml; this overlay pins the env-specific knobs.

domain: opengate.cloudisland.net

server:
  # Multi-replica-correct key sharing is REQUIRED in production: the enrollment
  # CA / VAPID / update-signing keys come from the (out-of-band) existingSecret,
  # so every replica — and every redeploy — serves the same material and existing
  # agents keep mTLS. Do not disable without re-carrying the keys (ADR-034).
  sharedKeys:
    enabled: true
  # Public endpoints agents reach directly (QUIC bypasses the CDN/ingress). Must
  # match DNS: agents dial quicHost:quicPort and validate the server cert against
  # quicHost. baseURL is the HTTPS origin baked into the served install.sh.
  quicHost: quic.opengate.cloudisland.net
  baseURL: https://opengate.cloudisland.net

ingress:
  tls: true
  hsts: true

certManager:
  issuerName: letsencrypt-prod
  server: https://acme-v02.api.letsencrypt.org/directory

postgres:
  backup:
    enabled: true
    keepDays: 7
