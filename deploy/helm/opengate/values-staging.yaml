# Staging overlay — coexists with production (separate release + namespace).
# Mirrors docker-compose.staging.yml: smaller footprint, no HSTS, ACME staging.

domain: staging.opengate.example.com

ingress:
  tls: false
  hsts: false

certManager:
  issuerName: letsencrypt-staging
  server: https://acme-staging-v02.api.letsencrypt.org/directory

server:
  # Staging shares the single-node pilot cluster with production, which already
  # binds the QUIC/MPS hostPorts (9090/udp, 4433/tcp) on the node. A second pod
  # can't duplicate them, so staging would hang Pending and time out `helm --wait`.
  # Staging E2E reaches the app via kubectl port-forward, not L4, so disable
  # hostPort here (the server still serves HTTP on :8080).
  hostPortL4: false
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 384Mi
  dataVolume:
    # Staging is a throwaway deploy-test env: /data (CA + VAPID + update-signing
    # keys) rides an emptyDir to avoid a 50 GB OCI block volume (ADR-035, free-tier
    # cap). E2E/smoke re-enroll against the fresh CA each run, so the reset is fine.
    persistent: false
    size: 1Gi

postgres:
  storage:
    # Same as the server /data above — staging DB rides an emptyDir, not a block
    # volume (ADR-035). E2E/smoke seed their own fixtures, so the reset is fine.
    persistent: false
    size: 5Gi
  backup:
    # Staging is ephemeral E2E state; no scheduled backups needed.
    enabled: false
