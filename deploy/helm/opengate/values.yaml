# Default values for the opengate chart.
# Overlays: values-staging.yaml / values-production.yaml (CD picks one via -f).
# Secrets are NEVER set here — see `existingSecret` and secrets.example.yaml.

nameOverride: ""
fullnameOverride: ""

# Public hostname the ingress answers on. Overridden per environment.
domain: opengate.example.com

image:
  repository: ghcr.io/volchanskyi/opengate-server
  # Overridden by CD (`--set image.tag=sha-…`). Concrete tags only — the k8s
  # policy (policy/k8s/security.rego) denies `:latest`.
  tag: v0.24.0
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

server:
  replicas: 1                # used only when autoscaling.enabled is false (PR-E)
  httpPort: 8080            # HTTP API + SPA (behind ingress)
  quicPort: 9090            # QUIC agent transport (UDP, L4)
  mpsPort: 4433            # Intel AMT CIRA / MPS (TCP, L4)
  internalPort: 9091        # cross-server relay proxy (ADR-033); pod-to-pod only, never ingress
  # Optional shared secret on the internal relay proxy (defense-in-depth atop the
  # private-network boundary). When true, OPENGATE_PROXY_SECRET must exist in
  # server.existingSecret. Only meaningful with redis.enabled (multi-server).
  proxySecretEnabled: false
  webDir: /srv/web          # server serves the SPA itself (api.go os.OpenRoot)
  amtUser: admin
  # GitHub repo the server syncs agent-update manifests from. When set, the server
  # (a) starts the periodic GitHub-Releases sync that backs /api/v1/updates/manifests
  # and (b) injects OPENGATE_GITHUB_REPO into the served install.sh so the installer
  # resolves binaries directly. Empty disables both — which is why an unset value
  # yields "No agent binary found for <os>/<arch>".
  githubRepo: volchanskyi/opengate
  # Public hostname agents reach the QUIC listener on (bypasses the CDN/ingress —
  # QUIC is L4 hostPort straight to the node). Added to the server TLS cert SAN;
  # if empty, the cert is localhost-only and agents fail the QUIC handshake with
  # "certificate not valid for name <host>". Set per environment.
  quicHost: ""
  # Public base URL baked into the served install.sh as SERVER_URL (manifest
  # fetches). Empty leaves SERVER_URL blank, breaking the server-manifest install
  # path. Set per environment, e.g. https://<domain>.
  baseURL: ""
  # Server log verbosity; "debug" enables verbose logging, anything else is info.
  logLevel: ""
  # L4 exposure: bind QUIC+MPS straight to the node IP via hostPort. On the
  # single-node start this is budget-free (no OCI LB) and preserves the client
  # source IP that AMT CIRA / QUIC need. Multi-node (PR-E) switches to an OCI
  # NLB or ingress-nginx tcp/udp-services (see .Values.l4 below).
  hostPortL4: true
  # Secret with keys: JWT_SECRET, POSTGRES_PASSWORD, AMT_PASS, VAPID_CONTACT.
  # Created out-of-band (kubectl / sealed-secrets); see secrets.example.yaml.
  existingSecret: opengate-secrets
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # /data holds the server's self-signed CA + VAPID keys + agent-update signing
  # keys. Single-replica PVC keeps them stable across restarts.
  # `persistent: false` swaps the RWO PVC for an emptyDir (the CA/keys reset on
  # restart) — used by staging only to stay under the OCI free-tier block-volume
  # cap (ADR-035). Production keeps these keys in the shared Secret (sharedKeys),
  # so its /data is already an emptyDir regardless of this flag.
  dataVolume:
    persistent: true
    storageClass: oci-bv
    size: 1Gi
  # Shared keys (PR-E): for multi-replica every replica must serve the SAME
  # enrollment CA, VAPID keypair, and update-signing keypair, else mTLS
  # enrollment, web push, and update verification split across pods. When
  # enabled, /data becomes an emptyDir (writable manifest cache) and the four key
  # files are mounted read-only via subPath from existingSecret; the per-replica
  # PVC is dropped and the rollout switches Recreate→RollingUpdate. The server
  # loads keys if present (no code change). Populate the secret once at install —
  # see secrets.example.yaml. REQUIRED before scaling past one replica.
  sharedKeys:
    enabled: false
  # Autoscaling (PR-E): KEDA ScaledObject driving the server Deployment on CPU
  # utilization AND the custom opengate_relay_active_sessions gauge (queried from
  # VictoriaMetrics). KEDA owns the replica count, so spec.replicas is omitted
  # when enabled. Requires the KEDA operator installed in the cluster and
  # sharedKeys.enabled (multi-replica correctness). Budget: 4 OCPU / 24 GB total.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    cpuUtilization: 70           # % of the request, averaged across pods
    activeSessionsPerReplica: "50"  # scale out above this many sessions/replica
    # In-cluster VictoriaMetrics query endpoint for the prometheus trigger.
    prometheusServerAddress: http://victoria-metrics:8428
  # PodDisruptionBudget (PR-E): keep at least minAvailable server pods up during
  # voluntary disruptions (node drain, rollout). Only meaningful multi-replica.
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

postgres:
  # Fully-qualified registry path: OKE's cri-o nodes run short-name-mode=enforcing
  # and reject bare names like `postgres:17-alpine` (ImageInspectError).
  image: docker.io/library/postgres:17-alpine
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  storage:
    # `persistent: false` swaps the StatefulSet's RWO volumeClaimTemplate for an
    # emptyDir (DB resets on pod restart) — staging only, to stay under the OCI
    # free-tier block-volume cap (ADR-035). Production keeps the block volume.
    persistent: true
    storageClass: oci-bv
    size: 10Gi
  backup:
    enabled: true
    schedule: "@daily"
    # Off-cluster to OCI Object Storage via a write-only PAR URL (ADR-035): no
    # backups PVC. The dump runs in the postgres image (pg_dump, no curl); the
    # upload runs in this image (curl, no pg_dump). Fully-qualified for OKE cri-o.
    uploadImage: docker.io/curlimages/curl:8.11.1
    # Retention is enforced by an OCI Object Storage lifecycle policy on the bucket
    # (delete objects older than keepDays), created out-of-band — see NOTES.txt.
    # The CronJob no longer prunes; keepDays only documents the policy's threshold.
    keepDays: 7
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 250m
        memory: 64Mi

# Redis Sentinel HA — backing store for the distributed SessionRegistry
# (REGISTRY_BACKEND=redis), per ADR-031. DORMANT by default: with redis.enabled
# false the server keeps the in-process registry and none of these objects
# render. When enabled, the server is wired to the Sentinel service via
# REGISTRY_BACKEND=redis + REDIS_SENTINEL_ADDRS + REDIS_MASTER_NAME (see
# server-deployment.yaml). HA topology: a StatefulSet of Redis nodes (pod-0 is
# the bootstrap master, the rest replicate; on restart every node rediscovers
# the live master from Sentinel) and a StatefulSet of Sentinels that elect a new
# master on failure.
redis:
  enabled: false
  image: docker.io/library/redis:7.4-alpine   # fully-qualified for OKE cri-o (see postgres.image)
  # The Sentinel master group name; must match REDIS_MASTER_NAME on the server.
  masterName: opengate
  replicas: 3            # 1 bootstrap master + 2 replicas
  # Optional AUTH. When enabled, REDIS_PASSWORD must exist in server.existingSecret
  # and is used for requirepass + masterauth + sentinel auth-pass.
  auth:
    enabled: false
  data:
    storageClass: oci-bv
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  sentinel:
    replicas: 3          # quorum = (replicas/2)+1 = 2
    quorum: 2
    # Failure-detection / failover tuning (milliseconds).
    downAfterMs: 5000
    failoverTimeoutMs: 10000
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

ingress:
  enabled: true
  className: nginx
  # Production terminates TLS and sends HSTS; staging runs behind the prod
  # proxy on plain HTTP and disables HSTS (mirrors Caddyfile vs Caddyfile.staging).
  tls: true
  hsts: true
  # Security headers ported verbatim from deploy/caddy/Caddyfile. Folded (>-)
  # so it stays under the yamllint line-length cap; breaks fall on existing
  # single-space boundaries, so it reassembles to the identical CSP string.
  csp: >-
    default-src 'self'; script-src 'self' 'wasm-unsafe-eval';
    style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;
    font-src 'self'; connect-src 'self' wss:; frame-ancestors 'none'
  permissionsPolicy: "camera=(), microphone=(), geolocation=(), payment=()"

certManager:
  create: true
  issuerName: letsencrypt-prod
  email: admin@opengate.example.com   # ACME registration contact; override per environment
  server: https://acme-v02.api.letsencrypt.org/directory

# Multi-node alternative to server.hostPortL4: emit ingress-nginx
# tcp-services/udp-services ConfigMaps so the controller forwards 9090/udp +
# 4433/tcp to the server Service. Off by default (single-node uses hostPort).
l4:
  ingressNginxConfigMaps: false
  ingressNginxNamespace: ingress-nginx
