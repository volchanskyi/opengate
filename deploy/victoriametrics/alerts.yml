groups:
  - name: opengate
    rules:
      - alert: ServerDown
        expr: up{job="opengate-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "OpenGate server is down"
          description: >-
            Instance {{ $labels.instance }} has been
            unreachable for more than 1 minute.

      - alert: HighMemoryUsage
        expr: >-
          (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes)
          / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: >-
            Memory usage is above 90% on
            {{ $labels.instance }} for 5 minutes.

      - alert: HighErrorRate
        expr: >-
          rate(http_requests_total{code=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: >-
            More than 5% of requests are returning 5xx
            on {{ $labels.instance }}.

      - alert: HighP95Latency
        expr: >-
          histogram_quantile(0.95,
          rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency"
          description: >-
            95th percentile latency is above 2s on
            {{ $labels.instance }}.
