# VictoriaMetrics scrape configuration (Prometheus-compatible format).
# Scrapes the OpenGate server and Node Exporter.

scrape_configs:
  - job_name: "opengate-server"
    scrape_interval: 15s
    static_configs:
      - targets: ["opengate-server:8080"]
    metrics_path: /metrics

  - job_name: "node-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["opengate-node-exporter:9100"]

  - job_name: "postgres-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["opengate-postgres-exporter:9187"]

  - job_name: "victoriametrics"
    scrape_interval: 30s
    static_configs:
      - targets: ["localhost:8428"]
