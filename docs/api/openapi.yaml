openapi: "3.0.3"
info:
  title: OpenGate API
  version: "1.0.0"
  description: Remote device management and relay API

servers:
  - url: /

security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        display_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    TokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    User:
      type: object
      required: [id, email, display_name, is_admin, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Device:
      type: object
      required: [id, group_id, hostname, os, agent_version, status, last_seen, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        hostname:
          type: string
        os:
          type: string
        agent_version:
          type: string
        status:
          type: string
          enum: [online, offline, connecting]
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UpdateDeviceRequest:
      type: object
      properties:
        group_id:
          type: string
          format: uuid
          nullable: true

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    Group:
      type: object
      required: [id, name, owner_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Permissions:
      type: object
      properties:
        desktop:
          type: boolean
        terminal:
          type: boolean
        file_read:
          type: boolean
        file_write:
          type: boolean
        input:
          type: boolean

    CreateSessionRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          format: uuid
        permissions:
          $ref: "#/components/schemas/Permissions"

    CreateSessionResponse:
      type: object
      required: [token, relay_url]
      properties:
        token:
          type: string
        relay_url:
          type: string
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/ICEServer"

    ICEServer:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: string
        username:
          type: string
        credential:
          type: string

    AgentSession:
      type: object
      required: [token, device_id, user_id, created_at]
      properties:
        token:
          type: string
        device_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    WebPushSubscribeRequest:
      type: object
      required: [endpoint, p256dh, auth]
      properties:
        endpoint:
          type: string
        p256dh:
          type: string
        auth:
          type: string

    WebPushUnsubscribeRequest:
      type: object
      required: [endpoint]
      properties:
        endpoint:
          type: string

    VapidKeyResponse:
      type: object
      required: [public_key]
      properties:
        public_key:
          type: string

    AuditEvent:
      type: object
      required: [id, user_id, action, target, details, created_at]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: string
          format: uuid
        action:
          type: string
        target:
          type: string
        details:
          type: string
        created_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        is_admin:
          type: boolean
        display_name:
          type: string

    AMTDevice:
      type: object
      required: [uuid, hostname, model, firmware, status, last_seen]
      properties:
        uuid:
          type: string
          format: uuid
        hostname:
          type: string
        model:
          type: string
        firmware:
          type: string
        status:
          type: string
          enum: [online, offline]
        last_seen:
          type: string
          format: date-time

    AMTPowerRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [power_on, power_cycle, soft_off, hard_reset]

    AgentManifest:
      type: object
      required: [version, os, arch, url, sha256, signature, created_at]
      properties:
        version:
          type: string
        os:
          type: string
        arch:
          type: string
        url:
          type: string
        sha256:
          type: string
        signature:
          type: string
        created_at:
          type: string
          format: date-time

    PublishUpdateRequest:
      type: object
      required: [version, os, arch, url, sha256]
      properties:
        version:
          type: string
        os:
          type: string
        arch:
          type: string
        url:
          type: string
        sha256:
          type: string

    PushUpdateRequest:
      type: object
      required: [version, os, arch]
      properties:
        version:
          type: string
        os:
          type: string
        arch:
          type: string
        device_ids:
          type: array
          items:
            type: string
            format: uuid

    PushUpdateResponse:
      type: object
      required: [pushed_count]
      properties:
        pushed_count:
          type: integer

    DeviceUpdate:
      type: object
      required: [id, device_id, version, status, error, pushed_at]
      properties:
        id:
          type: integer
          format: int64
        device_id:
          type: string
          format: uuid
        version:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        error:
          type: string
        pushed_at:
          type: string
          format: date-time
        acked_at:
          type: string
          format: date-time

    EnrollmentToken:
      type: object
      required: [id, token, label, created_by, max_uses, use_count, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
        label:
          type: string
        created_by:
          type: string
          format: uuid
        max_uses:
          type: integer
        use_count:
          type: integer
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreateEnrollmentTokenRequest:
      type: object
      properties:
        label:
          type: string
          default: ""
        max_uses:
          type: integer
          default: 0
        expires_in_hours:
          type: integer
          default: 24

    EnrollRequest:
      type: object
      required: [csr_pem]
      properties:
        csr_pem:
          type: string
          description: PEM-encoded PKCS#10 certificate signing request

    EnrollResponse:
      type: object
      required: [ca_pem, server_addr, server_domain]
      properties:
        ca_pem:
          type: string
        cert_pem:
          type: string
          description: PEM-encoded agent certificate signed by the server CA
        server_addr:
          type: string
        server_domain:
          type: string
        update_signing_key:
          type: string
          description: Hex-encoded Ed25519 public key for verifying update signatures

    CACertResponse:
      type: object
      required: [pem]
      properties:
        pem:
          type: string

    SecurityGroup:
      type: object
      required: [id, name, description, is_system, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SecurityGroupWithMembers:
      type: object
      required: [id, name, description, is_system, created_at, updated_at, members]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSecurityGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          default: ""

    AddSecurityGroupMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/users/me:
    get:
      operationId: getMe
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/users:
    get:
      operationId: listUsers
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/users/{id}:
    delete:
      operationId: deleteUser
      summary: Delete user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateUser
      summary: Update user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/push/subscribe:
    post:
      operationId: subscribePush
      summary: Save browser push subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebPushSubscribeRequest"
      responses:
        "204":
          description: Subscription saved
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: unsubscribePush
      summary: Remove push subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebPushUnsubscribeRequest"
      responses:
        "204":
          description: Subscription removed
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/push/vapid-key:
    get:
      operationId: getVapidKey
      summary: Get server VAPID public key
      security:
        - bearerAuth: []
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidKeyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/audit:
    get:
      operationId: listAuditEvents
      summary: Query audit log (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/devices:
    get:
      operationId: listDevices
      summary: List devices, optionally filtered by group
      security:
        - bearerAuth: []
      parameters:
        - name: group_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/devices/{id}:
    get:
      operationId: getDevice
      summary: Get device details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateDevice
      summary: Update device fields
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeviceRequest"
      responses:
        "200":
          description: Updated device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteDevice
      summary: Delete device
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Device deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/groups:
    post:
      operationId: createGroup
      summary: Create a device group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      operationId: listGroups
      summary: List user's groups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/groups/{id}:
    get:
      operationId: getGroup
      summary: Get group details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: deleteGroup
      summary: Delete group
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Group deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/sessions:
    post:
      operationId: createSession
      summary: Create a relay session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionRequest"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateSessionResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Agent not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    get:
      operationId: listSessions
      summary: List active sessions for a device
      security:
        - bearerAuth: []
      parameters:
        - name: device_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentSession"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
