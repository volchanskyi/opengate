        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found or offline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: A history request is already in progress for this device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: History unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "504":
