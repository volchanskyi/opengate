  /api/v1/devices/{id}/logs:
    get:
      operationId: getDeviceLogs
      summary: Broker an on-demand raw-log pull from a device
      description: >-
        Streams a bounded, redacted, audited snapshot of the device's raw logs
        straight from the connected agent. Nothing is persisted centrally; the
        request blocks until the agent responds or times out. Reading raw logs
        is an elevated action restricted to administrators.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: level
          in: query
          schema:
            type: string
            enum: ["", "TRACE", "DEBUG", "INFO", "WARN", "ERROR"]
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 300
            maximum: 1000
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceLogsResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden — administrator access required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found or offline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: A log request is already in progress for this device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "504":
          description: Device did not return logs in time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/devices/{id}/correlate:
    post:
      operationId: correlateDevice
      summary: Rank anomalous metric dimensions for a device window
      description: >-
        On-demand correlation: fetches the device's numeric telemetry from
        VictoriaMetrics (tenant-scoped) over the focus window and ranks the
        dimensions that broke pattern versus a baseline window, using a
        server-side two-sample KS test plus anomaly-rate and shift-magnitude
        volume signals. Bounded by concurrency, timeout, and fetch caps.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrelateDeviceRequest"
      responses:
        "200":
          description: Ranked correlation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorrelateResponse"
        "400":
          description: Invalid window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Correlation unavailable or at capacity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/devices/{id}/metrics:
    get:
      operationId: getDeviceMetrics
      summary: Downsampled numeric telemetry for a device window
      description: >-
        Returns column-oriented numeric telemetry for the device over the
        window, read tenant-scoped from VictoriaMetrics. The server picks a
        bucket width so the point count stays within max_points regardless of
        window span, mapping 1:1 to a client charting engine's aligned data.
        Charts numeric dimensions only; process basenames and cmdlines are never
        returned here.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: dims
          in: query
          description: Numeric dimension names to fetch. Omit for all recorded dimensions.
          schema:
            type: array
            items:
              type: string
          style: form
          explode: false
        - name: max_points
          in: query
          description: Upper bound on buckets per series (approximately the chart pixel width).
          schema:
            type: integer
            default: 1000
            minimum: 10
            maximum: 2000
        - name: band
          in: query
          description: Band provenance to compute alongside the avg line.
          schema:
            type: string
            enum: [none, avg_of_10s]
            default: avg_of_10s
      responses:
        "200":
          description: Downsampled telemetry window
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetricRangeResponse"
        "400":
          description: Invalid window or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Device not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Telemetry unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/devices/{id}/history:
    get:
      operationId: getDeviceHistory
      summary: On-demand full-resolution local history for one dimension
      description: >-
        Brokers a bounded, full-resolution history pull for a single numeric
        dimension from the connected agent's local store — the deep history that
        central VictoriaMetrics (avg-only) does not keep. Single-host and
        server-mediated: no browser-to-agent access and no fan-out. The window is
        bounded and the point count is capped by max_points.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: dim
          in: query
          required: true
          description: The numeric dimension whose full-resolution history to pull.
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: max_points
          in: query
          description: Upper bound on returned points; the response is truncated past it.
          schema:
            type: integer
            default: 1000
            minimum: 10
            maximum: 20000
      responses:
        "200":
          description: Full-resolution history slice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceHistoryResponse"
        "400":
          description: Invalid window or parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
