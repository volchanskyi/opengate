openapi: "3.0.3"
info:
  title: OpenGate API
  version: "1.0.0"
  description: Remote device management and relay API

servers:
  - url: /

security: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        display_name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    TokenResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    ClientErrorReport:
      type: object
      required: [message]
      description: >-
        Browser-side error report for server-side log ingestion. Must never
        contain tokens, credentials, or PII; the stack is truncated client-side.
      properties:
        message:
          type: string
          maxLength: 1000
        source:
          type: string
          maxLength: 200
        stack:
          type: string
          maxLength: 500
        url:
          type: string
          maxLength: 500
        user_agent:
          type: string
          maxLength: 300

    User:
      type: object
      required: [id, email, display_name, is_admin, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        display_name:
          type: string
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Device:
      type: object
      required: [id, group_id, hostname, os, agent_version, capabilities, status, last_seen, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        hostname:
          type: string
        os:
          type: string
        os_display:
          type: string
        agent_version:
          type: string
        capabilities:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [online, offline, connecting]
        last_seen:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        anomaly_rate:
          type: number
          description: >-
            Latest edge-node anomaly rate in [0,1] from telemetry, for the fleet
            health badge. Omitted when the device has no recent sample.

    RestartDeviceRequest:
      type: object
      properties:
        reason:
          type: string

    CorrelateDeviceRequest:
      type: object
      required: [focus_start, focus_end]
      properties:
        focus_start:
          type: string
          format: date-time
          description: Start of the incident (focus) window to investigate.
        focus_end:
          type: string
          format: date-time
          description: End of the incident (focus) window.
        baseline_start:
          type: string
          format: date-time
          description: >-
            Optional baseline window start. When omitted, the baseline is the
            window of equal length immediately preceding the focus window.
        baseline_end:
          type: string
          format: date-time
          description: Optional baseline window end (defaults to focus_start).
        top_n:
          type: integer
          description: Maximum number of ranked dimensions to return.

    CorrelatedDimension:
      type: object
      required: [metric, score, ks_statistic, anomaly_rate, shift_magnitude, baseline_samples, focus_samples]
      properties:
        metric:
          type: string
          description: Metric name of the ranked dimension.
        labels:
          type: object
          additionalProperties:
            type: string
          description: Identifying labels (org_id/device_id stripped).
        score:
          type: number
          description: Blended rank score in [0,1] (KS, anomaly rate, shift magnitude).
        ks_statistic:
          type: number
          description: Two-sample Kolmogorov–Smirnov distribution-shift statistic in [0,1].
        anomaly_rate:
          type: number
          description: Fraction of focus samples outside the baseline band in [0,1].
        shift_magnitude:
          type: number
          description: Normalized mean shift versus baseline scale in [0,1].
        baseline_samples:
          type: integer
        focus_samples:
          type: integer

    CorrelateResponse:
      type: object
      required: [ranked, series_considered, series_truncated]
      properties:
        ranked:
          type: array
          items:
            $ref: "#/components/schemas/CorrelatedDimension"
        series_considered:
          type: integer
          description: Number of candidate series evaluated (after the fetch cap).
        series_truncated:
          type: boolean
          description: True when more series existed than the per-request cap allowed.

    MetricSeries:
      type: object
      required: [name, avg, min_max_source]
      properties:
        name:
          type: string
          description: Numeric dimension name (e.g. cpu.util). Never a process basename or cmdline.
        avg:
          type: array
          items:
            type: number
            format: double
            nullable: true
          description: Central average per bucket, aligned 1:1 with the response t array; null for a bucket with no sample.
        min:
          type: array
          items:
            type: number
            format: double
            nullable: true
          description: Lower band per bucket, aligned with t. Present only when min_max_source is not none.
        max:
          type: array
          items:
            type: number
            format: double
            nullable: true
          description: Upper band per bucket, aligned with t. Present only when min_max_source is not none.
        min_max_source:
          type: string
          enum: [local, avg_of_10s, none]
          description: >-
            Provenance of the band. local = true host min/max from an on-demand
            local-history pull; avg_of_10s = min/max across the 10 s averages in
            the bucket (not host extrema); none = avg line only, no band.

    MetricRangeResponse:
      type: object
      required: [t, series, downsampled, bucket_s]
      properties:
        t:
          type: array
          items:
            type: integer
            format: int64
          description: Bucket timestamps in unix seconds, ascending. Aligns 1:1 with each series.
        series:
          type: array
          items:
            $ref: "#/components/schemas/MetricSeries"
        downsampled:
          type: boolean
          description: True when the server collapsed raw samples into buckets to honor max_points.
        bucket_s:
          type: integer
          description: Bucket width in seconds (the query step) chosen to keep points within max_points.

    HistoryPoint:
      type: object
      required: [ts, value]
      properties:
        ts:
          type: integer
          format: int64
          description: Sample timestamp in unix seconds.
        value:
          type: number
          format: double
          description: The full-resolution sample value at ts.

    DeviceHistoryResponse:
      type: object
      required: [dim, points, truncated]
      properties:
        dim:
          type: string
          description: The dimension this history slice is for.
        points:
          type: array
          items:
            $ref: "#/components/schemas/HistoryPoint"
          description: Full-resolution points in ascending timestamp order.
        truncated:
          type: boolean
          description: True when the window held more than max_points samples and the response was capped.

    DeviceHardware:
      type: object
      required: [device_id, cpu_model, cpu_cores, ram_total_mb, disk_total_mb, disk_free_mb, network_interfaces, updated_at]
      properties:
        device_id:
          type: string
          format: uuid
        cpu_model:
          type: string
        cpu_cores:
          type: integer
        ram_total_mb:
          type: integer
          format: int64
        disk_total_mb:
          type: integer
          format: int64
        disk_free_mb:
          type: integer
          format: int64
        network_interfaces:
          type: array
          items:
            $ref: "#/components/schemas/NetworkInterfaceInfo"
        updated_at:
          type: string
          format: date-time

    NetworkInterfaceInfo:
      type: object
      required: [name, mac, ipv4, ipv6]
      properties:
        name:
          type: string
        mac:
          type: string
        ipv4:
          type: array
          items:
            type: string
        ipv6:
          type: array
          items:
            type: string

    DeviceInventory:
      type: object
      required: [device_id, items]
      properties:
        device_id:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"

    InventoryItem:
      type: object
      required: [kind, name, version, port, proto, state, runtime, image, first_seen, last_seen]
      properties:
        kind:
          type: string
          enum: [port, service, db_engine, container, package]
        name:
          type: string
          description: >-
            Primary label — owning process (port), unit (service), engine
            (db_engine), or the name (container / package).
        version:
          type: string
        port:
          type: integer
          description: Listening or engine port; 0 when not applicable to the kind.
        proto:
          type: string
        state:
          type: string
        runtime:
          type: string
        image:
          type: string
        first_seen:
          type: string
          format: date-time
        last_seen:
          type: string
          format: date-time

    DeviceLogsResponse:
      type: object
      required: [entries, total, has_more]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/DeviceLogEntry"
        total:
          type: integer
        has_more:
          type: boolean

    DeviceLogEntry:
      type: object
      required: [timestamp, level, target, message]
      properties:
        timestamp:
          type: string
        level:
          type: string
        target:
          type: string
        message:
          type: string

    UpdateDeviceRequest:
      type: object
      properties:
        group_id:
          type: string
          format: uuid
          nullable: true

    CreateGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    Group:
      type: object
      required: [id, name, owner_id, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Permissions:
      type: object
      properties:
        desktop:
          type: boolean
        terminal:
          type: boolean
        file_read:
          type: boolean
        file_write:
          type: boolean
        input:
          type: boolean

    CreateSessionRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          type: string
          format: uuid
        permissions:
          $ref: "#/components/schemas/Permissions"

    CreateSessionResponse:
      type: object
      required: [token, relay_url]
      properties:
        token:
          type: string
        relay_url:
          type: string
        ice_servers:
          type: array
          items:
            $ref: "#/components/schemas/ICEServer"

    ICEServer:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            type: string
        username:
          type: string
        credential:
          type: string

    AgentSession:
      type: object
      required: [token, device_id, user_id, created_at]
      properties:
        token:
          type: string
        device_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    WebPushSubscribeRequest:
      type: object
      required: [endpoint, p256dh, auth]
      properties:
        endpoint:
          type: string
        p256dh:
          type: string
        auth:
          type: string

    WebPushUnsubscribeRequest:
      type: object
      required: [endpoint]
      properties:
        endpoint:
          type: string

    VapidKeyResponse:
      type: object
      required: [public_key]
      properties:
        public_key:
          type: string

    AuditEvent:
      type: object
      required: [id, user_id, action, target, details, created_at]
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: string
          format: uuid
        action:
          type: string
        target:
          type: string
        details:
          type: string
        created_at:
          type: string
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        is_admin:
          type: boolean
        display_name:
          type: string

    AMTDevice:
      type: object
      required: [uuid, hostname, model, firmware, status, last_seen]
      properties:
        uuid:
          type: string
          format: uuid
        hostname:
          type: string
        model:
          type: string
        firmware:
          type: string
        status:
          type: string
          enum: [online, offline]
        last_seen:
          type: string
          format: date-time

    AMTPowerRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [power_on, power_cycle, soft_off, hard_reset]

    AgentManifest:
      type: object
      required: [version, os, arch, url, sha256, signature, created_at]
      properties:
        version:
          type: string
        os:
          type: string
        arch:
          type: string
        url:
          type: string
        sha256:
          type: string
        signature:
          type: string
        created_at:
          type: string
          format: date-time

    PublishUpdateRequest:
      type: object
      required: [version, os, arch, url, sha256]
      properties:
        version:
          type: string
        os:
          type: string
        arch:
          type: string
        url:
          type: string
        sha256:
          type: string

    PushUpdateRequest:
      type: object
      required: [version, os, arch]
      properties:
        version:
          type: string
        os:
          type: string
        arch:
          type: string
        device_ids:
          type: array
          items:
            type: string
            format: uuid

    PushUpdateResponse:
      type: object
      required: [pushed_count]
      properties:
        pushed_count:
          type: integer

    DeviceUpdate:
      type: object
      required: [id, device_id, version, status, error, pushed_at]
      properties:
        id:
          type: integer
          format: int64
        device_id:
          type: string
          format: uuid
        version:
          type: string
        status:
          type: string
          enum: [pending, success, failed]
        error:
          type: string
        pushed_at:
          type: string
          format: date-time
        acked_at:
          type: string
          format: date-time

    EnrollmentToken:
      type: object
      required: [id, token, label, created_by, max_uses, use_count, expires_at, created_at]
      properties:
        id:
          type: string
          format: uuid
        token:
          type: string
        label:
          type: string
        created_by:
          type: string
          format: uuid
        max_uses:
          type: integer
        use_count:
          type: integer
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CreateEnrollmentTokenRequest:
      type: object
      properties:
        label:
          type: string
          default: ""
        max_uses:
          type: integer
          default: 0
        expires_in_hours:
          type: integer
          default: 24

    EnrollRequest:
      type: object
      required: [csr_pem]
      properties:
        csr_pem:
          type: string
          description: PEM-encoded PKCS#10 certificate signing request

    EnrollResponse:
      type: object
      required: [ca_pem, server_addr, server_domain]
      properties:
        ca_pem:
          type: string
        cert_pem:
          type: string
          description: PEM-encoded agent certificate signed by the server CA
        server_addr:
          type: string
        server_domain:
          type: string
        update_signing_key:
          type: string
          description: Hex-encoded Ed25519 public key for verifying update signatures

    CACertResponse:
      type: object
      required: [pem]
      properties:
        pem:
          type: string

    SecurityGroup:
      type: object
      required: [id, name, description, is_system, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SecurityGroupWithMembers:
      type: object
      required: [id, name, description, is_system, created_at, updated_at, members]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        is_system:
          type: boolean
        members:
          type: array
          items:
            $ref: "#/components/schemas/User"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateSecurityGroupRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          default: ""

    AddSecurityGroupMemberRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/client-errors:
    post:
      operationId: reportClientError
      summary: Report a browser-side error for server-side log ingestion
      description: >-
        Unauthenticated, rate-limited endpoint that records frontend crashes in
        the server log (Loki) so production client errors are observable. The
        body is size-bounded; payloads must carry no token, credential, or PII.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientErrorReport"
      responses:
        "204":
          description: Error recorded
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many failed login attempts for this account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/users/me:
    get:
      operationId: getMe
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/users:
    get:
      operationId: listUsers
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/users/{id}:
    delete:
      operationId: deleteUser
      summary: Delete user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    patch:
      operationId: updateUser
      summary: Update user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/push/subscribe:
    post:
      operationId: subscribePush
      summary: Save browser push subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebPushSubscribeRequest"
      responses:
        "204":
          description: Subscription saved
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: unsubscribePush
      summary: Remove push subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebPushUnsubscribeRequest"
      responses:
        "204":
          description: Subscription removed
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/push/vapid-key:
    get:
      operationId: getVapidKey
      summary: Get server VAPID public key
      security:
        - bearerAuth: []
      responses:
        "200":
          description: VAPID public key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VapidKeyResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /api/v1/audit:
    get:
      operationId: listAuditEvents
      summary: Query audit log (admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
