# og-plaintext-secret-column — no raw secret columns in SQL migrations.
#
# Catches gap class: a new migration declaring a secret-bearing column as a
# plain text type, i.e. storing a credential without hashing (passwords) or
# encryption (API keys, AMT passwords). The project stores password_hash
# (hashed) and amt_password as AES-GCM ciphertext alongside amt_password_iv /
# amt_password_tag — those suffixed forms are *not* findings.
#
# The (?!_) lookahead skips suffixed columns (password_hash, amt_password_iv,
# secret_digest, …) so only a bare secret column name in a textual type fires.
# The existing baseline migration (001_initial.up.sql) stores amt_password as
# ciphertext and is grandfathered via .semgrepignore; diff-only scanning means
# only newly-introduced columns are evaluated in the gate.
rules:
  - id: og-plaintext-secret-column
    languages: [generic]
    severity: ERROR
    message: >-
      Secret-bearing column declared as a plaintext type. Store passwords as a
      hash (e.g. password_hash) and other secrets as ciphertext with an IV/tag
      (e.g. amt_password BYTEA + amt_password_iv + amt_password_tag). A raw
      password/secret/token/api_key text column is a plaintext-at-rest leak.
      ADR-027.
    metadata:
      category: security
      cwe: "CWE-256: Plaintext Storage of a Password"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: MEDIUM
      adr: ADR-027
    paths:
      include:
        - "server/internal/db/migrations/*.sql"
    patterns:
      - pattern-regex: '(?i)\b(password|passwd|secret|api_key|apikey|amt_password|private_key|access_token|refresh_token)(?!_)\b\s+(VARCHAR|TEXT|CHAR|CHARACTER|CITEXT)'
