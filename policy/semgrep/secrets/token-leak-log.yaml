# og-token-leak-log — secret-valued log fields must pass through a redactor.
#
# Catches gap class: a credential (token / jwt / bearer / session / secret /
# password) interpolated into a log line in the clear. Go uses
# protocol.RedactToken (server/internal/protocol/types.go); the Rust agent has
# no redactor, so a sensitive tracing field is always a finding there.
#
# Go uses a structured pattern (slog-style key/value). Rust uses pattern-regex:
# Semgrep cannot match structurally *inside* a `tracing::info!(...)` macro
# invocation, so the Rust rule matches the macro call's source text instead.
# TS uses console.* structural matching.
rules:
  # ---- Go: slog / log structured + printf-style ---------------------------
  - id: og-token-leak-log-go
    languages: [go]
    severity: ERROR
    message: >-
      Secret-named log field "$K" is logged without redaction. Wrap the value
      with protocol.RedactToken(...) before logging (see
      server/internal/protocol/types.go). ADR-027.
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      confidence: MEDIUM
      adr: ADR-027
    patterns:
      - pattern-either:
          - pattern: $LOG.$LEVEL($MSG, ..., $K, $V, ...)
          - pattern: $LOG.$LEVEL($CTX, $MSG, ..., $K, $V, ...)
      - metavariable-regex:
          metavariable: $K
          regex: '(?i)"(.*)(token|jwt|bearer|session|secret|password|passwd)(.*)"'
      - pattern-not: $LOG.$LEVEL(..., $K, $REDACT(...), ...)
      - pattern-not: $LOG.$LEVEL($CTX, ..., $K, $REDACT(...), ...)

  # ---- Rust: tracing macros (regex — no structural macro-body matching) ---
  - id: og-token-leak-log-rust
    languages: [rust]
    severity: ERROR
    message: >-
      Secret-named field recorded in a tracing event. The agent has no token
      redactor; do not log credential material. Drop the field or log a
      non-reversible fingerprint instead. ADR-027.
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      confidence: MEDIUM
      adr: ADR-027
    patterns:
      # A tracing macro recording a secret-NAMED field (`name = value`). Keying
      # on the `=` targets the structured field name (not a bare value token or
      # a message string that merely mentions the word). The value is captured
      # through to the next `,`/`)` so the redactor exemption below can see it.
      - pattern-regex: '(?:tracing::)?(?:error|warn|info|debug|trace)!\([^;]*\b(?i:token|jwt|bearer|session|secret|password|passwd)\b\s*=\s*[^,)]+'
      # Allow an explicit redactor call as the field value (future-proofing —
      # the agent has no redactor today).
      - pattern-not-regex: '(?i)redact'

  # ---- TypeScript: console.* -------------------------------------------
  - id: og-token-leak-log-ts
    languages: [typescript]
    severity: ERROR
    message: >-
      Secret-named value is sent to console output without redaction. Do not log
      credential material from the browser client. ADR-027.
    metadata:
      category: security
      cwe: "CWE-532: Insertion of Sensitive Information into Log File"
      owasp: "A09:2021 - Security Logging and Monitoring Failures"
      confidence: LOW
      adr: ADR-027
    patterns:
      - pattern-either:
          - pattern: console.$M($X.$K)
          - pattern: console.$M($MSG, $X.$K)
      - metavariable-regex:
          metavariable: $K
          regex: '(?i)(token|jwt|bearer|session|secret|password|passwd)'
      - pattern-not: console.$M(..., redactToken(...))
