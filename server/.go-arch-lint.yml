# OpenGate Go architecture lint policy.
#
# Constrained components:
#   - cert  — leaf module, no internal imports
#   - audit — audit aggregate, no internal imports
#
# `audit` is intentionally narrow: it depends only on stdlib + uuid (vendor).
# The 3rd-party pgx driver is registered as a database/sql driver in main.go,
# so audit imports nothing project-internal.
#
# The catch-all `other` component covers everything else with no restrictions,
# so these rules do NOT gate code outside the constrained components.
#
# Only the components listed below are constrained; `other` remains the
# explicit catch-all. The gauntlet runs this policy in strict mode.

version: 3
workdir: .

# Test files commonly need broader imports than production code (testutil
# helpers, fixtures, fakes). Architecture rules apply to production code only;
# this matches the conventional usage of the tool. The TDD gate
# (.claude/hooks/pretooluse-tdd-gate.sh) and the test-coverage suite handle
# test discipline separately.
excludeFiles:
  - '_test\.go$'

allow:
  # Any component may import any 3rd-party (vendor) dependency. We constrain
  # PROJECT-INTERNAL imports only; vendor management lives in go.mod + the
  # govulncheck/cargo-audit/npm-audit gauntlet steps.
  depOnAnyVendor: true
  # v3+ AST linter for accurate import resolution.
  deepScan: true

components:
  # Constrained: the cert module owns CA/CSR signing + verification. Already a
  # leaf module today (imports stdlib only). The rule preserves that.
  cert:
    in: internal/cert

  # Constrained: the audit module owns the audit-log aggregate. Repository
  # interface, Postgres adapter, and Instrumented
  # decorator live here; no internal imports.
  audit:
    in: internal/audit

  # Constrained: the update module owns DeviceUpdate + EnrollmentToken
  # aggregates. Repository interfaces, Postgres
  # adapters, and Instrumented decorators live here. No internal imports.
  # The existing manifest/signing/github files inside internal/updater pre-
  # date the extraction; verified to import nothing project-internal.
  update:
    in: internal/updater

  # Constrained: the auth module owns the SecurityGroup aggregate plus the
  # existing JWT / password-hash helpers. Repository
  # interface, Postgres adapter, and Instrumented decorator live here. No
  # internal imports — the Postgres adapter's syncIsAdmin updates the users
  # table but that coupling is local to the auth aggregate, not a cross-
  # module dependency.
  auth:
    in: internal/auth

  # Constrained: the device module owns the Device aggregate — Devices, Groups,
  # Hardware inventory, and the cached log
  # read model. Four Repository interfaces, their Postgres adapters, and
  # their Instrumented decorators live here. No internal imports.
  device:
    in: internal/device

  # Constrained: the notifications module owns the WebPushSubscription
  # aggregate plus the existing Notifier interface
  # and VAPID key material. Repository interface, Postgres adapter, and
  # Instrumented decorator live here. The PushNotifier itself depends only
  # on WebPushRepository, not db.Store — so the module has no internal
  # imports.
  notifications:
    in: internal/notifications

  # Constrained: the session module owns the agent-session aggregate — browser
  # ↔ relay ↔ agent session tokens. Repository
  # interface, Postgres adapter, and Instrumented decorator live here. No
  # internal imports (clean leaf — stdlib + uuid only).
  session:
    in: internal/session

  # Constrained: the usecase module owns cross-aggregate orchestration that
  # would violate leaf-module boundaries if pushed into a single domain
  # module. It composes per-aggregate Repository ports from the leaf modules.
  # SessionService.Delete is the current cross-aggregate use case.
  usecase:
    in: internal/usecase

  # Catch-all for everything else. These components are currently unconstrained.
  other:
    in:
      - internal/**
      - cmd/**
      - tests/**

deps:
  cert:
    # Project-internal: cert may NOT import any other project component.
    # Empty mayDependOn = deny-all-internal. anyVendorDeps:true is required by
    # the schema (at least one allow-flag must be set per component).
    mayDependOn: []
    anyVendorDeps: true
  audit:
    # Project-internal: audit owns its outbound port and the Postgres adapter
    # entirely; it has no project-internal imports. The Instrumented decorator
    # accepts an Observer interface (duck-typed against metrics.Metrics at
    # wiring time in main.go) — deepScan would trace the concrete metrics.Metrics
    # type flowing into NewInstrumented at the call site and flag it as a
    # dependency. The audit source code itself imports nothing project-internal,
    # so the looser non-deepScan check is the correct rule here.
    mayDependOn: []
    anyVendorDeps: true
    deepScan: false
  update:
    # Same rationale as audit: leaf module, owns its ports + adapters +
    # decorators. deepScan disabled because the Instrumented decorators
    # accept the same duck-typed Observer interface as audit.
    mayDependOn: []
    anyVendorDeps: true
    deepScan: false
  auth:
    # Same rationale as audit and update: leaf module, owns its ports +
    # adapters + decorators. deepScan disabled because the Instrumented
    # decorator accepts the same duck-typed Observer interface as audit/update.
    mayDependOn: []
    anyVendorDeps: true
    deepScan: false
  device:
    # Same leaf-module pattern as audit/update/auth. The four repository
    # interfaces (Devices/Groups/Hardware/Logs) and their Postgres + Instrumented
    # adapters live entirely in this package; no internal imports.
    mayDependOn: []
    anyVendorDeps: true
    deepScan: false
  notifications:
    # Same leaf-module pattern as audit/update/auth/device. The WebPush
    # repository + Postgres adapter + Instrumented decorator + PushNotifier
    # + NoopNotifier + VAPID helpers all live entirely in this package;
    # no internal imports.
    mayDependOn: []
    anyVendorDeps: true
    deepScan: false
  session:
    # Same leaf-module pattern as audit/update/auth/device/notifications.
    # The Repository interface, Postgres adapter, and Instrumented
    # decorator live entirely in this package; no internal imports.
    mayDependOn: []
    anyVendorDeps: true
    deepScan: false
  usecase:
    # Composes leaf-domain ports. Allowed to import any leaf aggregate
    # whose Repository/port it consumes. The current use case uses audit,
    # notifications, session, and protocol. deepScan is disabled
    # because the use cases accept duck-typed interfaces (e.g.
    # notifications.Notifier) and the concrete implementation flowing
    # in at wiring time would otherwise be traced as a dependency.
    mayDependOn:
      - audit
      - notifications
      - session
      - other  # protocol.RedactToken; protocol is part of the catch-all
    anyVendorDeps: true
    deepScan: false
  other:
    # Explicit catch-all for components without dedicated dependency rules.
    anyProjectDeps: true
    anyVendorDeps: true
