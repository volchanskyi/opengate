sonar.organization=volchanskyi
sonar.projectKey=volchanskyi_opengate
sonar.projectName=OpenGate

# Sources
sonar.sources=server/internal,agent/crates,web/src
sonar.tests=server/internal,server/tests,agent/crates,web/src
sonar.test.inclusions=**/*_test.go,**/tests/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts

# Go coverage (generated by go-unit job)
sonar.go.coverage.reportPaths=server/coverage.out

# TypeScript/JS coverage (generated by web job)
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# Rust — generic coverage import (llvm-cov lcov output)
sonar.rust.lcov.reportPaths=agent/lcov.info


# Exclusions
sonar.exclusions=**/testutil/**,**/testdata/**,**/node_modules/**,**/target/**,**/*.test.ts,**/*.test.tsx,**/*_test.go,**/openapi_gen.go
# Coverage exclusions: bootstrap entrypoints (main.rs/main.tsx), generated code,
# IO/transport modules covered by integration tests rather than unit tests, and
# test scaffolding. The remaining production code is held to ≥80% line coverage
# per language.
sonar.coverage.exclusions=**/testutil/**,**/testdata/**,**/*_test.go,**/*.test.ts,**/*.test.tsx,\
  **/openapi_gen.go,\
  **/main.rs,\
  **/main.tsx,\
  **/App.tsx,\
  **/types/**,\
  agent/crates/mesh-agent-core/src/webrtc.rs,\
  agent/crates/mesh-agent-core/src/terminal.rs,\
  agent/crates/mesh-agent-core/src/session/mod.rs,\
  agent/crates/mesh-agent-core/src/session/relay.rs,\
  agent/crates/mesh-agent-core/src/session/handler.rs,\
  agent/crates/mesh-agent-core/src/session/terminal_handle.rs,\
  agent/crates/mesh-agent-core/src/update.rs,\
  agent/crates/platform-linux/src/service.rs,\
  server/internal/agentapi/server.go,\
  server/internal/mps/wsman/client.go,\
  server/internal/mps/mps.go,\
  server/internal/metrics/**,\
  web/src/state/connection-store.ts,\
  web/src/features/remote-desktop/use-remote-desktop.ts,\
  web/src/features/file-manager/use-file-manager.ts

# Suppress go:S100 (function naming) for test files — Go convention uses underscores in Test/Benchmark names
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
# WSConn must store context to satisfy io.ReadWriteCloser (fixed method signatures)
sonar.issue.ignore.multicriteria.e2.ruleKey=godre:S8242
sonar.issue.ignore.multicriteria.e2.resourceKey=**/wsconn.go
# Hardcoded IPs in tests are test fixtures, not production config
sonar.issue.ignore.multicriteria.e3.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*_test.go
